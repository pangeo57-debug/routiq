          });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          break;
        }
      }
    }

    // ── Phase 5: Unplaced + suggestions ──
    const unplaced = [];
    for(const student of students){
      const cnt = this.countPlaced(student.id, schedule);
      if(cnt < student.lessonsPerWeek){
        const u = { student, placed:cnt, needed:student.lessonsPerWeek,
          reason: this.diagnoseUnplaced(student, schedule, settings) };
        this.computeSuggestion(u, schedule, settings);
        unplaced.push(u);
      }
    }
    return { schedule, unplaced };
  },

  // True flexibility: count valid 5-min start positions across all unused available days
  flexScore(student, schedule, settings){
    const placedDays = this.placedOnDays(student.id, schedule);
    let total = 0;
    for(const day of settings.workDays){
      const av = student.availability[day];
      if(!av || !av.on || placedDays.includes(day)) continue;
      const dayH = settings.dayHours[day];
      if(!dayH) continue;
      const buf = settings.travelMargin ?? 3;
      const winStart = Math.max(this.toMin(dayH.start), this.toMin(av.start));
      const winEnd   = Math.min(this.toMin(dayH.end),   this.toMin(av.end));
      const dur = student.lessonDuration;
      const existing = schedule[day] || [];
      for(let t=winStart; t+dur<=winEnd; t+=5){
        if(!this.isBlocked(t,t+dur,day,settings) && !this.overlaps(t,t+dur,existing,buf,student.id)) total++;
      }
    }
    return total || 999999; // 0 slots = unplaceable, sort last
  },

  addLesson(schedule, student, day, slot){
    schedule[day].push({
      studentId:student.id, studentName:student.name,
      subject:student.subject, address:student.address,
      color:student.color, start:slot.start, end:slot.end,
      duration:student.lessonDuration
    });
    schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
  },

  // Displacement: remove a blocking lesson, place `student`, re-place the displaced one elsewhere
  tryDisplace(student, allStudents, schedule, settings){
    for(const day of settings.workDays){
      const av = student.availability[day];
      if(!av || !av.on) continue;
      if(this.placedOnDays(student.id, schedule).includes(day)) continue;

      for(const blocking of [...(schedule[day]||[])]){
        if(blocking.merged||blocking.isGroup) continue; // don't displace merged/group blocks

        // Try placing student without the blocking lesson
        const tempDay = (schedule[day]||[]).filter(s => s !== blocking);
        const slot = this.findSlot(student, day, tempDay, settings);
        if(!slot) continue;

        // Can the displaced student go somewhere else?
        const displaced = allStudents.find(s => s.id === blocking.studentId);
        if(!displaced) continue;

        // Try every other available day for the displaced student
        const displacedPlacedDays = this.placedOnDays(displaced.id, schedule).filter(d => d !== day);
        let altDay = null, altSlot = null;

        for(const altD of settings.workDays){
          if(altD === day) continue;
          if(displacedPlacedDays.includes(altD)) continue;
          const av2 = displaced.availability[altD];
          if(!av2 || !av2.on) continue;
          const s2 = this.findSlot(displaced, altD, schedule[altD]||[], settings);
          if(s2){ altDay = altD; altSlot = s2; break; }
        }

        if(altSlot){
          // Execute displacement
          schedule[day] = tempDay;
          this.addLesson(schedule, student, day, slot);
          this.addLesson(schedule, displaced, altDay, altSlot);
          return true;
        }

        // Try same day in a different time (after student is placed)
        const withStudent = [...tempDay, {studentId:student.id, start:slot.start, end:slot.end, duration:student.lessonDuration}];
        const sameSlot = this.findSlot(displaced, day, withStudent, settings);
        if(sameSlot){
          schedule[day] = tempDay;
          this.addLesson(schedule, student, day, slot);
          this.addLesson(schedule, displaced, day, sameSlot);
          return true;
        }
      }
    }
    return false;
  },

  // Find slot with explicit duration override
  findSlotDur(student, day, existing, settings, dur){
    const margin = (settings.travelMargin ?? 3);
    const dayH = settings.dayHours[day];
    if(!dayH) return null;
    const av = student.availability[day];
    if(!av || !av.on) return null;
    const winStart = Math.max(this.toMin(dayH.start), this.toMin(av.start));
    const winEnd   = Math.min(this.toMin(dayH.end),   this.toMin(av.end));
    if(winEnd - winStart < dur) return null;
    const winEndFlex = winEnd + 15; // allow up to 15 min overflow at end of day
    const sorted = [...existing].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
    for(let t=winStart; t+dur<=winEndFlex; t+=5){
      if(this.isBlocked(t, t+dur, day, settings)) continue;
      let ok = true;
      for(const e of sorted){
        const es = this.toMin(e.start), ee = this.toMin(e.end);
        const sameStudent = e.studentId === student.id;
        const bufBefore = sameStudent ? 0 : this.travelEstMin(e.studentId, e.address, student.id, student.address, day) + margin;
        const bufAfter  = sameStudent ? 0 : this.travelEstMin(student.id, student.address, e.studentId, e.address, day) + margin;
        if(t < ee + bufBefore && t + dur + bufAfter > es){ ok = false; break; }
      }
      if(ok) return { start: this.toTime(t), end: this.toTime(t+dur) };
    }
    return null;
  },

  // Swap optimization: for each pair of slots on different days, try swapping if it improves geo spread
  swapOptimize(schedule, settings, coords){
    const days = Object.keys(schedule).map(Number);
    for(let di=0;di<days.length;di++){
      for(let dj=di+1;dj<days.length;dj++){
        const dayA=days[di], dayB=days[dj];
        for(let si=0;si<schedule[dayA].length;si++){
          for(let sj=0;sj<schedule[dayB].length;sj++){
            const slotA=schedule[dayA][si], slotB=schedule[dayB][sj];
            if(slotA.studentId===slotB.studentId) continue;
            if(slotA.merged||slotB.merged||slotA.isGroup||slotB.isGroup) continue;
            // Check if swap is constraint-valid
            const studentA = {id:slotA.studentId,availability:{},lessonDuration:slotA.duration};
            const studentB = {id:slotB.studentId,availability:{},lessonDuration:slotB.duration};
            // Simple availability check
            const avA = state?.students?.find(s=>s.id===slotA.studentId)?.availability;
            const avB = state?.students?.find(s=>s.id===slotB.studentId)?.availability;
            if(!avA||!avB) continue;
            if(!(avA[dayB]&&avA[dayB].on)) continue;
            if(!(avB[dayA]&&avB[dayA].on)) continue;
            // Calc current vs swapped geo spread
            const cA = coords[slotA.studentId]||this.coordsHash(slotA.address);
            const cB = coords[slotB.studentId]||this.coordsHash(slotB.address);
            const centA = this.dayCentroid(schedule[dayA].filter((_,i)=>i!==si), coords)||cA;
            const centB = this.dayCentroid(schedule[dayB].filter((_,i)=>i!==sj), coords)||cB;
            const before = this.dist(cA,centA) + this.dist(cB,centB);
            const after  = this.dist(cB,centA) + this.dist(cA,centB);
            if(after < before - 0.003){
              // Do swap — just swap studentId/name/subject/address/color
              [schedule[dayA][si], schedule[dayB][sj]] = [
                {...schedule[dayB][sj], start:schedule[dayA][si].start, end:schedule[dayA][si].end},
                {...schedule[dayA][si], start:schedule[dayB][sj].start, end:schedule[dayB][sj].end}
              ];
            }
          }
        }
      }
    }
  },

  // Compute minimum window extension to fit this student
  computeSuggestion(u, schedule, settings){
    const student = u.student;
    const candidateDays = settings.workDays.filter(d => {
      const av = student.availability[d];
      return av && av.on && !this.placedOnDays(student.id, schedule).includes(d);
    });
    let bestTeacher = null, bestStudent = null;
    for(const day of candidateDays){
      const dayH = settings.dayHours[day];
      const av = student.availability[day];
      if(!dayH||!av||!av.on) continue;
      // Try extending teacher's work hours end
      for(let ext=15; ext<=120; ext+=15){
        const fakeSettings = {...settings, dayHours:{...settings.dayHours,[day]:{...dayH, end: this.toTime(this.toMin(dayH.end)+ext)}}};
        const slot = this.findSlot(student, day, schedule[day]||[], fakeSettings);
        if(slot){
          if(!bestTeacher || ext < bestTeacher.extensionMin) bestTeacher = {extensionMin:ext, day};
          break;
        }
      }
      // Try extending student's availability window end
      for(let ext=15; ext<=120; ext+=15){
        const fakeStudent = {...student, availability:{...student.availability,[day]:{...av, end: this.toTime(this.toMin(av.end)+ext)}}};
        const slot = this.findSlot(fakeStudent, day, schedule[day]||[], settings);
        if(slot){
          if(!bestStudent || ext < bestStudent.extensionMin) bestStudent = {extensionMin:ext, day};
          break;
        }
      }
    }
    if(bestTeacher) u.suggestionTeacher = bestTeacher;
    if(bestStudent) u.suggestionStudent = bestStudent;
    // keep legacy field for compatibility
    u.suggestion = bestTeacher || bestStudent;
  },

  totalWindow(student, settings){
    let total = 0;
    settings.workDays.forEach(d => {
      const av = student.availability[d];
      if(av && av.on) total += this.windowMinutes(av);
    });
    return total || 9999;
  },

  windowMinutes(av){
    if(!av) return 0;
    return Math.max(0, this.toMin(av.end) - this.toMin(av.start));
  },

  countPlaced(id, schedule){
    let c=0;
    Object.values(schedule).forEach(slots => { slots.forEach(s => {
      if(s.studentId===id) c+=(s.mergedCount||1);
      else if(s.isGroup && ((s.groupMemberIds&&s.groupMemberIds.includes(id)) || s.pairedStudentId===id)) c+=1;
    }) });
    return c;
  },

  placedOnDays(id, schedule){
    const days=[];
    Object.entries(schedule).forEach(([d,slots]) => {
      if(slots.some(s=>s.studentId===id || (s.isGroup && ((s.groupMemberIds&&s.groupMemberIds.includes(id)) || s.pairedStudentId===id)))) days.push(Number(d));
    });
    return days;
  },

  findSlot(student, day, existing, settings){
    return this.findSlotDur(student, day, existing, settings, student.lessonDuration);
  },

  isBlocked(startMin, endMin, day, settings){
    return (settings.blockedSlots||[]).some(b => {
      if(b.day !== day) return false;
      const bs = this.toMin(b.start), be = this.toMin(b.end);
      return startMin < be && endMin > bs;
    });
  },

  overlaps(startMin, endMin, existing, buf, studentId){
    return existing.some(e => {
      const es = this.toMin(e.start), ee = this.toMin(e.end);
      // Same student or merged block at same location → no travel buffer needed
      const b = (studentId && e.studentId === studentId) ? 0 : buf;
      return startMin < ee+b && endMin+b > es;
    });
  },

  diagnoseUnplaced(student, schedule, settings){
    const workDaysAvail = settings.workDays.filter(d => { const av=student.availability[d]; return av&&av.on; });
    if(workDaysAvail.length === 0) return t('diag_no_common_days');
    const cnt = this.countPlaced(student.id, schedule);
    if(cnt > 0) return tf('diag_placed_count',{c:cnt,t:student.lessonsPerWeek});
    return t('diag_no_free_slot');
  },

  // Phase 3: Simulated Annealing — cross-day reassignment to minimize total km
  // Operates on an already-placed schedule; never removes students.
  async saOptimize(schedule, students, settings, coords, travelMinFn, budgetMs=20000){
    const HOME = coords['home'] || {lat:0,lon:0};
    const wdays = settings.workDays;
    const studentsById = Object.fromEntries(students.map(s=>[s.id,s]));
    const isAvailable = (studentId, day) => {
      const st = studentsById[studentId];
      const av = st && st.availability && st.availability[day];
      return !!(av && av.on);
    };
    const distKm = (a,b)=>{const dx=a.lon-b.lon,dy=a.lat-b.lat;return Math.sqrt(dx*dx+dy*dy)*111*1.4;};
    const trvMin = travelMinFn
      ? (a,b)=>travelMinFn(a,b)
      : (a,b)=>Math.max(1,Math.round(distKm(a,b)/((settings.avgCitySpeedKmh)||25)*60));

    // Small per-slot penalty (km-equivalent) for landing on Saturday, so that
    // among otherwise-equal options SA prefers filling weekdays first — this
    // never costs a placement (SA only ever rearranges already-placed slots,
    // it doesn't drop anyone), it just nudges the pick when km is a near-tie.
    const WEEKEND_PENALTY = 2;
    const calcSchedKm = (sch)=>{
      let km=0;
      for(const d of wdays){
        const sl=(sch[d]||[]);let prev=HOME;let prevS=null;
        for(const s of sl){const c=coords[s.studentId]||HOME;if(!prevS||prevS.studentId!==s.studentId)km+=distKm(prev,c);prev=c;prevS=s;}
        if(sl.length)km+=distKm(prev,HOME);
        if(d===6) km += sl.length*WEEKEND_PENALTY;
      }
      return km;
    };

    const rebuildDay = (slots, day)=>{
      if(!slots.length) return [];
      const dh = settings.dayHours[day]; if(!dh) return null;
      const dayStart = this.toMin(dh.start), dayEnd = this.toMin(dh.end)+15;
      const out=[]; let cur=dayStart;
      for(let i=0;i<slots.length;i++){
        const sl=slots[i];
        const prevC = i===0 ? HOME : coords[out[i-1].studentId]||HOME;
        const trav = trvMin(prevC, coords[sl.studentId]||HOME);
        // The first lesson of the day always starts exactly at the window open — travel
        // from home doesn't push it later, the tutor just leaves home early enough.
        cur = i===0 ? dayStart : this.toMin(out[i-1].end)+trav+(settings.travelMargin||2);
        const end = cur+sl.duration;
        if(end>dayEnd) return null;
        out.push({...sl, start:this.toTime(cur), end:this.toTime(end)});
        cur=end;
      }
      return out;
    };

    const sc = {};
    for(const d of wdays){ const b=rebuildDay([...(schedule[d]||[])],d); sc[d]=b||[...(schedule[d]||[])]; }

    let curKm=calcSchedKm(sc), bestKm=curKm;
    const bestSch = {};
    for(const d of wdays) bestSch[d]=[...sc[d]];

    let ss=77777;
    const rng=()=>{ss=(ss*1664525+1013904223)&0xffffffff;return(ss>>>0)/0xffffffff;};

    const T_START=1.5, T_END=0.005;
    const t0=Date.now();
    let iter=0;

    while(Date.now()-t0<budgetMs){
      // Periodically hand control back to the browser so the UI (progress bar,
      // shimmer) can actually repaint instead of the tab looking frozen for 25s straight.
      if(++iter%150===0) await new Promise(r=>setTimeout(r,0));
      const elapsed=(Date.now()-t0)/budgetMs;
      const T=T_START*Math.pow(T_END/T_START,elapsed);
      const activeDays=wdays.filter(d=>(sc[d]||[]).length>0);
      if(!activeDays.length) break;

      const moveType=Math.floor(rng()*3);
      let d1,d2,newSl1,newSl2,newSl;

      if(moveType===0){
        d1=activeDays[Math.floor(rng()*activeDays.length)];
        const sl=[...sc[d1]]; if(sl.length<2) continue;
        const i=Math.floor(rng()*sl.length);
        const j=(i+1+Math.floor(rng()*(sl.length-1)))%sl.length;
        [sl[i],sl[j]]=[sl[j],sl[i]];
        newSl=rebuildDay(sl,d1); if(!newSl) continue;
        const saved=sc[d1]; sc[d1]=newSl;
        const nKm=calcSchedKm(sc);
        const delta=nKm-curKm;
        if(delta<0||rng()<Math.exp(-delta/T)){curKm=nKm;if(nKm<bestKm){bestKm=nKm;for(const d of wdays)bestSch[d]=[...sc[d]];}}
        else sc[d1]=saved;
      } else if(moveType===1){
        d1=activeDays[Math.floor(rng()*activeDays.length)];
        d2=wdays[Math.floor(rng()*wdays.length)];
        if(d1===d2) continue;
        const sl1=[...sc[d1]];
        const idx=Math.floor(rng()*sl1.length);
        // Merged/group blocks represent multiple people or sessions at once — this
        // move only checks the primary studentId's constraints, so leave those in place.
        if(sl1[idx].merged||sl1[idx].isGroup) continue;
        const sl2=[...sc[d2]||[]];
        const moved=sl1.splice(idx,1)[0];
        // Don't move to a day where this student already has a slot
        if(sl2.some(s=>s.studentId===moved.studentId)) continue;
        // rebuildDay only checks the TEACHER's working hours for d2, not whether
        // this particular student is personally available that day — without this
        // check SA can (and did) move a student onto a day they marked as off.
        if(!isAvailable(moved.studentId, d2)) continue;
        sl2.splice(Math.floor(rng()*(sl2.length+1)),0,moved);
        newSl1=rebuildDay(sl1,d1);
        newSl2=rebuildDay(sl2,d2); if(!newSl2) continue;
        const s1=sc[d1],s2=sc[d2];
        sc[d1]=newSl1||sl1; sc[d2]=newSl2;
        const nKm=calcSchedKm(sc);
        const delta=nKm-curKm;
        if(delta<0||rng()<Math.exp(-delta/T)){curKm=nKm;if(nKm<bestKm){bestKm=nKm;for(const d of wdays)bestSch[d]=[...sc[d]];}}
        else{sc[d1]=s1;sc[d2]=s2;}
      } else {
        if(activeDays.length<2) continue;
        d1=activeDays[Math.floor(rng()*activeDays.length)];
        d2=activeDays[Math.floor(rng()*activeDays.length)];
        if(d1===d2) continue;
        const sl1=[...sc[d1]], sl2=[...sc[d2]];
        const i1=Math.floor(rng()*sl1.length), i2=Math.floor(rng()*sl2.length);
        const a=sl1[i1], b=sl2[i2];
        // Merged/group blocks represent multiple people or sessions at once — swapping
        // only re-checks the primary studentId's constraints, so leave those in place.
        if(a.merged||a.isGroup||b.merged||b.isGroup) continue;
        // Skip swap if it would put same student twice on same day
        if(sl1.some((s,i)=>i!==i1&&s.studentId===b.studentId)) continue;
        if(sl2.some((s,i)=>i!==i2&&s.studentId===a.studentId)) continue;
        // a moves to d2, b moves to d1 — each must be personally available on
        // the day it's landing on, not just fit the teacher's working hours there.
        if(!isAvailable(a.studentId, d2) || !isAvailable(b.studentId, d1)) continue;
        [sl1[i1],sl2[i2]]=[sl2[i2],sl1[i1]];
        newSl1=rebuildDay(sl1,d1); newSl2=rebuildDay(sl2,d2);
        if(!newSl1||!newSl2) continue;
        const s1=sc[d1],s2=sc[d2];
        sc[d1]=newSl1; sc[d2]=newSl2;
        const nKm=calcSchedKm(sc);
        const delta=nKm-curKm;
        if(delta<0||rng()<Math.exp(-delta/T)){curKm=nKm;if(nKm<bestKm){bestKm=nKm;for(const d of wdays)bestSch[d]=[...sc[d]];}}
        else{sc[d1]=s1;sc[d2]=s2;}
      }
    }

    for(const d of wdays) schedule[d]=bestSch[d]||[];
  },

  verifySchedule(schedule, students, settings){
    const issues=[];
    const D=['','Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ'];
    const sm=Object.fromEntries(students.map(s=>[s.id,s]));
    for(const d of settings.workDays){
      const slots=(schedule[d]||[]).slice().sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
      const dh=settings.dayHours[d];
      for(let i=0;i<slots.length;i++){
        const sl=slots[i]; const st=sm[sl.studentId];
        if(dh && this.toMin(sl.end)>this.toMin(dh.end)+15)
          issues.push(`${sl.studentName} ${D[d]}: τελειώνει μετά το ωράριο (${sl.end}>${dh.end})`);
        if(st){
          const av=st.availability[d];
          if(!av||!av.on) issues.push(`${sl.studentName} δεν είναι διαθέσιμος ${D[d]}`);
          else if(this.toMin(sl.start)<this.toMin(av.start)||this.toMin(sl.end)>this.toMin(av.end)+15)
            issues.push(`${sl.studentName} ${D[d]} ${sl.start}-${sl.end} εκτός παραθύρου ${av.start}-${av.end}`);
        }
        if(i>0&&this.toMin(sl.start)<this.toMin(slots[i-1].end))
          issues.push(`Επικάλυψη ${D[d]}: ${slots[i-1].studentName} & ${sl.studentName}`);
      }
    }
    return issues;
  },

  // Final safety net, run after every optimization phase regardless of which
  // phase (if any) caused the problem: find any slot that violates the
  // student's own availability window or the teacher's day hours, pull it out,
  // and try to re-place that exact student on one of their genuinely available
  // days via findSlotFixed (which always re-validates availability). If no
  // valid day/time can be found, the slot is dropped rather than left
  // violating — the student then shows up in the normal "unplaced" banner
  // instead of silently sitting on a day they said they can't do.
  //
  // Skips merged/group blocks (splitting them safely needs the merge/group
  // logic itself, not a generic single-slot re-placement) — those remain
  // covered by verifySchedule()'s reporting only.
  enforceConstraints(schedule, students, settings){
    const sm = Object.fromEntries(students.map(s=>[s.id,s]));
    let repaired = 0, dropped = 0;
    for(const d of settings.workDays){
      const slots = schedule[d] = schedule[d] || [];
      for(let i=slots.length-1; i>=0; i--){
        const sl = slots[i];
        if(sl.merged || sl.isGroup) continue;
        const st = sm[sl.studentId];
        if(!st) continue;
        const av = st.availability[d];
        const dh = settings.dayHours[d];
        const violates = !av || !av.on ||
          this.toMin(sl.start) < this.toMin(av.start) ||
          this.toMin(sl.end) > this.toMin(av.end) + 15 ||
          (dh && this.toMin(sl.end) > this.toMin(dh.end) + 15);
        if(!violates) continue;

        slots.splice(i, 1);
        repaired++;
        let placed = false;
        for(const day2 of settings.workDays){
          if(day2 === d) continue; // already proven invalid/removed from here
          if(!st.forceMerge && (schedule[day2]||[]).some(s2 => s2.studentId === st.id)) continue;
          const newSlot = this.findSlotFixed(st, day2, schedule[day2]||[], settings, sl.duration || st.lessonDuration);
          if(newSlot){
            schedule[day2] = schedule[day2] || [];
            schedule[day2].push({ ...sl, start: newSlot.start, end: newSlot.end });
            schedule[day2].sort((a,b) => this.toMin(a.start) - this.toMin(b.start));
            placed = true;
            break;
          }
        }
        if(!placed) dropped++;
      }
    }
    return { repaired, dropped };
  },

  // Phase 5: LNS — destroy 2-4 slots blocking an unplaced student, re-place everyone
  async lnsRepair(schedule, students, settings, budgetMs=10000, onProgress=null){
    const wdays = settings.workDays;
    // Group members must only ever be placed together, and forceMerge students already
    // got their combined block in Phase 0 — neither should be solo-repaired here.
    const isGroupMember = s => !!(s.pairedWith || (s.type==='group' && s.group));
    // How many days a student could theoretically be placed on — a rough proxy for
    // how easy they are to re-place if bumped. Destroying a tightly-constrained
    // student's slot to free room for someone else risks turning a fixable gap
    // into a NEW unplaced student who may never find another slot; a flexible
    // student is much more likely to land somewhere else.
    const availDayCount = s => wdays.filter(d => { const av=s.availability[d]; return av&&av.on; }).length;
    const copyS = s=>{const o={};for(const d of wdays)o[d]=[...(s[d]||[])];return o;};
    // Count by mergedCount, not raw entry count — a single 2-session merged block
    // must count as 2, or this thinks a fully-placed student is still short one.
    const countM = sch=>{const m={};Object.values(sch).flat().forEach(e=>{m[e.studentId]=(m[e.studentId]||0)+(e.mergedCount||1);});return m;};
    const getUnpl = sch=>{const m=countM(sch);return students.filter(s=>!isGroupMember(s)&&!s.forceMerge&&(m[s.id]||0)<s.lessonsPerWeek);};
    let best=copyS(schedule), bestU=getUnpl(best).length;
    if(!bestU) return;

    // Deterministic pre-pass: try placing every unplaced student directly into
    // any open slot first, with NO destruction at all. The randomized
    // destroy-and-reinsert loop below only ever tries to place someone AFTER
    // successfully destroying something first — if a student's available day
    // is simply empty or has room without bumping anyone, there's nothing to
    // destroy, `destroyed` stays empty, and the loop skips straight past the
    // placement attempt entirely. That silently missed the easy, no-conflict
    // case (an empty or lightly-loaded day within the student's own window).
    for(const target of getUnpl(best)){
      let remaining = target.lessonsPerWeek - (countM(best)[target.id]||0);
      const tdays = wdays.filter(d=>{ const av=target.availability[d]; return av&&av.on; });
      for(const d of tdays){
        if(remaining<=0) break;
        if((best[d]||[]).some(s=>s.studentId===target.id)) continue;
        const slot = this.findSlotFixed(target, d, best[d]||[], settings, target.lessonDuration);
        if(slot){
          best[d]=best[d]||[];
          best[d].push({studentId:target.id,studentName:target.name,subject:target.subject||'—',address:target.address,color:target.color||0,start:slot.start,end:slot.end,duration:target.lessonDuration,mergedCount:1,merged:false});
          best[d].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          remaining--;
        }
      }
    }
    bestU = getUnpl(best).length;
    if(!bestU){ for(const d of wdays) schedule[d]=best[d]||[]; return; }

    let ss=31337;
    const rng=()=>{ss=(ss*1664525+1013904223)&0xffffffff;return(ss>>>0)/0xffffffff;};
    const t0=Date.now();
    let iter=0, lastProgress=t0;
    while(Date.now()-t0<budgetMs && bestU>0){
      // Yield to the browser periodically so a long budget (this can run for
      // minutes when there are still unplaced students) never looks frozen.
      if(++iter%200===0){
        await new Promise(r=>setTimeout(r,0));
        const now=Date.now();
        if(onProgress && now-lastProgress>1000){ lastProgress=now; onProgress(bestU, now-t0, budgetMs); }
      }
      const sc=copyS(best);
      const unpl=getUnpl(sc); if(!unpl.length) break;
      const target=unpl[Math.floor(rng()*unpl.length)];
      const tdays=wdays.filter(d=>{const av=target.availability[d];return av&&av.on;});
      if(!tdays.length) continue;
      const dc=2+Math.floor(rng()*3); const destroyed=[];
      for(let k=0;k<dc;k++){
        const d=tdays[Math.floor(rng()*tdays.length)];
        if(!sc[d]||!sc[d].length) continue;
        // Never destroy a merged/group block — it can't be correctly rebuilt with a
        // single-session reinsertion below, which would silently drop the merge.
        const candidates=sc[d].map((s,i)=>({s,i})).filter(x=>!x.s.merged&&!x.s.isGroup);
        if(!candidates.length) continue;
        // Prefer victims whose own student is flexible (available 3+ days) over
        // someone with only 1-2 available days — only fall back to a constrained
        // victim if literally nobody flexible occupies this day's schedule.
        const flexible = candidates.filter(({s})=>{
          const st = students.find(x=>x.id===s.studentId);
          return st && availDayCount(st) >= 3;
        });
        const pool = flexible.length ? flexible : candidates;
        const {s:victim,i:idx}=pool[Math.floor(rng()*pool.length)];
        destroyed.push(students.find(s=>s.id===victim.studentId));
        sc[d].splice(idx,1);
      }
      if(!destroyed.length) continue;
      let placed=false;
      for(const d of tdays){
        const m=countM(sc); if((m[target.id]||0)>=target.lessonsPerWeek) break;
        // Never place student twice on same day
        if((sc[d]||[]).some(s=>s.studentId===target.id)) continue;
        const slot=this.findSlotFixed(target,d,sc[d]||[],settings,target.lessonDuration);
        if(slot){
          sc[d]=sc[d]||[];
          sc[d].push({studentId:target.id,studentName:target.name,subject:target.subject||'—',address:target.address,color:target.color||0,start:slot.start,end:slot.end,duration:target.lessonDuration,mergedCount:1,merged:false});
          sc[d].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          placed=true;
        }
      }
      if(!placed) continue;
      for(const ds of destroyed){
        if(!ds) continue;
        for(const d of wdays){
          const m=countM(sc); if((m[ds.id]||0)>=ds.lessonsPerWeek) break;
          if((sc[d]||[]).some(s=>s.studentId===ds.id)) continue;
          const slot=this.findSlotFixed(ds,d,sc[d]||[],settings,ds.lessonDuration);
          if(slot){
            sc[d]=sc[d]||[];
            sc[d].push({studentId:ds.id,studentName:ds.name,subject:ds.subject||'—',address:ds.address,color:ds.color||0,start:slot.start,end:slot.end,duration:ds.lessonDuration,mergedCount:1,merged:false});
            sc[d].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          }
        }
      }
      const nu=getUnpl(sc).length;
      if(nu<bestU){bestU=nu;Object.assign(best,copyS(sc));}
    }
    for(const d of wdays) schedule[d]=best[d]||[];
  },

  // Phase 4: after SA, try to slot in students that weren't placed
  saRepair(schedule, students, settings, schedulerResult){
    // Group members must only ever be placed together — never solo-repair one half of a group
    const isGroupMember = s => !!(s.pairedWith || (s.type==='group' && s.group));
    const placed = new Set(
      Object.values(schedule).flat().map(e=>e.studentId)
    );
    const unplaced = students.filter(s=>!isGroupMember(s)&&!s.forceMerge&&!placed.has(s.id));
    if(!unplaced.length) return;

    for(const s of unplaced){
      let remaining = s.lessonsPerWeek - this.countPlaced(s.id, schedule);
      for(const day of settings.workDays){
        if(remaining<=0) break;
        const slot = this.findSlotFixed(s, day, schedule[day]||[], settings, s.lessonDuration);
        if(slot){
          schedule[day] = schedule[day]||[];
          schedule[day].push({
            studentId:s.id, studentName:s.name, subject:s.subject||'—',
            address:s.address, color:s.color||0,
            start:slot.start, end:slot.end,
            duration:s.lessonDuration, mergedCount:1, merged:false
          });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          remaining--;
          if(schedulerResult) schedulerResult.placed = (schedulerResult.placed||0)+1;
        }
      }

// ROUTER (OpenRouteService)
// ============================================================
// Geocoding: Nominatim (OpenStreetMap) — free, no key
// Routing:   OSRM public demo server — free, no key
// ============================================================
const Router = {
  NOMINATIM: 'https://nominatim.openstreetmap.org',
  OSRM:      'https://router.project-osrm.org',

  // Bias results toward the user's actual working area (±~30km around home) so an
  // ambiguous street name doesn't accidentally resolve to a same-named street elsewhere in Greece.
  _viewboxParam(){
    const home = (typeof state!=='undefined') && state.coords && state.coords['home'];
    if(!home) return '';
    const d = 0.3; // ~30km
    return `&viewbox=${home.lon-d},${home.lat+d},${home.lon+d},${home.lat-d}&bounded=1`;
  },

  async geocode(address){
    if(!address) return null;
    try{
      const q = encodeURIComponent(address + ', Ελλάδα');
      const url = `${this.NOMINATIM}/search?q=${q}&format=json&limit=1&countrycodes=gr&addressdetails=1${this._viewboxParam()}`;
      const r = await fetch(url, {headers:{'Accept-Language':'el'}});
      if(!r.ok){
        console.warn(`Nominatim geocode failed for "${address}": HTTP ${r.status} ${r.statusText}`);
        return null;
      }
      let d = await r.json();
      // Bounded search found nothing (e.g. address genuinely outside the home area) — retry unbounded
      if((!Array.isArray(d) || d.length===0) && this._viewboxParam()){
        const url2 = `${this.NOMINATIM}/search?q=${q}&format=json&limit=1&countrycodes=gr&addressdetails=1`;
        const r2 = await fetch(url2, {headers:{'Accept-Language':'el'}});
        if(!r2.ok){
          console.warn(`Nominatim geocode (unbounded retry) failed for "${address}": HTTP ${r2.status} ${r2.statusText}`);
          return null;
        }
        d = await r2.json();
      }
      if(Array.isArray(d) && d.length>0) return {lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon)};
      console.warn(`Nominatim found no results for "${address}"`);
    }catch(e){
      console.warn(`Nominatim geocode threw for "${address}":`, e.message);
    }
    return null;
  },

  // HERE Geocoding — used when a key is configured, since it doesn't need the
  // strict ~1-request/second throttling Nominatim's free public server
  // requires (see App.runAndNotify's bulk geocoding loop).
  async geocodeHere(address, key){
    if(!address) return null;
    try{
      const q = encodeURIComponent(address);
      const url = `https://geocode.search.hereapi.com/v1/geocode?q=${q}&in=countryCode:GRC&limit=1&lang=el&apiKey=${key}`;
      const r = await fetch(url);
      if(!r.ok) return null;
      const d = await r.json();
      const item = d.items && d.items[0];
      if(item && item.position) return {lat:item.position.lat, lon:item.position.lng};
    }catch(e){}
    return null;
  },

  // OSRM Table API: returns duration (seconds) and distance (meters) matrix
  async getMatrix(coords){
    if(coords.length < 2) return null;
    try{
      const pts = coords.map(c=>`${c.lon},${c.lat}`).join(';');
      const url = `${this.OSRM}/table/v1/driving/${pts}?annotations=duration,distance`;
      const r = await fetch(url);
      if(!r.ok) return null;
      const d = await r.json();
      if(d.code !== 'Ok') return null;
      // Normalise to same shape used by old ORS matrix
      return { durations: d.durations, distances: d.distances };
    }catch(e){ return null }
  },

  // OSRM Route API: returns actual road-following geometry (GeoJSON coords) for a stop sequence
  async getRouteGeometry(coords){
    if(coords.length < 2) return null;
    try{
      const pts = coords.map(c=>`${c.lon},${c.lat}`).join(';');
      const url = `${this.OSRM}/route/v1/driving/${pts}?overview=full&geometries=geojson`;
      const r = await fetch(url);
      if(!r.ok) return null;
      const d = await r.json();
      if(d.code !== 'Ok' || !d.routes?.[0]) return null;
      // GeoJSON is [lon,lat] — Leaflet wants [lat,lon]
      return d.routes[0].geometry.coordinates.map(([lon,lat])=>[lat,lon]);
    }catch(e){ return null }
  },

  async getHereMatrix(coords, apiKey, departureTime){
    // HERE Matrix Routing API v8
    // coords: array of {lat, lon} objects (home first, then students)
    // departureTime: ISO string like "2024-01-15T17:00:00"
    const origins = coords.map(c=>({lat:c.lat,lng:c.lon}));
    const destinations = origins;
    const body = {
      origins, destinations,
      departureTime: departureTime || new Date().toISOString(),
      routingMode:'fast', transportMode:'car',
      matrixAttributes:['travelTimes']
    };
    const url = `https://matrix.router.hereapi.com/v8/matrix?async=false&apiKey=${encodeURIComponent(apiKey)}`;
    const resp = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if(!resp.ok) throw new Error(`HERE API ${resp.status}`);
    const data = await resp.json();
    // data.matrix.travelTimes is flat array, numOrigins × numDestinations
    const n = coords.length;
    const durations = [];
    for(let i=0;i<n;i++){
      durations.push([]);
      for(let j=0;j<n;j++){
        const idx = i*n+j;
        durations[i].push(data.matrix&&data.matrix.travelTimes?data.matrix.travelTimes[idx]:null);
      }
    }
    return {durations, coords};
  },

  // Nearest-neighbor TSP for ordering stops
  nnRoute(stops){
    if(stops.length<=1) return stops.map((_,i)=>i);
    const n=stops.length, visited=new Array(n).fill(false), order=[0];
    visited[0]=true;
    for(let i=1;i<n;i++){
      const last=order[order.length-1];
      let best=-1,bestD=Infinity;
      for(let j=0;j<n;j++){
        if(visited[j]) continue;
        const d=this.dist(stops[last],stops[j]);
        if(d<bestD){bestD=d;best=j}
      }
      if(best>=0){order.push(best);visited[best]=true}
    }
    return order;
  },

  dist(a,b){
    if(!a||!b) return Infinity;
    const dx=(a.lon||0)-(b.lon||0), dy=(a.lat||0)-(b.lat||0);
    return Math.sqrt(dx*dx+dy*dy);
  },

  // Estimate km from degree distance
  degreesToKm(deg){ return deg * 111 },

  estimateKm(a,b){
    if(!a||!b) return 0;
    const dx=a.lon-b.lon, dy=a.lat-b.lat;
    return this.degreesToKm(Math.sqrt(dx*dx+dy*dy));
  },

};

let _schedCreepTimer=null;
function schedProgress(pct, phase, sub, icon){
  const ov=document.getElementById('sched-overlay');
  if(!ov) return;
  if(pct===null){
    clearInterval(_schedCreepTimer); _schedCreepTimer=null;
    ov.style.opacity='0';
    setTimeout(()=>{ ov.style.display='none'; ov.style.opacity=''; const wn=document.getElementById('sched-warn'); if(wn) wn.textContent=''; },300);
    return;
  }
  ov.style.display='block';
  const bar=document.getElementById('sched-bar');
  const ph=document.getElementById('sched-phase');
  const sb=document.getElementById('sched-sub');
  const pc=document.getElementById('sched-pct');
  const ic=document.getElementById('sched-icon');
  const wn=document.getElementById('sched-warn');
  if(wn && !wn.textContent) wn.textContent = t('sched_dont_change_settings');
  if(bar) bar.style.width=pct+'%';
  // Keep the bar creeping forward continuously between explicit phase updates
  // — asymptotically toward 99% (never quite arriving) so it never sits
  // frozen even during a long phase (SA runs ~25s, the persistent search can
  // run minutes), and always jumps cleanly upward whenever the next real
  // phase update lands.
  clearInterval(_schedCreepTimer);
  let creepPct=pct;
  _schedCreepTimer=setInterval(()=>{
    creepPct += (99-creepPct)*0.01;
    if(bar) bar.style.width=creepPct+'%';
  },150);
  if(ph&&phase){
    ph.style.opacity='0';
    ph.style.transform='translateY(-4px)';
    setTimeout(()=>{ ph.textContent=phase; ph.style.opacity='1'; ph.style.transform='translateY(0)'; },150);
  }
  if(sb&&sub){
    sb.style.opacity='0';
    setTimeout(()=>{ sb.textContent=sub; sb.style.opacity='1'; },150);
  }
  if(pc) pc.textContent=pct+'%';
  if(ic&&icon){
    ic.style.transform='scale(0.6)';
    setTimeout(()=>{ ic.textContent=icon; ic.style.transform='scale(1)'; },100);
  }
}

  },

  // Straight-line ("as the crow flies") estimate — instant, no network. Used as
  // an immediate placeholder and as the per-day fallback when OSRM is
  // unreachable for _estimateTotalKmReal below.
  _estimateTotalKm(schedule){
    const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');
    let total = 0;
    for(const day of Object.keys(schedule)){
      const slots = schedule[day];
      if(!slots.length) continue;
      let prev = homeC;
      let prevSl = null;
      for(const sl of slots){
        const c = state.coords[sl.studentId] || Scheduler.coordsHash(sl.address);
        const sameLocation = prevSl && (prevSl.studentId === sl.studentId ||
          (prevSl.groupCode && prevSl.groupCode === sl.groupCode));
        if(!sameLocation) total += Router.estimateKm(prev, c);
        prev = c;
        prevSl = sl;
      }
      total += Router.estimateKm(prev, homeC);
    }
    return total;
  },

  // Real driving-distance total (home → first lesson → … → last lesson → home,
  // for every work day, summed for the week) using OSRM's road network — the
  // same source of truth as the Route screen, so this matches what you'd see
  // in Google Maps/Waze instead of a straight-line guess. One matrix request
  // per day (home + that day's unique stop locations); any day whose request
  // fails falls back to the straight-line estimate for just that day, so a
  // single network hiccup never blanks out the whole week's total.
  async _estimateTotalKmReal(schedule){
    const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');
    let total = 0;
    for(const day of Object.keys(schedule)){
      const slots = schedule[day].slice().sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
      if(!slots.length) continue;
      const uniqueSlots = [];
      let prevSl = null;
      slots.forEach(sl=>{
        const sameLocation = prevSl && (prevSl.studentId === sl.studentId ||
          (prevSl.groupCode && prevSl.groupCode === sl.groupCode));
        if(!sameLocation) uniqueSlots.push(sl);
        prevSl = sl;
      });
      if(!uniqueSlots.length) continue;
      const coordsList = [homeC, ...uniqueSlots.map(sl => state.coords[sl.studentId] || Scheduler.coordsHash(sl.address)), homeC];
      let dayKm = null;
      try{
        const matrix = await Router.getMatrix(coordsList);
        if(matrix && matrix.distances){
          dayKm = 0;
          for(let i=0;i<coordsList.length-1;i++) dayKm += (matrix.distances[i]?.[i+1]||0)/1000;
        }
      }catch(e){ /* fall through to straight-line for this day */ }
      if(dayKm == null){
        dayKm = 0;
        let prev = homeC;
        uniqueSlots.forEach(sl=>{
          const c = state.coords[sl.studentId] || Scheduler.coordsHash(sl.address);
          dayKm += Router.estimateKm(prev, c);
          prev = c;
        });
        dayKm += Router.estimateKm(prev, homeC);
      }
      total += dayKm;
    }
    return total;
  },

  // Opens a clean printable view of the full weekly schedule in a new tab and
  // triggers the browser's print dialog — user picks "Save as PDF" there.
  // Builds and downloads a real .pdf file directly (jsPDF), instead of opening a
  // print dialog — window.print() from a JS-opened window is unreliable on iOS,
  // especially when the app is installed as a standalone PWA (no browser chrome
  // to offer "Save as PDF" from), so it often looked like nothing happened.
  // Builds and downloads a real .pdf file directly, instead of opening a print
  // dialog — window.print() from a JS-opened window is unreliable on iOS,
  // especially when the app is installed as a standalone PWA (no browser chrome
  // to offer "Save as PDF" from), so it often looked like nothing happened.
  //

      </style>
      <div class="pdf-header">
        <div>
          <div class="pdf-brand">Route<b>Pal</b></div>
          <div class="pdf-brand-sub">${esc(t('print_h1_sub'))}</div>
        </div>
        <div class="pdf-meta">
          <strong>${esc(teacherName)}</strong>
          ${esc(genDate)}
        </div>
      </div>
      <div class="pdf-stats">
        <div class="pdf-stat"><div class="pdf-stat-val">${totalLessons}</div><div class="pdf-stat-label">${esc(t('print_lessons_suffix'))}</div></div>
        <div class="pdf-stat"><div class="pdf-stat-val">${totalStudents}</div><div class="pdf-stat-label">${esc((getLabels().clients||'').toUpperCase())}</div></div>
        <div class="pdf-stat"><div class="pdf-stat-val">${totalHours}${esc(t('unit_hr'))}</div><div class="pdf-stat-label">${esc(t('home_hours_week').toUpperCase())}</div></div>
      </div>
      ${daysHtml}
      <div class="pdf-footer">RoutePal · ${esc(genDate)}</div>
    `;
    document.body.appendChild(container);

    try{
      const canvas = await html2canvas(container, {scale:2, backgroundColor:'#ffffff', useCORS:true});
      const doc = new jspdf.jsPDF({unit:'pt', format:'a4'});
      const pageW = doc.internal.pageSize.getWidth(), pageH = doc.internal.pageSize.getHeight();
      const imgW = pageW;
      const imgH = canvas.height * imgW / canvas.width;
      const imgData = canvas.toDataURL('image/png');
      let heightLeft = imgH, position = 0;
      doc.addImage(imgData, 'PNG', 0, position, imgW, imgH);
      heightLeft -= pageH;
      while(heightLeft > 0){
        position -= pageH;
        doc.addPage();
        doc.addImage(imgData, 'PNG', 0, position, imgW, imgH);
        heightLeft -= pageH;
      }
      const safeTeacher = teacherName.replace(/[^\p{L}\p{N}]+/gu,'-').replace(/^-+|-+$/g,'') || 'routepal';
      doc.save(`${safeTeacher}-${t('print_title').toLowerCase()}.pdf`);
      Toast.show(t('toast_pdf_downloaded'),'success');
    }catch(e){
      console.error('PDF generation failed:', e);
      Toast.show(t('toast_pdf_lib_failed'),'error');
    }finally{
      document.body.removeChild(container);
    }
  },

  async runAndNotify(){
    const btn = document.querySelector('.btn[onclick*="runAndNotify"]');
    if(btn){ btn.disabled=true; btn.style.opacity='0.6'; btn.innerHTML = btn.innerHTML.replace(new RegExp(t('schedule_refresh')+'|<svg[^>]*>.*?<\\/svg>\\s*','s'),'') ; btn.textContent = t('debug_geocoding'); }
    state._schedulingInProgress = true;
    // Safety net: if something throws outside the phases' own try/catch guards
    // and this never gets to its normal cleanup, don't leave Settings blocked
    // forever — force-clear after longer than any legitimate run could take.
    clearTimeout(this._schedulingWatchdog);
    this._schedulingWatchdog = setTimeout(()=>{ state._schedulingInProgress=false; }, 9*60*1000);
    this.requestNotifyPermission(); // user-gesture-triggered, fine to ask here

    // Geocode any missing addresses before scheduling
    const toGeocode = [];
    if(!state.coords['home']){
      toGeocode.push({ id:'home', addr: state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα' });
    }
    for(const st of state.students){
      if(st.address && !state.coords[st.id]) toGeocode.push({ id:st.id, addr:st.address });
    }
    if(toGeocode.length > 0){
      const hereKey = state.settings && state.settings.hereApiKey;
      let updated = false, failed = 0;
      // Home first, awaited alone — Nominatim biases every later search
      // toward it via Router._viewboxParam(), which only works once home's
      // own coords are actually in state.coords (they weren't yet if it was
      // batched into the same parallel round as everyone else).
      const homeItem = toGeocode.find(x=>x.id==='home');
      const rest = toGeocode.filter(x=>x.id!=='home');
      if(homeItem){
        const c = hereKey ? await Router.geocodeHere(homeItem.addr, hereKey) : await Router.geocode(homeItem.addr);
        if(c){ state.coords['home']=c; updated=true; } else failed++;
      }
      if(hereKey){
        // HERE's per-key rate limits are generous enough for a batch like
        // this — no artificial throttling needed.
        const results = await Promise.allSettled(rest.map(({id,addr})=>Router.geocodeHere(addr,hereKey).then(c=>({id,c}))));
        for(const res of results){ if(res.status==='fulfilled' && res.value.c){ state.coords[res.value.id]=res.value.c; updated=true; } else failed++; }
      } else {
        // Nominatim's free public server enforces ~1 request/second. Firing
        // every student's geocode request in parallel (the old behavior) got
        // most of them silently rejected/rate-limited, which fell back to
        // meaningless pseudo-coordinates near a fixed default point instead
        // of the student's real location — exactly the "map shows the wrong
        // city" bug. Go one at a time instead.
        for(const {id,addr} of rest){
          const c = await Router.geocode(addr);
          if(c){ state.coords[id]=c; updated=true; } else failed++;
          await new Promise(r=>setTimeout(r,1100));
        }
      }
      if(updated) Storage.saveCoords(state.coords);
      // Surface failures instead of letting them silently become
      // wrong-looking pins on the map — check the console for the specific
      // HTTP status/reason logged by Router.geocode() per failed address.
      if(failed > 0) Toast.show(tf('toast_geocode_failures',{n:failed}), 'error');
    }
    /*i18n-note: default homeAddress fallback ("Πλατεία Γεωργίου 1, Πάτρα") intentionally kept as literal Greek demo address text*/

    if(btn){ btn.disabled=true; btn.style.opacity='0.6'; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> ${t('debug_calc_prefix')}`; }
    schedProgress(5,t('phase1_title'),t('phase1_sub'),'🧩');
    await new Promise(r=>setTimeout(r,40));

    // Fetch routing matrices BEFORE scheduling so travelEstMin() uses real road times
    state.travelMatrixPeak = null;
    state.travelMatrixOffPeak = null;
    state.travelMatrix = null;
    try{
      const hereKey = state.settings && state.settings.hereApiKey;
      const allStudentIds = state.students.map(s=>s.id);
      const allIds = ['home', ...allStudentIds];
      const matCoords = allIds.map(id=>state.coords[id]).filter(Boolean);
      const validIds = allIds.filter(id=>state.coords[id]);
      if(matCoords.length >= 2){
        if(hereKey){
          // Peak: weekdays 17:00
          const depPeak = new Date(); depPeak.setHours(17,0,0,0);
          const matPeak = await Router.getHereMatrix(matCoords, hereKey, depPeak.toISOString());
          state.travelMatrixPeak = {durations: matPeak.durations, coordIds: validIds};
          // Off-peak: Saturday 11:00
          const depOff = new Date(); depOff.setHours(11,0,0,0);
          const dow = depOff.getDay(); if(dow!==6) depOff.setDate(depOff.getDate()+(6-dow+7)%7||7);
          const matOff = await Router.getHereMatrix(matCoords, hereKey, depOff.toISOString());
          state.travelMatrixOffPeak = {durations: matOff.durations, coordIds: validIds};
        } else {
          const matrix = await Router.getMatrix(matCoords).catch(()=>null);
          if(matrix && matrix.durations){
            // No traffic data — use same matrix for both (OSRM is traffic-free)
            state.travelMatrixPeak = {durations: matrix.durations, coordIds: validIds};
            state.travelMatrixOffPeak = {durations: matrix.durations, coordIds: validIds};
          }
        }
      }
    }catch(e){ console.warn('Matrix pre-fetch failed, using straight-line estimates:', e); }

    // Phase 1: backtracking CSP — multiple randomized attempts, keep the one that
    // places the most students (km is only a tie-breaker, never sacrifices a student)
    const attemptCount = state.settings.scheduleQuality==='thorough' ? 8 : 6;
    schedProgress(15,t('phase1b_title'),tf('phase1b_sub',{n:attemptCount}),'🧩');
    await new Promise(r=>setTimeout(r,40));
    let r;
    try{
      if(state.students.length===0){ schedProgress(null); return; }
      const result = Scheduler.runMultiAttempt(state.students, state.settings, state.coords, attemptCount);
      state.scheduleAttempts = [result];
      state.scheduleAttemptIdx = 0;
      state.scheduleOptimized = false;
      state.scheduleKmBefore = null;
      state.scheduleKmAfter = null;
      state.schedule = result.schedule;
      state.schedulerResult = result;
      state.routeResults = {};
      r = result;
    }catch(e){ console.error('Scheduler error',e); }

    // Phase 2: geo-optimize
    schedProgress(35,t('phase2_title'),t('phase2_sub'),'🗺️');
    await new Promise(r=>setTimeout(r,40));
    try{ Scheduler.geoOptimize(state.schedule, state.students, state.settings, state.coords); }catch(e){}

    // Phase 3: Simulated Annealing
    schedProgress(55,t('phase3_title'),t('phase3_sub_short'),'🔥');
    await new Promise(r=>setTimeout(r,40));
    try{
      const travelMinFn = null; // uses state.travelMatrixPeak via travelEstMin
      await Scheduler.saOptimize(state.schedule, state.students, state.settings, state.coords, travelMinFn, 25000);
    }catch(e){}

    // Phase 4: repair
    schedProgress(82,t('phase4b_title'),t('phase4b_sub'),'🔧');
    await new Promise(r=>setTimeout(r,40));
    try{ Scheduler.saRepair(state.schedule, state.students, state.settings, state.schedulerResult); }catch(e){}

    // Phase 5: LNS
    schedProgress(92,t('phase5_title'),t('phase5b_sub'),'🔍');
    await new Promise(r=>setTimeout(r,40));
    try{ await Scheduler.lnsRepair(state.schedule, state.students, state.settings, 10000); }catch(e){}

    // Safety net: forcibly fix (or drop) any slot that still violates a
    // student's own availability, regardless of which phase caused it.
    try{
      const fixResult = Scheduler.enforceConstraints(state.schedule, state.students, state.settings);
      if(fixResult.repaired) console.warn(`⚠ enforceConstraints: repaired ${fixResult.repaired-fixResult.dropped}, dropped ${fixResult.dropped}`);
    }catch(e){}

    // Still someone unplaced after the normal 10s pass? Keep trying with a much
    // longer budget (up to 7 min) instead of giving up — a short search can miss
    // a real, valid slot on a lightly-loaded day. Only runs when actually needed.
    if(this.computeUnplacedLive().length > 0){
      try{
        await Scheduler.lnsRepair(state.schedule, state.students, state.settings, 420000, (nLeft, elapsed)=>{
          schedProgress(93, t('phase_persist_title'), tf('phase_persist_sub',{n:nLeft, sec:Math.round(elapsed/1000)}), '🔁');
        });
        const fixResult2 = Scheduler.enforceConstraints(state.schedule, state.students, state.settings);
        if(fixResult2.repaired) console.warn(`⚠ enforceConstraints (after persistent search): repaired ${fixResult2.repaired-fixResult2.dropped}, dropped ${fixResult2.dropped}`);
      }catch(e){}
    }

    // Verify constraints — surfaced to the user, not just the console, so a
    // scheduling bug that violates someone's availability doesn't ship silently.
    try{
      const issues = Scheduler.verifySchedule(state.schedule, state.students, state.settings);
      if(issues.length){
        console.warn('⚠ Schedule constraint issues:', issues);
        Toast.show(tf('toast_constraint_issues',{n:issues.length}), 'error');
      }
    }catch(e){}

    if(r){
      // Instant straight-line placeholder so the stat isn't blank while the
      // real-road-distance request (below) is in flight.
      state.scheduleKmBefore = this._estimateTotalKm(state.schedule);
      // Phases 2-5 (geoOptimize/SA/repairs) can place students that were still
      // unplaced after Phase 1 — recompute the unplaced list from the FINAL
      // schedule instead of reusing Phase 1's now-stale snapshot.
      state.scheduleAttempts[0] = { ...r, schedule: state.schedule, unplaced: this.computeUnplacedLive() };
      state.schedulerResult = state.scheduleAttempts[0];
      Storage.saveSchedule(state.schedule);

      schedProgress(97,t('phase_km_title'),t('phase_km_sub'),'🚗');
      try{
        state.scheduleKmBefore = await this._estimateTotalKmReal(state.schedule);
      }catch(e){ /* keep the straight-line placeholder */ }
    }

    schedProgress(100,t('phase_done_title'),t('phase_done_sub'),'✅');
    await new Promise(r=>setTimeout(r,300));

    state._scheduleStale = false;
    schedProgress(null,null,null,null);
    state._schedulingInProgress = false;
    clearTimeout(this._schedulingWatchdog);
    this.notifyScheduleReady();
    if(btn){ btn.disabled=false; btn.style.opacity=''; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> ${t('schedule_refresh')}`; }
    // Always re-render regardless of scheduler outcome
    if(state.currentScreen==='schedule') this.renderSchedule();
    else if(state.currentScreen==='home') this.renderHome();
    // Always refresh home stats (even if not currently visible)
    if(state.currentScreen!=='home') this.renderHome();
    if(!r) return;
    const total = state.students.reduce((a,s)=>a+s.lessonsPerWeek,0);
    const placed = total - r.unplaced.reduce((a,u)=>a+(u.needed-u.placed),0);
    const att = r._attempts || 1;
    const attLabel = att > 1 ? tf('toast_attempts_suffix',{n:att}) : '';
    Toast.show(tf('toast_placed_summary',{placed,total,attempts:attLabel}),'success');
  },

            <button class="btn btn-primary" onclick="App.openStudentDrawer(null)" style="padding:8px 14px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              ${t('students_new_btn')}
            </button>
          </div>
        </div>
      </div>
      ${students.length===0?`
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <h3>${tf('students_empty_title',{clients:L.clients.toLowerCase()})}</h3>
          <p>${tf('students_empty_sub',{client:L.client.toLowerCase()})}</p>
          <button class="btn btn-primary" onclick="App.openStudentDrawer(null)">${tf('students_add_btn',{client:L.client})}</button>
        </div>
      `:`
        ${Object.keys(state.coords).filter(k=>k!=='home').length>0?`
          <div style="margin:0 0 8px;background:var(--bg2);border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;cursor:pointer" onclick="App.toggleStudentsMap()">
              <span style="font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.05em">${t('students_map_locations_label')}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;color:var(--text3)">${Object.keys(state.coords).filter(k=>k!=='home').length} ${t('students_map_locations_count')}</span>
                <svg id="map-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);transition:transform .2s;transform:rotate(${state._mapExpanded?'180':'0'}deg)"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
            <div id="students-overview-map-wrap" style="overflow:hidden;transition:max-height .3s ease;max-height:${state._mapExpanded?'220px':'0px'}">
              <div id="students-overview-map" style="height:200px;margin:0 16px 12px;border-radius:10px;overflow:hidden;background:var(--bg3);position:relative;isolation:isolate"></div>
            </div>
          </div>
        `:''}
        ${students.map(st=>this.studentCard(st)).join('')}
      `}
    `;
    if(students.length>0 && state._mapExpanded) this.initStudentsMap();
  },

  toggleStudentsMap(){
    state._mapExpanded = !state._mapExpanded;
    const wrap = document.getElementById('students-overview-map-wrap');
    const chev = document.getElementById('map-chevron');
    if(wrap) wrap.style.maxHeight = state._mapExpanded ? '220px' : '0px';
    if(chev) chev.style.transform = state._mapExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
    if(state._mapExpanded){
      // Container animates over 300ms (see max-height transition above) — initializing
      // Leaflet before it reaches full size bakes in a wrong size and the map renders
      // broken/unresponsive ("frozen"). Wait for the transition to actually finish.
      if(wrap){
        const onDone = (e)=>{ if(e && e.propertyName!=='max-height') return; wrap.removeEventListener('transitionend', onDone); this.initStudentsMap(); };
        wrap.addEventListener('transitionend', onDone);
        setTimeout(onDone, 400); // fallback in case transitionend doesn't fire
      } else {
        this.initStudentsMap();
      }
    }
  },

  initStudentsMap(){
    const el = document.getElementById('students-overview-map');
    if(!el || typeof L === 'undefined') return;
    if(el._leaflet_id){ try{ el._leaflet_map && el._leaflet_map.remove(); }catch(e){} }
    const geocodedStudents = state.students.filter(s => state.coords[s.id]);
    if(geocodedStudents.length === 0){ el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px">${t('students_map_no_geocoded')}</div>`; return; }
    const homeC = state.coords['home'];
    const pts = geocodedStudents.map(s=>state.coords[s.id]);
    const allPts = homeC ? [homeC,...pts] : pts;
    const latlngs = allPts.map(c=>[c.lat,c.lon]);
    const map = L.map(el, {
      zoomControl:false, attributionControl:false,
      dragging:false, touchZoom:false, scrollWheelZoom:false,
      doubleClickZoom:false, boxZoom:false, keyboard:false
    }).setView(latlngs[0], 12);
    el._leaflet_map = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    if(homeC){
      L.marker([homeC.lat,homeC.lon],{icon:L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#7c3aed;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).bindTooltip(t('home_marker_tooltip'),{permanent:false}).addTo(map);
    }
    const avatarColors=['#059669','#7c3aed','#d97706','#db2777','#ca8a04','#0891b2','#16a34a','#9333ea','#c2410c','#0284c7'];
    geocodedStudents.forEach(s=>{
      const c=state.coords[s.id];
      const col=avatarColors[(s.color||0)%avatarColors.length];
      const initials=esc(s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase());
      L.marker([c.lat,c.lon],{icon:L.divIcon({className:'',html:`<div style="width:26px;height:26px;background:${col};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">${initials}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).bindTooltip(`${esc(s.name)}<br><span style='font-size:11px;color:#aaa'>${esc(s.address)}</span>`,{permanent:false}).addTo(map);
    });
    try{ map.fitBounds(L.latLngBounds(latlngs).pad(0.15)); }catch(e){}
    // Defensive: if the container was resized/reflowed after this map was created
    // (e.g. drawer opened/closed above it), make sure Leaflet re-measures it.
    setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 60);
  },

  studentCard(st){

      .filter(([,v])=>v.on)
      .map(([d,v])=>`${DAYS[d]} ${v.start}–${v.end}`)

    return `
      <div class="student-card" id="sc-${st.id}">
        <div class="student-header" onclick="App.toggleStudent('${st.id}')">

          <div class="student-detail-row"><span class="student-detail-label">${t('student_address_label')}</span><span style="font-size:12px;text-align:right;max-width:200px">${esc(st.address)}${state.coords[st.id]?` <span style="color:var(--green);font-size:10px" title="${t('student_geocoded_title')} ✓">📍</span>`:`<span style="color:var(--text3);font-size:10px" title="${t('student_not_geocoded_title')}"> ○</span>`}</span></div>

          <div class="student-actions">

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              ${t('btn_edit')}
            </button>
            <button class="btn btn-danger" style="flex:1" onclick="App.deleteStudent('${st.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>

  toggleStudent(id){
    const body = document.getElementById('sb-'+id);

  openStudentDrawer(id){
    state.editingStudentId = id;
    const isNew = !id;

    document.getElementById('drawer-student-title').textContent = isNew?`${t('drawer_new_prefix')} ${L.client}`:`${t('drawer_edit_prefix')} ${L.client}`;

      </div>
      <div class="form-group">
        <label>${t('form_location_map_label')}</label>
        <div id="st-loc-map" style="height:170px;border-radius:10px;overflow:hidden;background:var(--bg3);position:relative;isolation:isolate"></div>

          </select>

      </div>

          <option value="always" ${st?.mergeMode==='always'||(st?.forceMerge&&!st?.mergeMode)?'selected':''}>${t('form_merge_always')}</option>
          <option value="auto" ${st?.mergeMode==='auto'?'selected':''}>${t('form_merge_auto')}</option>
        </select>

        <div id="merge-size-field" style="margin-top:8px;display:${(st?.mergeMode==='always'||st?.mergeMode==='auto'||(st?.forceMerge&&!st?.mergeMode))?'block':'none'}">
          <label style="font-size:12px">${t('form_max_per_block')} — <span id="st-mergesize-val">${st?.maxMergeSessions||st?.lessonsPerWeek||2}</span>× (${((st?.maxMergeSessions||st?.lessonsPerWeek||2)*(st?.lessonDuration??(state.settings.defaultLessonDuration||60)))}${t('unit_min')})</label>
          <input type="range" id="st-mergesize" min="2" max="${st?.lessonsPerWeek||5}" step="1" value="${st?.maxMergeSessions||st?.lessonsPerWeek||2}"

          ${state.students.filter(s=>s.id!==(st?.id||'')).map(s=>`<option value="${s.id}" ${(st?.pairedWith||'')=== s.id?'selected':''}>${esc(s.name)}</option>`).join('')}

  initStudentFormEvents(st){
    this.toggleGroupField();
    // Reset any picked-but-unsaved coord from a previous drawer session before
    // seeding the inline map from this student's actual saved location.
    this._addrPendingCoord = null;
    this.initStudentLocationMap(st);
  },

  // Inline draggable-pin map shown right in the edit form (in addition to the
  // "pick on map" button/full-screen picker) — lets you fine-tune or set the
  // exact location without leaving the drawer or knowing the address.
  initStudentLocationMap(st){
    const el = document.getElementById('st-loc-map');
    if(!el || typeof L === 'undefined') return;
    if(el._leaflet_id){ try{ el._leaflet_map && el._leaflet_map.remove(); }catch(e){} }
    const existing = st && state.coords[st.id];
    const home = state.coords['home'] || {lat:38.2466, lon:21.7346};
    const start = existing || home;
    const map = L.map(el, {zoomControl:true, attributionControl:false}).setView([start.lat, start.lon], existing?16:13);
    el._leaflet_map = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    const marker = L.marker([start.lat, start.lon], {
      draggable:true,
      icon:L.divIcon({className:'',html:'<div style="width:22px;height:22px;background:#7c3aed;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[22,22],iconAnchor:[11,22]})
    }).addTo(map);
    el._leaflet_marker = marker;
    const onPin = (lat, lon)=>{
      this._addrPendingCoord = {lat, lon};
      this.reverseGeocodeIntoField(lat, lon, 'st-addr');
    };
    marker.on('dragend', ()=>{ const p=marker.getLatLng(); onPin(p.lat, p.lng); });
    map.on('click', (e)=>{ marker.setLatLng(e.latlng); onPin(e.latlng.lat, e.latlng.lng); });
  },

  // Moves the inline location-map's marker (if currently open) to match a
  // coordinate picked another way (search suggestion, full-screen map picker).
  updateStudentLocationMapMarker(coord){
    const el = document.getElementById('st-loc-map');
    if(!el || !el._leaflet_map || !el._leaflet_marker) return;
    el._leaflet_marker.setLatLng([coord.lat, coord.lon]);
    el._leaflet_map.setView([coord.lat, coord.lon], 16);
  },

  toggleGroupField(){
    const type = document.getElementById('st-type')?.value;
    const gf = document.getElementById('group-field');
    if(gf) gf.style.display = type==='group'?'block':'none';
  },

  toggleMergeField(){
    const freq = Number(document.getElementById('st-freq')?.value)||1;
    const mf = document.getElementById('merge-field');
    if(mf) mf.style.display = freq>=2?'block':'none';
    const range = document.getElementById('st-mergesize');
    if(range) range.max = freq;
  },

  toggleMergeSizeField(){
    const mode = document.getElementById('st-mergemode')?.value;
    const mf = document.getElementById('merge-size-field');
    if(mf) mf.style.display = (mode==='always'||mode==='auto')?'block':'none';
  },

  _updateMergeSizeLabel(){
    const n = Number(document.getElementById('st-mergesize')?.value)||2;
    const dur = Number(document.getElementById('st-dur')?.value)||60;
    const lbl = document.querySelector('#merge-size-field label');
    if(lbl) lbl.innerHTML = `${t('form_max_per_block')} — <span id="st-mergesize-val">${n}</span>× (${n*dur}${t('unit_min')})`;
  },

  _addrTimer: null,
  _addrPendingCoord: null,

  onAddrInput(val, boxId='addr-suggest'){
    if(boxId==='addr-suggest') this._addrPendingCoord = null;
    else this._obCoord = null;
    clearTimeout(this._addrTimer);
    const box = document.getElementById(boxId);
    if(!box) return;
    if(val.length < 3){ box.style.display='none'; return; }
    box.style.display='block';
    box.innerHTML=`<div style="padding:10px 14px;font-size:12px;color:var(--text3)">${t('search_searching')}</div>`;
    const hereKey = state.settings && state.settings.hereApiKey;
    this._addrTimer = setTimeout(async ()=>{
      try{
        const results = hereKey ? await this._searchHere(val, hereKey) : await this._searchNominatim(val);
        const b = document.getElementById(boxId);
        if(!b) return;
        if(!results || results.length===0){
          b.innerHTML=`<div style="padding:10px 14px;font-size:12px;color:var(--text3)">${t('search_no_results')}</div>`;
          return;
        }
        // Closest to home first — the right match is usually the nearby one, not
        // a same-named street in another city.
        const home = state.coords && state.coords['home'];
        if(home){
          results.forEach(res=>{
            const dx=res.lon-home.lon, dy=res.lat-home.lat;
            res._distKm = Math.sqrt(dx*dx+dy*dy)*111;
          });
          results.sort((a,b)=>a._distKm-b._distKm);
        }
        const shown = results.slice(0,5);
        b.innerHTML = shown.map((res)=>{
          // Named places (shops, cafes, landmarks — e.g. searching "Starbucks" instead of
          // a street address) show their actual name as the headline, with the full
          // address as context underneath, instead of a raw address fragment.
          const short = res.poiName || res.name.split(',').slice(0,3).join(',');
          const distTag = res._distKm!=null ? `<span style="color:var(--green);font-weight:600">${res._distKm<1?Math.round(res._distKm*1000)+t('unit_meter'):res._distKm.toFixed(1)+t('unit_km')}</span> · ` : '';
          return `<div class="addr-suggest-item" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);line-height:1.4"
            onmousedown="App.selectAddr(${JSON.stringify(res.name)},${res.lat},${res.lon},'${boxId}')"
            ontouchstart="App.selectAddr(${JSON.stringify(res.name)},${res.lat},${res.lon},'${boxId}')">
            <div style="font-weight:500;color:var(--text)">${esc(short)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${distTag}${esc(res.name)}</div>
          </div>`;
        }).join('');
      }catch(e){
        console.warn('Address search failed:', e);
        const b = document.getElementById(boxId);
        if(b) b.innerHTML=`<div style="padding:10px 14px;font-size:12px;color:var(--red)">${t('search_error')}</div>`;
      }
    }, 500);
  },

  // HERE Autosuggest — used when the user has set a HERE API key (Settings > Maps &
  // Routing), for Google-grade business/POI name matching. Falls back to Nominatim
  // (free, no key needed) when no key is configured — see _searchNominatim below.
  async _searchHere(val, key){
    const home = (state.coords && state.coords['home']) || {lat:38.2466, lon:21.7346};
    const q = encodeURIComponent(val.trim());
    const url = `https://autosuggest.search.hereapi.com/v1/autosuggest?q=${q}&at=${home.lat},${home.lon}&limit=8&lang=el&apiKey=${key}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error(`HERE Autosuggest ${r.status}`);
    const d = await r.json();
    const items = (d.items||[]).filter(it=>it.position); // skip query-refinement items with no coordinates
    return items.map(it=>{
      const label = (it.address && it.address.label) || it.title || '';
      const name = (it.title && !label.startsWith(it.title)) ? `${it.title}, ${label}` : label;
      return { name, poiName: it.title, lat: it.position.lat, lon: it.position.lng };
    });
  },

  async _searchNominatim(val){
    // Search the raw text as typed — no forced ", Ελλάδα" suffix. countrycodes=gr
    // already scopes results to Greece; appending the country name to the query
    // string was hurting POI/business-name matches (e.g. "Starbucks Πάτρα") since
    // Nominatim then has to match "Ελλάδα" as a literal token too.
    const q = encodeURIComponent(val.trim());
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&countrycodes=gr&addressdetails=1&namedetails=1${Router._viewboxParam()}`;
    const r = await fetch(url, {headers:{'Accept-Language':'el'}});
    if(!r.ok) throw new Error(`Nominatim ${r.status}`);
    let results = await r.json();
    if((!Array.isArray(results) || results.length===0) && Router._viewboxParam()){
      const url2 = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&countrycodes=gr&addressdetails=1&namedetails=1`;
      const r2 = await fetch(url2, {headers:{'Accept-Language':'el'}});
      if(r2.ok) results = await r2.json();
    }
    if(!Array.isArray(results)) results = [];
    return results.map(res=>({
      name: res.display_name,
      poiName: res.namedetails && res.namedetails.name,
      lat: parseFloat(res.lat), lon: parseFloat(res.lon)
    }));
  },

  // Shared reverse-geocode: HERE when a key is configured, else free Nominatim.
  // Returns the full display string, or null on failure.
  async _reverseGeocode(lat, lon){
    const hereKey = state.settings && state.settings.hereApiKey;
    if(hereKey){
      const url = `https://revgeocode.search.hereapi.com/v1/revgeocode?at=${lat},${lon}&lang=el&apiKey=${hereKey}`;
      const r = await fetch(url);
      if(!r.ok) throw new Error(`HERE reverse ${r.status}`);
      const d = await r.json();
      const item = d.items && d.items[0];
      return item && (item.address ? item.address.label : item.title);
    }
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&zoom=18`;
    const r = await fetch(url, {headers:{'Accept-Language':'el','User-Agent':'RoutePal/1.0'}});
    const d = await r.json();
    return d && d.display_name;
  },
