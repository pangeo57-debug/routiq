<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7f6f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RoutePal">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>RoutePal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --green: #059669;
  --blue: #7c3aed;
  --bg: #f7f6f3;
  --bg2: #ffffff;
  --bg3: #f1f0ed;
  --bg4: #e8e7e3;
  --border: #e2e0da;
  --text: #1c1c2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --red: #dc2626;
  --orange: #d97706;
  --purple: #7c3aed;
  --yellow: #ca8a04;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 64px;
  --max-w: 430px;
}
/* Dark theme — either the OS preference (auto) or an explicit user choice
   (data-theme attribute on <html>, set by App.setTheme() and always wins
   over the OS preference since it's more specific / comes later). */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --green: #10b981; --blue: #a78bfa;
    --bg: #14141c; --bg2: #1c1c28; --bg3: #23232f; --bg4: #2c2c3a;
    --border: #34344350; --text: #f0f0f5; --text2: #a3a3b8; --text3: #75758c;
    --red: #f87171; --orange: #fbbf24; --purple: #a78bfa; --yellow: #facc15;
  }
}
:root[data-theme="dark"] {
  --green: #10b981; --blue: #a78bfa;
  --bg: #14141c; --bg2: #1c1c28; --bg3: #23232f; --bg4: #2c2c3a;
  --border: #34344350; --text: #f0f0f5; --text2: #a3a3b8; --text3: #75758c;
  --red: #f87171; --orange: #fbbf24; --purple: #a78bfa; --yellow: #facc15;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:400;
  height:100%;max-width:var(--max-w);margin:0 auto;
  overflow-x:hidden;overscroll-behavior:none;
  position:relative;
}
h1,h2,h3,h4,.logo{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

#app{display:flex;flex-direction:column;height:100dvh;height:100vh;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 16px);display:none;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes schedShimmer{from{transform:translateX(-100%)}to{transform:translateX(266%)}}

/* NAV */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--max-w);
  height:var(--nav-h);
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  z-index:100;padding:0 8px;
  backdrop-filter:blur(12px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border:none;background:transparent;color:var(--text3);
  cursor:pointer;transition:color .2s;font-size:10px;font-family:'DM Sans',sans-serif;
}
.nav-btn svg{width:22px;height:22px;transition:transform .2s}
.nav-btn.active{color:var(--green)}
.nav-btn.active svg{transform:scale(1.1)}

/* TOPBAR */
.topbar{
  padding:52px 20px 16px;
  background:var(--bg);
  position:sticky;top:0;z-index:10;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.topbar-sub{color:var(--text2);font-size:13px;margin-top:2px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);padding:0 16px;margin:20px 0 8px}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:#047857}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.btn-danger:hover{background:rgba(220,38,38,.18)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-sm);background:var(--bg4);border:1px solid var(--border);color:var(--text2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.btn-icon:hover{background:var(--bg3);color:var(--text)}
.btn-full{width:100%}

/* FORMS */
.form-group{margin-bottom:14px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
input,select,textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color .15s;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:80px}
input[type=checkbox]{width:auto;accent-color:var(--green)}
input[type=time]{color-scheme:light}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* TAGS / CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid transparent}
.chip-green{background:rgba(5,150,105,.1);color:var(--green);border-color:rgba(5,150,105,.2)}
.chip-blue{background:rgba(124,58,237,.1);color:var(--blue);border-color:rgba(124,58,237,.2)}
.chip-red{background:rgba(220,38,38,.1);color:var(--red);border-color:rgba(220,38,38,.2)}
.chip-orange{background:rgba(217,119,6,.1);color:var(--orange);border-color:rgba(217,119,6,.2)}
.chip-gray{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.chip-purple{background:rgba(124,58,237,.1);color:var(--purple);border-color:rgba(124,58,237,.2)}
.addr-suggest-item:hover,.addr-suggest-item:active{background:var(--bg3)}

/* DAY TOGGLES */
.day-toggles{display:flex;gap:6px;flex-wrap:wrap}
.day-toggle{
  flex:1;min-width:40px;padding:8px 4px;text-align:center;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg4);color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.day-toggle.on{background:rgba(5,150,105,.12);border-color:rgba(5,150,105,.4);color:var(--green)}

/* STUDENT CARD */
.student-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin:0 16px 10px;
  overflow:hidden;transition:border-color .15s;
}
.student-card:hover{border-color:var(--bg4)}
.student-header{
  display:flex;align-items:center;gap:12px;padding:14px 14px;
  cursor:pointer;
}
.student-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  flex-shrink:0;
}
.student-info{flex:1;min-width:0}
.student-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.student-sub{font-size:12px;color:var(--text2);margin-top:2px}
.student-body{padding:0 14px 14px;border-top:1px solid var(--border);display:none;animation:slideUp .2s ease}
.student-body.open{display:block}
.student-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.student-detail-row:last-child{border-bottom:none}
.student-detail-label{color:var(--text2)}
.student-actions{display:flex;gap:8px;margin-top:12px}

/* SCHEDULE */
.day-tabs{display:flex;gap:6px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.day-tab.active{background:rgba(5,150,105,.12);border-color:rgba(5,150,105,.4);color:var(--green)}
.day-tab.has-lessons{border-color:var(--border)}
.slot-block{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin:0 16px 8px;
  padding:14px;position:relative;overflow:hidden;
}
.slot-block::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.slot-block.color-0::before{background:var(--green)}
.slot-block.color-1::before{background:var(--blue)}
.slot-block.color-2::before{background:var(--orange)}
.slot-block.color-3::before{background:var(--purple)}
.slot-block.color-4::before{background:var(--yellow)}
.slot-block.color-5::before{background:#ff7b9c}
.slot-block.color-6::before{background:#7fdbff}
.slot-block.color-7::before{background:#ffcc00}
.slot-block.color-8::before{background:#b2f7ef}
.slot-block.color-9::before{background:#ff9ff3}
.slot-block.dragging{opacity:0.4;}
.slot-block.drag-picked{outline:2.5px solid var(--blue,#7c3aed);outline-offset:-2px;box-shadow:0 0 0 4px rgba(124,58,237,.15)}
.day-tab.drag-over{border:2px solid var(--blue);background:rgba(124,58,237,.12);}
.slot-time{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.slot-name{font-size:14px;font-weight:600;margin-top:2px}
.slot-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.slot-gap{
  margin:0 16px 8px;padding:8px 12px;
  background:var(--bg4);border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text3);
}

/* ROUTE */
.route-stat{text-align:center;flex:1;min-width:0;overflow:hidden}
.route-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1.2;white-space:nowrap}
.route-stat-label{font-size:10px;color:var(--text2);margin-top:2px;line-height:1.3;word-break:break-word}
.stop-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;
}
.stop-num{
  width:28px;height:28px;border-radius:50%;
  background:rgba(5,150,105,.12);border:1px solid rgba(5,150,105,.3);
  color:var(--green);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'Syne',sans-serif;
}
.stop-num.home{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3);color:var(--blue)}
.stop-connector{
  width:2px;background:var(--border);
  margin:4px 13px;height:20px;flex-shrink:0;
}
.stop-info{flex:1;min-width:0}
.stop-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-addr{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-travel{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.4}
.stop-travel-row{display:block}

/* SETTINGS */
.settings-section{margin-bottom:8px}
.settings-section .section-title{margin-top:12px}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px}
.settings-sub{font-size:12px;color:var(--text2);margin-top:2px}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;background:var(--bg4);border:1px solid var(--border);
  border-radius:12px;cursor:pointer;transition:.2s;
}
.toggle-slider::before{
  content:'';position:absolute;width:18px;height:18px;
  background:var(--text3);border-radius:50%;
  left:2px;top:2px;transition:.2s;
}
.toggle-switch input:checked+.toggle-slider{background:rgba(5,150,105,.15);border-color:rgba(5,150,105,.5)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px);background:var(--green)}

/* BLOCKED SLOTS */
.blocked-slot{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.blocked-slot:last-child{border-bottom:none}
.blocked-slot-info{flex:1;font-size:13px}
.blocked-slot-time{font-weight:600}
.blocked-slot-day{font-size:12px;color:var(--text2)}

/* DAY AVAILABILITY in student form */
.avail-day-row{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;
}
.avail-day-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avail-day-name{font-size:13px;font-weight:600;flex:1}
.avail-time-row{display:flex;gap:8px;align-items:center}
.avail-sep{font-size:12px;color:var(--text3);white-space:nowrap}

/* MODAL / DRAWER */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{
  width:100%;max-width:var(--max-w);
  background:var(--bg2);border-radius:16px 16px 0 0;
  border:1px solid var(--border);border-bottom:none;
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.overlay.open .drawer{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.drawer-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.drawer-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.drawer-body{padding:16px 20px 32px}
.drawer-footer{padding:12px 20px 20px;border-top:1px solid var(--border);display:flex;gap:10px}

/* CONFIRM DIALOG */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s;
}
.confirm-overlay.open{opacity:1;pointer-events:auto}
.confirm-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;max-width:320px;width:100%;
  transform:scale(.95);transition:transform .2s;
}
.confirm-overlay.open .confirm-box{transform:scale(1)}
.confirm-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-text{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}

/* TOAST */
.toast-container{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;max-width:calc(var(--max-w) - 32px);width:100%;
}
.toast{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;font-size:14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
  animation:toastIn .25s ease;pointer-events:auto;
}
.toast.success{border-color:rgba(5,150,105,.3)}
.toast.error{border-color:rgba(220,38,38,.3)}
.toast.info{border-color:rgba(124,58,237,.3)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;text-align:center;
}
.empty-state svg{opacity:.25;margin-bottom:16px}
.empty-state h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:4px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1}
.stat-val span{font-size:14px;font-weight:400;color:var(--text2)}
.stat-label{font-size:12px;color:var(--text2);margin-top:6px}
.stat-card.accent-green{border-color:rgba(5,150,105,.2);background:rgba(5,150,105,.05)}
.stat-card.accent-blue{border-color:rgba(124,58,237,.2);background:rgba(124,58,237,.05)}

/* PROGRESS BAR */
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s ease}

/* UNPLACED */
.unplaced-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.unplaced-item:last-child{border-bottom:none}
.unplaced-reason{font-size:11px;color:var(--text3);margin-top:2px}

/* LOADING */
.spinner{
  width:20px;height:20px;border:2px solid var(--border);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--text2);font-size:14px}

/* HOME HERO */
.hero{
  padding:24px 16px 16px;
  background:linear-gradient(135deg,rgba(5,150,105,.07),rgba(124,58,237,.04));
  border-bottom:1px solid var(--border);margin-bottom:8px;
}
.hero-greeting{font-size:13px;color:var(--text2)}
.hero-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-top:4px;line-height:1.2}
.hero-title .accent{
  background:linear-gradient(90deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* MAP PLACEHOLDER */
.map-placeholder{
  height:180px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);margin:0 16px 12px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;color:var(--text3);font-size:13px;
  position:relative;overflow:hidden;
}
.map-placeholder::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(0,0,0,.02) 20px,rgba(0,0,0,.02) 40px);
}

/* WARNING */
.warning-banner{
  margin:0 16px 10px;padding:10px 12px;
  background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);
  border-radius:var(--radius-sm);display:flex;gap:8px;align-items:flex-start;
  font-size:13px;color:var(--orange);
}

/* ROUTE STATS ROW */
.route-stats-row{
  display:flex;padding:16px;gap:4px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
}

/* SMALL BADGE */
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;
  background:rgba(5,150,105,.12);color:var(--green);
  border-radius:10px;font-size:11px;font-weight:700;
  font-family:'Syne',sans-serif;
}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:12px 0}

/* MERGED BLOCK */
.slot-block.merged::before{background:linear-gradient(180deg,var(--green),var(--blue))!important}
.slot-block.merged{border-color:rgba(5,150,105,.3)}
.slot-block.group-slot::before{background:repeating-linear-gradient(45deg,var(--purple),var(--purple) 4px,var(--blue) 4px,var(--blue) 8px)!important}
.slot-block.group-slot{border-color:rgba(124,58,237,.35)}
.merge-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(5,150,105,.12);color:var(--green);border:1px solid rgba(5,150,105,.3);border-radius:4px;font-size:10px;font-weight:700;padding:2px 6px;font-family:'Syne',sans-serif}

/* SUGGESTION BANNER */
.suggestion-item{
  background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);
  border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;
}
.suggestion-title{font-size:13px;font-weight:600;color:var(--orange);margin-bottom:4px}
.suggestion-text{font-size:12px;color:var(--text2);line-height:1.5}
.suggestion-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

/* ROUTE DAY TABS */
.route-day-tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.route-day-tabs::-webkit-scrollbar{display:none}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}

<body>

<!-- Scheduling progress indicator — a small floating banner, NOT a full-screen
     blocking overlay: you can keep browsing while it runs. Settings saves are
     blocked separately (see App.saveSettings) while this is active, since
     changing settings mid-calculation could corrupt the in-progress run. -->
<div id="sched-overlay" style="display:none;position:fixed;left:50%;bottom:calc(var(--nav-h) + 12px);transform:translateX(-50%);z-index:9999;width:calc(100% - 32px);max-width:calc(var(--max-w) - 32px);transition:opacity .3s ease">
  <div style="background:var(--bg2,#fff);border:1px solid var(--border);border-radius:16px;padding:12px 14px;box-shadow:0 8px 28px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px">
    <div style="font-size:22px;flex-shrink:0;line-height:1" id="sched-icon">🧩</div>
    <div style="flex:1;min-width:0">
      <div id="sched-phase" style="font-size:12.5px;font-weight:700;color:var(--text,#111);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Υπολογισμός...</div>
      <div id="sched-sub" style="font-size:11px;color:var(--text3,#888);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Παρακαλώ περιμένετε</div>
      <div style="background:var(--bg3,#f0f0f0);border-radius:8px;height:5px;overflow:hidden;margin-top:6px;position:relative">
        <div id="sched-bar" style="height:100%;background:linear-gradient(90deg,#7c3aed,#0891b2);border-radius:8px;width:0%;transition:width .25s linear;position:relative;overflow:hidden">
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);width:60%;animation:schedShimmer 1.1s linear infinite"></div>
        </div>
      </div>
    </div>
    <div id="sched-pct" style="font-size:11px;color:var(--text3,#888);font-weight:700;flex-shrink:0">0%</div>
  </div>
  <div id="sched-warn" style="font-size:10.5px;color:var(--orange,#d97706);text-align:center;margin-top:6px;font-weight:600"></div>
</div>

<script>
// ============================================================
// SECURITY UTILS
// ============================================================
function esc(str){
  if(str==null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
// STORAGE
// ============================================================
const Storage = {
  KEYS: { settings:'rp_settings', students:'rp_students', schedule:'rp_schedule', coords:'rp_coords' },
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null }catch(e){return null} },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)) }catch(e){} },
  loadSettings(){ return this.get(this.KEYS.settings) || defaultSettings() },
  saveSettings(s){ this.set(this.KEYS.settings,s) },
  loadStudents(){ return this.get(this.KEYS.students) || [] },
  saveStudents(s){ this.set(this.KEYS.students,s) },
  loadSchedule(){ return this.get(this.KEYS.schedule) || {} },
  saveSchedule(s){ this.set(this.KEYS.schedule,s) },
  loadCoords(){ return this.get(this.KEYS.coords) || {} },
  saveCoords(c){ this.set(this.KEYS.coords,c) },
  clear(){ Object.values(this.KEYS).forEach(k=>localStorage.removeItem(k)) }
};

function defaultSettings(){
  return {
    teacherName:'',
    homeAddress:'',
    profession:'tutor',
    workDays:[1,2,3,4,5],
    dayHours:{},

}

// SCHEDULER
// ============================================================
const Scheduler = {
  toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m },
  minToTime(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0') },
  toTime(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}` },

  // Deterministic pseudo-coordinates near Patras from address string
  coordsHash(address){
    const seed = [...(address||'')].reduce((a,c)=>a+c.charCodeAt(0),0);
    return { lat: 38.20 + (seed % 200)/1000, lon: 21.70 + ((seed*7) % 200)/1000 };
  },

  // Estimated travel minutes between two slots/addresses using geocoords.
  // day: 1-5 = weekday (peak matrix), 6 = Saturday (off-peak matrix), undefined = peak
  travelEstMin(fromId, fromAddr, toId, toAddr, day){
    if(typeof state!=='undefined'){
      // Pick matrix based on day: Saturday uses off-peak, weekdays use peak
      const mat = (day===6 && state.travelMatrixOffPeak) ? state.travelMatrixOffPeak
                : (state.travelMatrixPeak || state.travelMatrix);
      if(mat){
        const ia = mat.coordIds.indexOf(fromId);
        const ib = mat.coordIds.indexOf(toId);
        if(ia>=0 && ib>=0 && mat.durations[ia] && mat.durations[ia][ib]!=null)
          return Math.max(1, Math.round(mat.durations[ia][ib]/60));
      }
    }
    const coords = (typeof state !== 'undefined' && state.coords) || {};
    const cA = coords[fromId] || this.coordsHash(fromAddr||'');
    const cB = coords[toId]   || this.coordsHash(toAddr||'');
    const dx = cA.lon - cB.lon, dy = cA.lat - cB.lat;
    const km = Math.sqrt(dx*dx + dy*dy) * 111 * 1.4;
    const spd = (typeof state!=='undefined'&&state.settings&&state.settings.avgCitySpeedKmh)||25;
    return Math.max(1, Math.round(km / spd * 60));
  },

  // Geographic centroid of a day's lessons
  dayCentroid(daySlots, coords){
    const pts = daySlots.map(s=>coords[s.studentId]||this.coordsHash(s.address)).filter(Boolean);
    if(!pts.length) return null;
    return { lat: pts.reduce((a,p)=>a+p.lat,0)/pts.length, lon: pts.reduce((a,p)=>a+p.lon,0)/pts.length };
  },

  dist(a,b){
    if(!a||!b) return 999;
    return Math.sqrt((a.lat-b.lat)**2+(a.lon-b.lon)**2);
  },

  shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] }
    return a;
  },

  countTotal(schedule){
    return Object.values(schedule).reduce((a,d)=>a+d.reduce((b,s)=>b+(s.isGroup?(s.groupMemberCount||2):(s.mergedCount||1)),0),0);
  },

  // ── TWO-PHASE SCHEDULER ──────────────────────────────────────────────────
  // Phase 1 (scheduleAll): backtracking with fixed 15-min buffer → place EVERYONE
  // Phase 2 (geoOptimize): nearest-neighbor reorder → min km, only with real coords
  // Never sacrifices students for km. No km calc during scheduling.
  run(students, settings, coords={}){
    const result = this.scheduleAll(students, settings);
    // Only geo-optimize if we have at least one real geocoded coordinate.
    // coordsHash pseudo-coords would produce meaningless orderings.
    const hasRealCoords = Object.keys(coords).length > 0;
    if(hasRealCoords) this.geoOptimize(result.schedule, students, settings, coords);
    result._attempts = 1;
    return result;
  },

  // Run several attempts with different randomized starting orders and keep the
  // one that places the MOST students — placement count always wins, km is only
  // a tie-breaker. Every student matters more than a shorter drive.
  runMultiAttempt(students, settings, coords={}, attempts=6, fullBudget=false){
    const hasRealCoords = Object.keys(coords).length > 0;
    const dist=(a,b)=>{const dx=a.lon-b.lon,dy=a.lat-b.lat;return Math.sqrt(dx*dx+dy*dy)*111*1.4;};
    const totalKm=(schedule)=>{
      if(!hasRealCoords) return 0;
      const home = coords['home']||{lat:0,lon:0};
      let km=0;
      for(const day of settings.workDays){
        const slots=(schedule[day]||[]).slice().sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
        if(!slots.length) continue;
        let prev=home, prevId=null;
        for(const s of slots){
          const c=coords[s.studentId]||home;
          if(prevId!==s.studentId) km+=dist(prev,c);
          prev=c; prevId=s.studentId;
        }
        km+=dist(prev,home);
      }
      return km;
    };
    // More attempts share a smaller per-attempt time budget so total wall-clock
    // stays bounded, instead of attempts×20s — unless fullBudget is requested
    // (user explicitly opted into a much longer, more thorough run).
    const backtrackMs = fullBudget ? 20000 : (attempts<=1 ? 20000 : Math.max(4000, Math.round(20000/Math.sqrt(attempts))));
    const repairMs = fullBudget ? 8000 : (attempts<=1 ? 8000 : Math.max(2000, Math.round(8000/Math.sqrt(attempts))));

    // "Αυτόματα" students aren't forced either way — half the attempts try them
    // merged into one block, the other half as separate sessions, and whichever
    // actually fits better with everyone else naturally wins via placed/km below.
    const hasAutoMerge = students.some(s=>s.mergeMode==='auto');

    let best=null;
    for(let i=0;i<attempts;i++){
      let order = i===0 ? students : this.shuffle(students);
      if(hasAutoMerge){
        const mergeOn = i%2===0;
        order = order.map(s => s.mergeMode==='auto' ? {...s, forceMerge:mergeOn} : s);
      }
      const result = this.scheduleAll(order, settings, backtrackMs, repairMs);
      if(hasRealCoords) this.geoOptimize(result.schedule, order, settings, coords);
      const placed = this.countTotal(result.schedule);
      const km = totalKm(result.schedule);
      if(!best || placed>best.placed || (placed===best.placed && km<best.km)){
        best = { result, placed, km };
      }
    }
    best.result._attempts = attempts;
    return best.result;
  },

  // _SCHED_BUFFER kept for backward compat; dynamic travel time is used instead
  _SCHED_BUFFER: 0,

  // Phase 1: constraint-satisfaction backtracking, dynamic travel buffer
  scheduleAll(students, settings, backtrackMs=20000, repairMs=8000){
    const schedule = {};
    settings.workDays.forEach(d => schedule[d] = []);

    // Phase 0: forceMerge students — split into blocks of at most maxMergeSessions
    // (defaults to all of them, i.e. one block) so "δίωρο" doesn't silently become a 4ωρο.
    // Group membership takes priority: a student who is ALSO paired/grouped must not
    // ALSO get a separate solo forceMerge block — that double-counts their lessonsPerWeek
    // and produces extra sessions nobody asked for. Group phase (0b, below) handles them.
    const isGroupOrPaired = s => !!(s.pairedWith || (s.type==='group' && s.group));
    for(const s of students.filter(s => s.forceMerge && !isGroupOrPaired(s))){
      const blockSize = Math.max(1, Math.min(s.maxMergeSessions||s.lessonsPerWeek, s.lessonsPerWeek));
      let remaining = s.lessonsPerWeek;
      const usedDays = new Set();
      for(const day of settings.workDays){
        if(remaining<=0) break;
        if(usedDays.has(day)) continue;
        const av = s.availability[day];
        if(!av || !av.on) continue;
        const sessionsThisBlock = Math.min(blockSize, remaining);
        const dur = sessionsThisBlock * s.lessonDuration;
        const slot = this.findSlotFixed(s, day, schedule[day]||[], settings, dur);
        if(slot){
          schedule[day].push({ studentId:s.id, studentName:s.name, subject:s.subject||'—',
            address:s.address, color:s.color||0, start:slot.start, end:slot.end,
            duration:dur, mergedCount:sessionsThisBlock, merged:true, originalDuration:s.lessonDuration });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          usedDays.add(day);
          remaining -= sessionsThisBlock;
        }
      }
    }

    // Phase 0b: group lessons — students sharing same group code OR pairedWith placed as one slot
    const groupedIds = new Set();
    const leftoverMembers = [];
    const groupDaysUsed = {}; // memberId -> [days already used by their group sessions]
    // Build pairMap from pairedWith (avoid duplicates)
    const groupMap = {};
    const seenPairs = new Set();
    for(const s of students){
      if(s.pairedWith){
        const partner = students.find(x=>x.id===s.pairedWith);
        if(!partner) continue;
        const pairKey = [s.id,partner.id].sort().join('|');
        if(seenPairs.has(pairKey)) continue;
        seenPairs.add(pairKey);
        const code = 'pair_'+pairKey;
        groupMap[code]=[s, partner];
      }
    }
    for(const s of students){
      if(s.type==='group' && s.group){
        // Normalize the code so "A1", " a1 ", "a1 " etc. are treated as the same group
        const gkey = 'grp_'+s.group.trim().toLowerCase();
        if(!groupMap[gkey]) groupMap[gkey]=[];
        // avoid duplicating pairs already added via pairedWith
        if(!groupMap[gkey].find(x=>x.id===s.id)) groupMap[gkey].push(s);
      }
    }
    // Merge any groupMap entries that share a member — e.g. a student set up via BOTH
    // "Ζεύγος με" and "Τύπος: Ομάδα" with the same partner would otherwise get scheduled
    // together twice (two separate blocks), eating into their weekly lesson count.
    {
      let mergedAny = true;
      while(mergedAny){
        mergedAny = false;
        const keys = Object.keys(groupMap);
        outerMerge:
        for(let i=0;i<keys.length;i++){
          for(let j=i+1;j<keys.length;j++){
            const ga=groupMap[keys[i]], gb=groupMap[keys[j]];
            if(ga.some(m=>gb.find(x=>x.id===m.id))){
              for(const m of gb) if(!ga.find(x=>x.id===m.id)) ga.push(m);
              delete groupMap[keys[j]];
              mergedAny = true;
              break outerMerge;
            }
          }
        }
      }
    }
    for(const [code, members] of Object.entries(groupMap)){
      if(members.length<2) continue;
      const [a] = members;
      // A group's SHARED sessions = what its LEAST demanding member needs — never force
      // someone who only wants 2x/week into a 3rd session just because their partner wants 3.
      const neededSessions = Math.min(...members.map(m=>m.lessonsPerWeek||1));
      const dur=Math.max(...members.map(m=>m.lessonDuration));
      let placedSessions = 0;
      const usedDays = [];
      for(const day of settings.workDays){
        if(placedSessions>=neededSessions) break;
        let start=-Infinity, end=Infinity, allOn=true;
        for(const m of members){
          const av=m.availability[day];
          if(!av||!av.on){ allOn=false; break; }
          start=Math.max(start,this.toMin(av.start));
          end=Math.min(end,this.toMin(av.end));
        }
        if(!allOn) continue;
        if(end-start<dur) continue;
        // Make a virtual student representing the intersection
        const virtual={...a, availability:{[day]:{on:true,start:this.minToTime(start),end:this.minToTime(end)}}};
        const slot=this.findSlotFixed(virtual,day,schedule[day]||[],settings,dur);
        if(slot){
          schedule[day].push({
            studentId:a.id, studentName:'👥 '+members.map(m=>m.name).join(' & '),
            pairedStudentId:members[1]?.id, groupCode:code, groupMemberIds:members.map(m=>m.id),
            groupMemberCount:members.length,
            subject:a.subject||'—', address:a.address,
            color:a.color||0, start:slot.start, end:slot.end,
            duration:dur, mergedCount:1, merged:false, isGroup:true
          });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          placedSessions++;
          usedDays.push(day);
        }
      }
      if(placedSessions>0){
        members.forEach(m=>{ groupedIds.add(m.id); groupDaysUsed[m.id]=(groupDaysUsed[m.id]||[]).concat(usedDays); });
        // Whoever needs MORE sessions than the group shares gets the rest scheduled
        // solo, just for them — never forced onto (or skipped for) the other member.
        for(const m of members){
          const leftover = (m.lessonsPerWeek||1) - placedSessions;
          if(leftover>0) leftoverMembers.push({...m, lessonsPerWeek:leftover});
        }
      }
    }

    // Group members must ALWAYS be scheduled together or not at all — never fall through
    // to solo scheduling just because the group itself failed to find a common slot.
    // Exception: leftoverMembers (members whose personal need exceeds the shared count)
    // get their remaining lessons scheduled solo, on top of their group sessions.
    const allGroupMemberIds = new Set(Object.values(groupMap).flat().map(m=>m.id));
    const normal = students.filter(s => !s.forceMerge && !allGroupMemberIds.has(s.id)).concat(leftoverMembers);
    // MCV: most-constrained first — fewer available hours → placed first
    const availHours = s => settings.workDays.reduce((sum,d)=>{
      const av=s.availability[d];
      if(!av||!av.on) return sum;
      const [sh,sm]=av.start.split(':').map(Number), [eh,em]=av.end.split(':').map(Number);
      return sum+(eh*60+em-sh*60-sm);
    },0);
    normal.sort((a,b)=>availHours(a)-availHours(b));
    const tasks = [];
    for(const s of normal) for(let i=0;i<s.lessonsPerWeek;i++) tasks.push({student:s,lessonIdx:i});

    const placedDays = {};
    // Leftover-member clones start with the days their group session already used,
    // so their solo lessons never land on the same day as their shared session.
    for(const s of normal) placedDays[s.id] = [...(groupDaysUsed[s.id]||[])];

    const availDayCount = (s) => settings.workDays.filter(d=>{const av=s.availability[d];return av&&av.on;}).length;
    const canSameDay    = (s) => false; // never place same student twice on same day

    const countSlotsFixed = (task, sch) => {
      let n=0;
      const pd=placedDays[task.student.id], sameDay=canSameDay(task.student);
      for(const day of settings.workDays){
        const av=task.student.availability[day];
        if(!av||!av.on) continue;
        if(!sameDay&&pd.includes(day)) continue;
        if(this.findSlotFixed(task.student,day,sch[day]||[],settings,task.student.lessonDuration)) n++;
      }
      return n;
    };

    const allSlotsFixed = (student, day, existing) => {
      const margin = (settings.travelMargin ?? 3);
      const dayH=settings.dayHours[day]; if(!dayH) return [];
      const av=student.availability[day]; if(!av||!av.on) return [];
      const dur=student.lessonDuration;
      const winStart=Math.max(this.toMin(dayH.start),this.toMin(av.start));
      const winEnd  =Math.min(this.toMin(dayH.end),  this.toMin(av.end));
      if(winEnd-winStart<dur) return [];
      const winEndFlex=winEnd+15;
      const sorted=[...existing].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
      const candidates=new Set([winStart]);
      for(const e of sorted){
        const buf=e.studentId===student.id?0:this.travelEstMin(e.studentId,e.address,student.id,student.address)+margin;
        const t=this.toMin(e.end)+buf;
        const r=Math.ceil(t/5)*5;
        if(r>=winStart&&r+dur<=winEndFlex) candidates.add(r);
      }
      const slots=[];
      for(const t of [...candidates].sort((a,b)=>a-b)){
        if(t+dur>winEndFlex) continue;
        let ok=true;
        for(const e of sorted){
          const es=this.toMin(e.start),ee=this.toMin(e.end);
          if(e.studentId===student.id){
            if(t<ee&&t+dur>es){ok=false;break;}
          } else {
            const bufBefore=this.travelEstMin(e.studentId,e.address,student.id,student.address)+margin;
            const bufAfter =this.travelEstMin(student.id,student.address,e.studentId,e.address)+margin;
            if(t<ee+bufBefore&&t+dur+bufAfter>es){ok=false;break;}
          }
        }
        if(ok) slots.push({start:this.toTime(t),end:this.toTime(t+dur)});
      }
      return slots;
    };

    const deadline=Date.now()+backtrackMs;
    let nodesVisited=0;
    const MAX_NODES=1000000;
    let bestSched=null, bestCount=-1;

    const saveBest=(sch)=>{
      const cnt=this.countTotal(sch);
      if(cnt>bestCount){
        bestCount=cnt;
        bestSched={};
        for(const d of settings.workDays) bestSched[d]=[...(sch[d]||[])];
      }
    };

    const backtrack=(remaining,sch)=>{
      nodesVisited++;
      if(remaining.length===0){saveBest(sch);return true;}
      if(nodesVisited>MAX_NODES||Date.now()>deadline){saveBest(sch);return false;}
      let minCount=Infinity,bestIdx=-1;
      for(let i=0;i<remaining.length;i++){
        const c=countSlotsFixed(remaining[i],sch);
        if(c===0) continue;
        if(c<minCount){minCount=c;bestIdx=i;}
      }
      if(bestIdx===-1){saveBest(sch);return false;}
      const task=remaining[bestIdx];
      const rest=remaining.filter((_,i)=>i!==bestIdx);
      const pd=placedDays[task.student.id];
      const sameDay=canSameDay(task.student);
      // Geo-aware day ordering: prefer days whose existing students are geographically closer
      const stCoords=(typeof state!=='undefined'&&state.coords)||{};
      const sC=stCoords[task.student.id];
      const geoScore=(day)=>{
        const slots=sch[day]||[];
        if(!slots.length||!sC) return 0; // no penalty for empty days
        let sum=0;
        for(const e of slots){
          const eC=stCoords[e.studentId];
          if(!eC) continue;
          const dx=sC.lon-eC.lon,dy=sC.lat-eC.lat;
          sum+=Math.sqrt(dx*dx+dy*dy);
        }
        return sum/slots.length;
      };
      const candidateDays=settings.workDays
        .filter(d=>{const av=task.student.availability[d];return av&&av.on&&(sameDay||!pd.includes(d));})
        .sort((a,b)=>geoScore(a)-geoScore(b));
      for(const day of candidateDays){
        for(const slot of allSlotsFixed(task.student,day,sch[day]||[])){
          const entry={studentId:task.student.id,studentName:task.student.name,subject:task.student.subject||'—',
            address:task.student.address,color:task.student.color||0,start:slot.start,end:slot.end,
            duration:task.student.lessonDuration,mergedCount:1,merged:false};
          sch[day].push(entry);
          sch[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          pd.push(day);
          if(backtrack(rest,sch)) return true;
          sch[day]=sch[day].filter(e=>e!==entry);
          pd.pop();
        }
      }
      saveBest(sch);
      return false;
    };

    const feasible=tasks.filter(t=>countSlotsFixed(t,schedule)>0);
    const success=backtrack(feasible,schedule);
    if(!success&&bestSched&&this.countTotal(bestSched)>this.countTotal(schedule))
      for(const d of settings.workDays) schedule[d]=bestSched[d];

    // Repair pass: greedily place any remaining unplaced tasks
    // (backtracking may have timed out leaving some students out)
    const placedCount = {};
    for(const d of settings.workDays)
      for(const sl of schedule[d]||[]) placedCount[sl.studentId]=(placedCount[sl.studentId]||0)+1;

    const unplacedTasks=[];
    for(const s of normal){
      const got=placedCount[s.id]||0;
      for(let i=got;i<s.lessonsPerWeek;i++) unplacedTasks.push({student:s,lessonIdx:i});
    }

    const makeEntry=(s,slot)=>({studentId:s.id,studentName:s.name,subject:s.subject||'—',
      address:s.address,color:s.color||0,start:slot.start,end:slot.end,
      duration:s.lessonDuration,mergedCount:1,merged:false});

    const repairDeadline=deadline+repairMs;
    const swapChain2=(s,depth)=>{
      if(Date.now()>repairDeadline) return false;
      const pd=placedDays[s.id]; const sameDay=canSameDay(s);
      // Ground truth is the actual schedule, not `pd` — pd can desync from schedule
      // after the backtracking phase swaps in a bestSched snapshot without resyncing it.
      const alreadyOn = (day) => (schedule[day]||[]).some(e=>e.studentId===s.id);
      for(const day of settings.workDays){
        const av=s.availability[day]; if(!av||!av.on) continue;
        if(!sameDay&&alreadyOn(day)) continue;
        const slot=this.findSlotFixed(s,day,schedule[day]||[],settings,s.lessonDuration);
        if(slot){
          schedule[day].push(makeEntry(s,slot));
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          if(!pd.includes(day)) pd.push(day); return true;
        }
      }
      if(depth===0) return false;
      for(const day of settings.workDays){
        const av=s.availability[day]; if(!av||!av.on) continue;
        if(!sameDay&&alreadyOn(day)) continue;
        const daySnap=[...(schedule[day]||[])];
        for(const blocker of daySnap){
          if(blocker.merged||blocker.isGroup) continue;
          // temporarily remove blocker
          schedule[day]=schedule[day].filter(e=>e!==blocker);
          const bIdx=placedDays[blocker.studentId].indexOf(day);
          if(bIdx>=0) placedDays[blocker.studentId].splice(bIdx,1);
          const slot=this.findSlotFixed(s,day,schedule[day]||[],settings,s.lessonDuration);
          if(slot){
            const entry=makeEntry(s,slot);
            schedule[day].push(entry);
            schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
            pd.push(day);
            const blockerStudent=students.find(st=>st.id===blocker.studentId);
            if(blockerStudent&&swapChain2(blockerStudent,depth-1)) return true;
            // revert s placement
            schedule[day]=schedule[day].filter(e=>e!==entry);
            pd.splice(pd.lastIndexOf(day),1);
          }
          // restore blocker
          schedule[day].push(blocker);
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          placedDays[blocker.studentId].push(day);
        }
      }
      return false;
    };

    // Sort by fewest available day-slots first (MRV)
    unplacedTasks.sort((a,b)=>countSlotsFixed(a,schedule)-countSlotsFixed(b,schedule));
    for(const task of unplacedTasks){
      const s=task.student;
      swapChain2(s,4); // up to 4-level swap chain
    }

    // Second repair pass: students still unplaced after first pass
    // Re-sort by MRV on the updated schedule, try depth=6
    const stillUnplaced=[];
    for(const s of students){
      if(allGroupMemberIds.has(s.id)) continue; // never repair-place group members solo
      if(this.countPlaced(s.id,schedule)<s.lessonsPerWeek) stillUnplaced.push(s);
    }
    if(stillUnplaced.length>0 && Date.now()<repairDeadline){
      stillUnplaced.sort((a,b)=>countSlotsFixed({student:a},schedule)-countSlotsFixed({student:b},schedule));
      for(const s of stillUnplaced){
        if(Date.now()>repairDeadline) break;
        if(this.countPlaced(s.id,schedule)>=s.lessonsPerWeek) continue;
        swapChain2(s,6);
      }
    }

    const unplaced=[];
    for(const s of students){
      const cnt=this.countPlaced(s.id,schedule);
      if(cnt<s.lessonsPerWeek){
        const u={student:s,placed:cnt,needed:s.lessonsPerWeek,reason:this.diagnoseUnplaced(s,schedule,settings)};
        this.computeSuggestion(u,schedule,settings);
        unplaced.push(u);
      }
    }
    return {schedule,placed:this.countTotal(schedule),total:students.reduce((a,s)=>a+s.lessonsPerWeek,0),unplaced,success};
  },

  // findSlotFixed: find earliest valid slot (exact travel gap, no 5-min rounding)
  findSlotFixed(student, day, existing, settings, dur){
    const margin = (settings.travelMargin ?? 2);
    const dayH=settings.dayHours[day]; if(!dayH) return null;
    const av=student.availability[day]; if(!av||!av.on) return null;
    const winStart=Math.max(this.toMin(dayH.start),this.toMin(av.start));
    const winEnd  =Math.min(this.toMin(dayH.end),  this.toMin(av.end));
    if(winEnd-winStart<dur) return null;
    const winEndFlex=winEnd+15;
    const sorted=[...existing].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));

    // Build candidate start times: winStart + right after each slot's travel gap
    const candidates=[winStart];
    for(const e of sorted){
      const ee=this.toMin(e.end);
      if(e.studentId===student.id){
        candidates.push(ee);
      } else {
        const buf=this.travelEstMin(e.studentId,e.address,student.id,student.address,day)+margin;
        candidates.push(ee+buf);
      }
    }

    for(let t of candidates){
      t=Math.max(t,winStart);
      // Push t forward past any preceding slots it conflicts with
      let changed=true;
      while(changed){
        changed=false;
        for(const e of sorted){
          const es=this.toMin(e.start),ee=this.toMin(e.end);
          if(ee<=t) continue; // slot ends before our start — no conflict
          if(es>=t+dur) break; // slot starts after our end — done checking prev
          if(e.studentId===student.id){
            t=ee; changed=true; break;
          } else {
            const buf=this.travelEstMin(e.studentId,e.address,student.id,student.address,day)+margin;
            if(t<ee+buf){t=ee+buf; changed=true; break;}
          }
        }
      }
      if(t+dur>winEndFlex) continue;
      if(this.isBlocked(t,t+dur,day,settings)) continue;
      // Verify no next slot is too close
      let ok=true;
      for(const e of sorted){
        const es=this.toMin(e.start);
        if(es<t+dur) continue; // prev or overlapping
        if(e.studentId===student.id){
          if(t+dur>es){ok=false;break;}
        } else {
          const bufAft=this.travelEstMin(student.id,student.address,e.studentId,e.address,day)+margin;
          if(t+dur+bufAft>es){ok=false;break;}
        }
      }
      if(ok) return {start:this.toTime(t),end:this.toTime(t+dur)};
    }
    return null;
  },

  // Phase 2: nearest-neighbor reorder within each day for min km
  // Keeps original order if any availability window is violated after reorder
  geoOptimize(schedule, students, settings, coords, travelMinFn=null){
    const HOME=coords['home']||this.coordsHash((settings&&settings.homeAddress)||'Πάτρα');
    const getC=(slot)=>coords[slot.studentId]||this.coordsHash(slot.address||'');
    const distKm=(a,b)=>{const dx=a.lon-b.lon,dy=a.lat-b.lat;return Math.sqrt(dx*dx+dy*dy)*111*1.4;};
    const trvMin=(a,b)=>travelMinFn?travelMinFn(a,b):Math.max(1,Math.round(distKm(a,b)/((settings&&settings.avgCitySpeedKmh)||25)*60));

    // Compute total km for a schedule snapshot. Includes a small per-slot
    // Saturday penalty (matching saOptimize) so cross-day moves/swaps prefer
    // filling weekdays first when the real travel-distance difference is a
    // near-tie — never at the cost of an actual placement, this function is
    // only used to compare already-equally-valid arrangements.
    const WEEKEND_PENALTY = 2;
    const totalKm=(sch)=>{
      let km=0;
      for(const day of settings.workDays){
        const slots=(sch[day]||[]).slice().sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
        if(!slots.length) continue;
        let prev=HOME; let prevS=null;
        for(const s of slots){
          if(!prevS||prevS.studentId!==s.studentId) km+=distKm(prev,getC(s));
          prev=getC(s); prevS=s;
        }
        if(day===6) km += slots.length*WEEKEND_PENALTY;
      }
      return km;
    };

    // Try to place a slot list for a day using real travel; returns new slots or null
    const tryAssignDay=(day,slots)=>{
      if(!slots.length) return [];
      const dayH=settings.dayHours[day];
      // nearest-neighbor order from HOME
      const rem=[...slots]; const order=[]; let cur=HOME;
      while(rem.length){
        let nearest=null,minD=Infinity;
        for(const s of rem){const d=distKm(cur,getC(s));if(d<minD){minD=d;nearest=s;}}
        order.push(nearest); rem.splice(rem.indexOf(nearest),1); cur=getC(nearest);
      }
      let t=this.toMin(dayH.start), prev=HOME; const newSlots=[];
      let first=true;
      for(const slot of order){
        const student=students.find(s=>s.id===slot.studentId);
        if(!student) return null;
        const av=student.availability&&student.availability[day];
        if(!av||!av.on) return null;
        const c=getC(slot);
        const margin=(settings&&(settings.travelMargin??3))||3;
        // The very first lesson of the day always starts exactly at the window open —
        // travel from home is the tutor's problem to leave early for, not a scheduling delay.
        t = first ? Math.max(t, this.toMin(av.start)) : Math.max(t+trvMin(prev,c)+margin, this.toMin(av.start));
        if(!first) t=Math.ceil(t/5)*5;
        first=false;
        const winEnd=Math.min(this.toMin(dayH.end),this.toMin(av.end));
        if(t+slot.duration>winEnd) return null;
        newSlots.push({...slot,start:this.toTime(t),end:this.toTime(t+slot.duration)});
        t+=slot.duration; prev=c;
      }
      return newSlots;
    };

    // Step 1: reorder within each day (nearest-neighbor TSP)
    for(const day of settings.workDays){
      const slots=schedule[day];
      if(!slots||slots.length<=1) continue;
      const reordered=tryAssignDay(day,slots);
      if(reordered) schedule[day]=reordered;
    }

    // Step 2: cross-day reassignment — try moving each slot to another day
    let improved=true;
    const deadline2=Date.now()+3000;
    while(improved && Date.now()<deadline2){
      improved=false;
      outer2:
      for(const day of settings.workDays){
        const slots=schedule[day]||[];
        for(let si=0;si<slots.length;si++){
          const slot=slots[si];
          if(slot.merged||slot.isGroup) continue;
          const student=students.find(s=>s.id===slot.studentId);
          if(!student) continue;
          for(const altDay of settings.workDays){
            if(altDay===day) continue;
            const av=student.availability&&student.availability[altDay];
            if(!av||!av.on) continue;
            // Never give the same student two slots on the same day (unless forceMerge)
            if(!student.forceMerge && (schedule[altDay]||[]).some(s=>s.studentId===slot.studentId)) continue;
            const dayWithout=slots.filter((_,i)=>i!==si);
            const altWith=[...(schedule[altDay]||[]),slot];
            const altReordered=tryAssignDay(altDay,altWith);
            if(!altReordered) continue;
            const dayReordered=dayWithout.length?tryAssignDay(day,dayWithout):[];
            if(dayWithout.length>0 && !dayReordered) continue;
            const before=totalKm(schedule);
            const savedA=schedule[day], savedB=schedule[altDay];
            schedule[day]=dayReordered;
            schedule[altDay]=altReordered;
            const after=totalKm(schedule);
            if(after<before-0.01){ improved=true; break outer2; }
            schedule[day]=savedA; schedule[altDay]=savedB;
          }
        }
      }
    }

    // Step 3: cross-day swaps — swap slot A (dayX) with slot B (dayY)
    let swapImproved=true;
    const deadline3=Date.now()+5000;
    while(swapImproved && Date.now()<deadline3){
      swapImproved=false;
      const activeDays=settings.workDays.filter(d=>(schedule[d]||[]).length>0);
      outer3:
      for(let di=0;di<activeDays.length;di++){
        const dayA=activeDays[di];
        const slotsA=[...(schedule[dayA]||[])];
        for(let si=0;si<slotsA.length;si++){
          const slotA=slotsA[si];
          if(slotA.merged||slotA.isGroup) continue;
          const stA=students.find(s=>s.id===slotA.studentId);
          if(!stA) continue;
          for(let dj=di+1;dj<activeDays.length;dj++){
            const dayB=activeDays[dj];
            const slotsB=[...(schedule[dayB]||[])];
            for(let sj=0;sj<slotsB.length;sj++){
              const slotB=slotsB[sj];
              if(slotB.merged||slotB.isGroup) continue;
              if(slotA.studentId===slotB.studentId) continue;
              const stB=students.find(s=>s.id===slotB.studentId);
              if(!stB) continue;
              const avAonB=stA.availability&&stA.availability[dayB];
              if(!avAonB||!avAonB.on) continue;
              const avBonA=stB.availability&&stB.availability[dayA];
              if(!avBonA||!avBonA.on) continue;
              // Never give a student two slots on the same day (unless forceMerge)
              if(!stA.forceMerge && slotsB.some((s,i)=>i!==sj&&s.studentId===slotA.studentId)) continue;
              if(!stB.forceMerge && slotsA.some((s,i)=>i!==si&&s.studentId===slotB.studentId)) continue;
              const newSlotsA=[...slotsA.filter((_,i)=>i!==si),slotB];
              const newSlotsB=[...slotsB.filter((_,i)=>i!==sj),slotA];
              const newA=tryAssignDay(dayA,newSlotsA);
              if(!newA) continue;
              const newB=tryAssignDay(dayB,newSlotsB);
              if(!newB) continue;
              const before=totalKm(schedule);
              const savedA=schedule[dayA], savedB=schedule[dayB];
              schedule[dayA]=newA; schedule[dayB]=newB;
              const after=totalKm(schedule);
              if(after<before-0.01){ swapImproved=true; break outer3; }
              schedule[dayA]=savedA; schedule[dayB]=savedB;
            }
          }
        }
      }
    }

    // Step 4: 3-way cycles — rotate slots across 3 days: A→dayB, B→dayC, C→dayA
    const deadline4=Date.now()+4000;
    const activeDays4=settings.workDays.filter(d=>(schedule[d]||[]).length>0);
    let cycleImproved=true;
    while(cycleImproved && Date.now()<deadline4){
      cycleImproved=false;
      outer4:
      for(let di=0;di<activeDays4.length;di++){
        const dayA=activeDays4[di];
        for(let dj=0;dj<activeDays4.length;dj++){
          if(dj===di) continue;
          const dayB=activeDays4[dj];
          for(let dk=0;dk<activeDays4.length;dk++){
            if(dk===di||dk===dj) continue;
            const dayC=activeDays4[dk];
            const sA=[...(schedule[dayA]||[])];
            const sB=[...(schedule[dayB]||[])];
            const sC=[...(schedule[dayC]||[])];
            for(let si=0;si<sA.length;si++){
              const slotA=sA[si]; if(slotA.merged||slotA.isGroup) continue;
              const stA=students.find(s=>s.id===slotA.studentId); if(!stA) continue;
              if(!(stA.availability[dayB]&&stA.availability[dayB].on)) continue;
              for(let sj=0;sj<sB.length;sj++){
                const slotB=sB[sj]; if(slotB.merged||slotB.isGroup) continue;
                if(slotB.studentId===slotA.studentId) continue;
                const stB=students.find(s=>s.id===slotB.studentId); if(!stB) continue;
                if(!(stB.availability[dayC]&&stB.availability[dayC].on)) continue;
                for(let sk=0;sk<sC.length;sk++){
                  const slotC=sC[sk]; if(slotC.merged||slotC.isGroup) continue;
                  if(slotC.studentId===slotA.studentId||slotC.studentId===slotB.studentId) continue;
                  const stC=students.find(s=>s.id===slotC.studentId); if(!stC) continue;
                  if(!(stC.availability[dayA]&&stC.availability[dayA].on)) continue;
                  // Never give a student two slots on the same day after rotation
                  if(sB.some(s=>s.studentId===slotA.studentId)) continue;
                  if(sC.some(s=>s.studentId===slotB.studentId)) continue;
                  if(sA.some((s,i)=>i!==si&&s.studentId===slotC.studentId)) continue;
                  // Rotate: A→dayB, B→dayC, C→dayA
                  const newA=[...sA.filter((_,i)=>i!==si),slotC];
                  const newB=[...sB.filter((_,j)=>j!==sj),slotA];
                  const newC=[...sC.filter((_,k)=>k!==sk),slotB];
                  const rA=tryAssignDay(dayA,newA); if(!rA) continue;
                  const rB=tryAssignDay(dayB,newB); if(!rB) continue;
                  const rC=tryAssignDay(dayC,newC); if(!rC) continue;
                  const before=totalKm(schedule);
                  const svA=schedule[dayA],svB=schedule[dayB],svC=schedule[dayC];
                  schedule[dayA]=rA; schedule[dayB]=rB; schedule[dayC]=rC;
                  const after=totalKm(schedule);
                  if(after<before-0.01){ cycleImproved=true; break outer4; }
                  schedule[dayA]=svA; schedule[dayB]=svB; schedule[dayC]=svC;
                }
              }
            }
          }
        }
      }
    }

    // Step 5: 4-way cycles — A→dayB, B→dayC, C→dayD, D→dayA (budget 3s)
    const deadline5=Date.now()+3000;
    const activeDays5=settings.workDays.filter(d=>(schedule[d]||[]).length>0);
    let cycle4Improved=true;
    while(cycle4Improved && Date.now()<deadline5){
      cycle4Improved=false;
      outer5:
      for(let di=0;di<activeDays5.length&&Date.now()<deadline5;di++){
        const dA=activeDays5[di];
        for(let dj=0;dj<activeDays5.length&&Date.now()<deadline5;dj++){
          if(dj===di) continue; const dB=activeDays5[dj];
          for(let dk=0;dk<activeDays5.length&&Date.now()<deadline5;dk++){
            if(dk===di||dk===dj) continue; const dC=activeDays5[dk];
            for(let dl=0;dl<activeDays5.length&&Date.now()<deadline5;dl++){
              if(dl===di||dl===dj||dl===dk) continue; const dD=activeDays5[dl];
              const sA=[...(schedule[dA]||[])], sB=[...(schedule[dB]||[])];
              const sC=[...(schedule[dC]||[])], sD=[...(schedule[dD]||[])];
              for(let si=0;si<sA.length;si++){
                const slA=sA[si]; if(slA.merged||slA.isGroup) continue;
                const stA=students.find(s=>s.id===slA.studentId); if(!stA) continue;
                if(!(stA.availability[dB]&&stA.availability[dB].on)) continue;
                for(let sj=0;sj<sB.length;sj++){
                  const slB=sB[sj]; if(slB.merged||slB.isGroup) continue;
                  if(slB.studentId===slA.studentId) continue;
                  const stB=students.find(s=>s.id===slB.studentId); if(!stB) continue;
                  if(!(stB.availability[dC]&&stB.availability[dC].on)) continue;
                  for(let sk=0;sk<sC.length;sk++){
                    const slC=sC[sk]; if(slC.merged||slC.isGroup) continue;
                    if(slC.studentId===slA.studentId||slC.studentId===slB.studentId) continue;
                    const stC=students.find(s=>s.id===slC.studentId); if(!stC) continue;
                    if(!(stC.availability[dD]&&stC.availability[dD].on)) continue;
                    for(let sl=0;sl<sD.length;sl++){
                      const slD=sD[sl]; if(slD.merged||slD.isGroup) continue;
                      if(slD.studentId===slA.studentId||slD.studentId===slB.studentId||slD.studentId===slC.studentId) continue;
                      const stD=students.find(s=>s.id===slD.studentId); if(!stD) continue;
                      if(!(stD.availability[dA]&&stD.availability[dA].on)) continue;
                      // Never give a student two slots on the same day after rotation
                      if(sB.some(s=>s.studentId===slA.studentId)) continue;
                      if(sC.some(s=>s.studentId===slB.studentId)) continue;
                      if(sD.some(s=>s.studentId===slC.studentId)) continue;
                      if(sA.some((s,i)=>i!==si&&s.studentId===slD.studentId)) continue;
                      // Rotate: A→dB, B→dC, C→dD, D→dA
                      const nA=[...sA.filter((_,i)=>i!==si),slD];
                      const nB=[...sB.filter((_,j)=>j!==sj),slA];
                      const nC=[...sC.filter((_,k)=>k!==sk),slB];
                      const nD=[...sD.filter((_,l)=>l!==sl),slC];
                      const rA=tryAssignDay(dA,nA); if(!rA) continue;
                      const rB=tryAssignDay(dB,nB); if(!rB) continue;
                      const rC=tryAssignDay(dC,nC); if(!rC) continue;
                      const rD=tryAssignDay(dD,nD); if(!rD) continue;
                      const before=totalKm(schedule);
                      const svA=schedule[dA],svB=schedule[dB],svC=schedule[dC],svD=schedule[dD];
                      schedule[dA]=rA; schedule[dB]=rB; schedule[dC]=rC; schedule[dD]=rD;
                      const after=totalKm(schedule);
                      if(after<before-0.01){ cycle4Improved=true; break outer5; }
                      schedule[dA]=svA; schedule[dB]=svB; schedule[dC]=svC; schedule[dD]=svD;
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  },

  // Backtracking scheduler with MRV heuristic + forward checking
  runBacktrack(students, settings){
    const schedule = {};
    settings.workDays.forEach(d => schedule[d] = []);

    // Phase 0: forceMerge students first (deterministic)
    for(const s of students.filter(s => s.forceMerge)){
      const dur = s.lessonsPerWeek * s.lessonDuration;
      for(const day of settings.workDays){
        const av = s.availability[day];
        if(!av || !av.on) continue;
        const slot = this.findSlotDur(s, day, schedule[day]||[], settings, dur);
        if(slot){
          schedule[day].push({ studentId:s.id, studentName:s.name, subject:s.subject||'—', address:s.address, color:s.color||0, start:slot.start, end:slot.end, duration:dur, mergedCount:s.lessonsPerWeek, merged:true, originalDuration:s.lessonDuration });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          break;
        }
      }
    }

    // Build task list: one entry per required lesson per normal student
    const normal = students.filter(s => !s.forceMerge);
    const tasks = [];
    for(const s of normal){
      for(let i = 0; i < s.lessonsPerWeek; i++) tasks.push({ student:s, lessonIdx:i });
    }

    // placedDays[studentId] = [days already assigned during backtrack]
    const placedDays = {};
    for(const s of normal) placedDays[s.id] = [];

    // One slot per student per day — hard constraint
    const availDayCount = (s) => settings.workDays.filter(d => { const av=s.availability[d]; return av&&av.on; }).length;
    const canSameDay = (s) => false;

    // Count available slots for a task given current schedule + placedDays
    const countSlots = (task, sch) => {
      let n = 0;
      const pd = placedDays[task.student.id];
      const sameDay = canSameDay(task.student);
      for(const day of settings.workDays){
        const av = task.student.availability[day];
        if(!av || !av.on) continue;
        if(!sameDay && pd.includes(day)) continue; // spread across days when possible
        if(this.findSlot(task.student, day, sch[day]||[], settings)) n++;
      }
      return n;
    };

    // Return all valid start times for a student on a day (key decision points only)
    const allSlotsOnDay = (student, day, existing) => {
      const margin = (settings.travelMargin ?? 3);
      const dayH = settings.dayHours[day];
      if(!dayH) return [];
      const av = student.availability[day];
      if(!av || !av.on) return [];
      const dur = student.lessonDuration;
      const winStart = Math.max(this.toMin(dayH.start), this.toMin(av.start));
      const winEnd   = Math.min(this.toMin(dayH.end),   this.toMin(av.end));
      if(winEnd - winStart < dur) return [];
      const winEndFlex = winEnd + 15;
      // Key candidate times: window start + just after each existing slot ends (+ travel + margin)
      const sorted = [...existing].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
      const candidates = new Set([winStart]);
      for(const e of sorted){
        const bufAfter = e.studentId === student.id ? 0 : this.travelEstMin(e.studentId, e.address, student.id, student.address, day) + margin;
        const t = this.toMin(e.end) + bufAfter;
        const rounded = Math.ceil(t / 5) * 5;
        if(rounded >= winStart && rounded + dur <= winEndFlex) candidates.add(rounded);
      }
      const slots = [];
      for(const t of [...candidates].sort((a,b)=>a-b)){
        if(t + dur > winEndFlex) continue;
        let ok = true;
        for(const e of sorted){
          const es = this.toMin(e.start), ee = this.toMin(e.end);
          const sm = e.studentId === student.id;
          const bb = sm ? 0 : this.travelEstMin(e.studentId, e.address, student.id, student.address, day) + margin;
          const ba = sm ? 0 : this.travelEstMin(student.id, student.address, e.studentId, e.address, day) + margin;
          if(t < ee + bb && t + dur + ba > es){ ok = false; break; }
        }
        if(ok) slots.push({ start: this.toTime(t), end: this.toTime(t + dur) });
      }
      return slots;
    };

    const deadline = Date.now() + 4000; // 4-second hard limit
    let nodesVisited = 0;
    const MAX_NODES = 200000;

    // Pre-filter tasks permanently impossible given current schedule (forceMerge already placed)
    const feasibleTasks = tasks.filter(t => countSlots(t, schedule) > 0);

    // Track best partial solution found so far
    let bestSchedule = null, bestPlaced = -1;
    const saveBest = (sch) => {
      const cnt = this.countTotal(sch);
      if(cnt > bestPlaced){
        bestPlaced = cnt;
        bestSchedule = {};
        for(const d of settings.workDays) bestSchedule[d] = [...(sch[d]||[])];
      }
    };

    const backtrack = (remaining, sch) => {
      nodesVisited++;
      if(remaining.length === 0){ saveBest(sch); return true; }
      if(nodesVisited > MAX_NODES || Date.now() > deadline){ saveBest(sch); return false; }

      // MRV: pick task with fewest options; skip any with 0 options (impossible now)
      let minCount = Infinity, bestIdx = -1;
      for(let i = 0; i < remaining.length; i++){
        const c = countSlots(remaining[i], sch);
        if(c === 0) continue; // can't place now — save best and continue trying others
        if(c < minCount){ minCount = c; bestIdx = i; }
      }

      if(bestIdx === -1){ saveBest(sch); return false; } // all impossible

      const task = remaining[bestIdx];
      const rest = remaining.filter((_,i) => i !== bestIdx);
      const pd = placedDays[task.student.id];
      const sameDay = canSameDay(task.student);

      for(const day of settings.workDays){
        const av = task.student.availability[day];
        if(!av || !av.on) continue;
        if(!sameDay && pd.includes(day)) continue;

        const slots = allSlotsOnDay(task.student, day, sch[day]||[]);
        for(const slot of slots){
          const entry = { studentId:task.student.id, studentName:task.student.name, subject:task.student.subject||'—', address:task.student.address, color:task.student.color||0, start:slot.start, end:slot.end, duration:task.student.lessonDuration, mergedCount:1, merged:false };
          sch[day].push(entry);
          sch[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          pd.push(day);

          if(backtrack(rest, sch)) return true;

          sch[day] = sch[day].filter(e => e !== entry);
          pd.pop();
        }
      }
      saveBest(sch); // save best after exhausting all placements for this task
      return false;
    };

    const success = backtrack(feasibleTasks, schedule);
    if(!success && bestSchedule && this.countTotal(bestSchedule) > this.countTotal(schedule)){
      for(const d of settings.workDays) schedule[d] = bestSchedule[d];
    }

    // Build unplaced list
    const unplaced = [];
    for(const s of students){
      const cnt = this.countPlaced(s.id, schedule);
      if(cnt < s.lessonsPerWeek){
        const u = { student:s, placed:cnt, needed:s.lessonsPerWeek, reason: this.diagnoseUnplaced(s, schedule, settings) };
        this.computeSuggestion(u, schedule, settings);
        unplaced.push(u);
      }
    }
    return { schedule, placed: this.countTotal(schedule), total: students.reduce((a,s)=>a+s.lessonsPerWeek,0), unplaced, success };
  },

  // Remaining minutes available on a day for new lessons
  dayFreeMin(day, schedule, settings){
    const dayH = settings.dayHours[day];
    if(!dayH) return 0;
    const total = this.toMin(dayH.end) - this.toMin(dayH.start);
    const used = (schedule[day]||[]).reduce((a,s)=>a+s.duration,0);
    const buf  = (schedule[day]||[]).length * (settings.travelMargin ?? 3);
    return Math.max(0, total - used - buf);
  },

  runOnce(students, settings, coords={}, seed=0){
    const schedule = {};
    settings.workDays.forEach(d => { schedule[d] = [] });

    // All attempts shuffled — seed 0 uses Date.now() for true randomness
    const normal  = this.shuffle(students.filter(s=>!s.forceMerge));
    const mergers = students.filter(s =>  s.forceMerge);

    // ── Phase 0: forceMerge students first (they have single-day constraints) ──
    for(const student of mergers){
      const missing = student.lessonsPerWeek;
      const mergedDur = missing * student.lessonDuration;
      const cd = settings.workDays.filter(d => { const av=student.availability[d]; return av&&av.on; });
      for(const day of cd){
        const slot = this.findSlotDur(student, day, schedule[day]||[], settings, mergedDur);
        if(slot){
          schedule[day].push({
            studentId:student.id, studentName:student.name,
            subject:student.subject, address:student.address,
            color:student.color, start:slot.start, end:slot.end,
            duration:mergedDur, merged:true, mergedCount:missing,
            originalDuration:student.lessonDuration
          });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          break;
        }
      }
    }

    // ── Phase 1: Dynamic greedy, most-constrained first, day sorted by free time ──
    let progress = true;
    while(progress){
      progress = false;
      const needy = normal.filter(s => this.countPlaced(s.id,schedule) < s.lessonsPerWeek);
      if(!needy.length) break;

      needy.sort((a,b) => this.flexScore(a,schedule,settings) - this.flexScore(b,schedule,settings));

      const student = needy[0];
      const placedDays = this.placedOnDays(student.id, schedule);
      const candidateDays = settings.workDays.filter(d => {
        const av = student.availability[d];
        return av && av.on && !placedDays.includes(d);
      });

      // Sort by most free time — avoids overloading already-packed days
      candidateDays.sort((a,b) => this.dayFreeMin(b,schedule,settings) - this.dayFreeMin(a,schedule,settings));

      let placed = false;
      for(const day of candidateDays){
        const slot = this.findSlot(student, day, schedule[day]||[], settings);
        if(slot){
          this.addLesson(schedule, student, day, slot);
          progress = true;
          placed = true;
          break;
        }
      }

      // ── Phase 2: Displacement ──
      if(!placed){
        if(this.tryDisplace(student, normal, schedule, settings)){
          progress = true;
        }
      }
    }

    // ── Phase 1.5: EDF per-day repair ──
    // Merge placed + unplaced students per day, sort by EDF, re-place to avoid blocking
    for(const day of settings.workDays){
      const merged = (schedule[day]||[]).filter(s=>s.merged);
      const toReplace = [...new Set((schedule[day]||[]).filter(s=>!s.merged).map(s=>s.studentId))];
      const dayStudents = toReplace.map(id=>normal.find(s=>s.id===id)).filter(Boolean);
      const unplacedHere = normal.filter(s=>{
        if(toReplace.includes(s.id)) return false;
        const av = s.availability[day];
        if(!av || !av.on) return false;
        return this.countPlaced(s.id, schedule) < s.lessonsPerWeek &&
               !this.placedOnDays(s.id, schedule).includes(day);
      });
      const allHere = [...dayStudents, ...unplacedHere];
      if(allHere.length === 0) continue;
      // Sort ALL together by EDF (earliest deadline first), ties broken by narrower window
      allHere.sort((a,b)=>{
        const aav = a.availability[day], bav = b.availability[day];
        const ae = aav ? this.toMin(aav.end) : 9999;
        const be = bav ? this.toMin(bav.end) : 9999;
        if(ae !== be) return ae - be;
        // tie: earlier window start first (leaves later slots for others)
        const as = aav ? this.toMin(aav.start) : 0;
        const bs = bav ? this.toMin(bav.start) : 0;
        return as - bs;
      });
      schedule[day] = [...merged];
      for(const student of allHere){
        if(this.countPlaced(student.id, schedule) >= student.lessonsPerWeek) continue;
        if(this.placedOnDays(student.id, schedule).includes(day)) continue;
        const slot = this.findSlot(student, day, schedule[day], settings);
        if(slot) this.addLesson(schedule, student, day, slot);
      }
    }

    // ── Phase 3: Merged-block fallback for unplaced students ──
    // If a student still needs 2+ lessons and can't fit separately, try a single merged block
    for(const student of normal){
      const cnt = this.countPlaced(student.id, schedule);
      if(cnt >= student.lessonsPerWeek) continue;
      const missing = student.lessonsPerWeek - cnt;
      if(missing < 2) continue;
      const mergeCount = Math.min(missing, 2);
      const mergedDur = mergeCount * student.lessonDuration;
      const candidateDays = settings.workDays.filter(d => {
        const av = student.availability[d];
        return av && av.on;
      });
      candidateDays.sort((a,b) => this.dayFreeMin(b,schedule,settings) - this.dayFreeMin(a,schedule,settings));
      for(const day of candidateDays){
        // Remove any partial placement on this day first
        const tempDay = (schedule[day]||[]).filter(s => s.studentId !== student.id);
        const slot = this.findSlotDur(student, day, tempDay, settings, mergedDur);
        if(slot){
          schedule[day] = tempDay;
          schedule[day].push({
            studentId:student.id, studentName:student.name,
            subject:student.subject, address:student.address,
            color:student.color, start:slot.start, end:slot.end,
            duration:mergedDur, merged:true, mergedCount:mergeCount,
            originalDuration:student.lessonDuration
          });
          schedule[day].sort((a,b)=>this.toMin(a.start)-this.toMin(b.start));
          break;
        }
      }
    }

    // ── Phase 4: forceMerge blocks ──
    for(const student of mergers){
      const cnt = this.countPlaced(student.id, schedule);
      if(cnt >= student.lessonsPerWeek) continue;
      const missing = student.lessonsPerWeek - cnt;
      const mergedDur = missing * student.lessonDuration;
      const placedDays = this.placedOnDays(student.id, schedule);
      const candidateDays = settings.workDays.filter(d => {
        const av = student.availability[d];
        return av && av.on;
      });
      for(const day of candidateDays){
        if(placedDays.includes(day)){
          schedule[day] = schedule[day].filter(s => s.studentId !== student.id);
        }
        const slot = this.findSlotDur(student, day, schedule[day]||[], settings, mergedDur);
        if(slot){
          schedule[day].push({
            studentId:student.id, studentName:student.name,
            subject:student.subject, address:student.address,
            color:student.color, start:slot.start, end:slot.end,
            duration:mergedDur, merged:true, mergedCount:missing,
            originalDuration:student.lessonDuration
