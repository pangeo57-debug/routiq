let _schedCreepTimer=null;
function schedProgress(pct, phase, sub, icon){
  const ov=document.getElementById('sched-overlay');
  if(!ov) return;
  if(pct===null){
    clearInterval(_schedCreepTimer); _schedCreepTimer=null;
    ov.style.opacity='0';
    setTimeout(()=>{ ov.style.display='none'; ov.style.opacity=''; },300);
    return;
  }
  ov.style.display='flex';
  const bar=document.getElementById('sched-bar');
  const ph=document.getElementById('sched-phase');
  const sb=document.getElementById('sched-sub');
  const pc=document.getElementById('sched-pct');
  const ic=document.getElementById('sched-icon');
  if(bar) bar.style.width=pct+'%';
  // Keep the bar itself visibly creeping forward between explicit phase updates,
  // instead of sitting frozen at a fixed % while a long computation runs.
  clearInterval(_schedCreepTimer);
  let creepPct=pct;
  const ceiling=Math.min(98,pct+10);
  _schedCreepTimer=setInterval(()=>{
    if(creepPct>=ceiling){ clearInterval(_schedCreepTimer); return; }
    creepPct+=0.3;
    if(bar) bar.style.width=creepPct+'%';
  },200);
  if(ph&&phase){
    ph.style.opacity='0';
    ph.style.transform='translateY(-4px)';
    setTimeout(()=>{ ph.textContent=phase; ph.style.opacity='1'; ph.style.transform='translateY(0)'; },150);
  }
  if(sb&&sub){
    sb.style.opacity='0';
    setTimeout(()=>{ sb.textContent=sub; sb.style.opacity='1'; },150);
  }
  if(pc) pc.textContent=pct+'%';
  if(ic&&icon){
    ic.style.transform='scale(0.6)';
    setTimeout(()=>{ ic.textContent=icon; ic.style.transform='scale(1)'; },100);
  }
}

// ============================================================

// ============================================================
const App = {
  init(){
    try {
      state.settings = Storage.loadSettings();
      state.students = Storage.loadStudents();
      state.schedule = Storage.loadSchedule();
      state.coords   = Storage.loadCoords();
    } catch(e) {
      localStorage.clear();
      state.settings = defaultSettings();
      state.students = [];
      state.schedule = {};
      state.coords = {};
    }

    // Ensure workDays is always an array
    if(!Array.isArray(state.settings.workDays)) state.settings.workDays = [1,2,3,4,5];

    // First run: clean slate + onboarding
    if(!localStorage.getItem('rp_init_v24')){
      state.settings = defaultSettings();
      Storage.saveSettings(state.settings);
      localStorage.setItem('rp_init_v24','1');
      this.showOnboarding();
      return;
    } else if(Object.keys(state.schedule).length===0 && state.students.length>0){
      this.runScheduler();
    }

    // Default schedule day = today or first work day
    const today = new Date().getDay();
    const todayISO = today===0?7:today;
    const workDays = state.settings.workDays.length ? state.settings.workDays : [1,2,3,4,5];
    state.scheduleDay = workDays.includes(todayISO) ? todayISO : (workDays[0]||1);
    state.routeDay = state.scheduleDay;

    try { this.updateNavLabels(); } catch(e){}
    try { this.renderHome(); } catch(e){ console.error('renderHome failed',e); }
    try { this.registerSW(); } catch(e){}
  },

  nav(screen){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('screen-'+screen).classList.add('active');
    document.querySelector(`.nav-btn[data-screen="${screen}"]`).classList.add('active');
    state.currentScreen = screen;
    this.updateNavLabels();
    this['render'+screen.charAt(0).toUpperCase()+screen.slice(1)]();
  },

  updateNavLabels(){
    const L = getLabels();
    const el = document.getElementById('nav-clients-label');
    if(el) el.textContent = L.clients;
  },

  // ---- SCHEDULER ----
  runScheduler(){
    if(state.students.length===0) return;
    const result = Scheduler.run(state.students, state.settings, state.coords);
    state.scheduleAttempts = [result];
    state.scheduleAttemptIdx = 0;
    state.scheduleOptimized = false;
    state.scheduleKmBefore = null;
    state.scheduleKmAfter = null;
    state.schedule = result.schedule;
    state.schedulerResult = result;
    state.routeResults = {};
    Storage.saveSchedule(state.schedule);
    return result;
  },

  switchAttempt(idx){
    state.scheduleAttemptIdx = idx;
    const r = state.scheduleAttempts[idx];
    state.schedule = r.schedule;
    state.schedulerResult = r;
    state.routeResults = {};
    state.scheduleOptimized = false;
    state.scheduleKmBefore = null;
    state.scheduleKmAfter = null;
    Storage.saveSchedule(state.schedule);
    this.renderSchedule();
  },

  async optimizeSchedule(){
    const btn = document.getElementById('optimize-btn');
    if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Υπολογισμός...'; }

    // Estimate km BEFORE optimization using pseudo-coords
    const kmBefore = this._estimateTotalKm(state.schedule);
    state.scheduleKmBefore = kmBefore;

    // Geocode missing addresses (Nominatim, 1.1s rate limit)
    const allIds = [...new Set(Object.values(state.schedule).flat().map(s=>s.studentId))];
    if(!state.coords['home']){
      const c = await Router.geocode(state.settings.homeAddress);
      if(c){ state.coords['home']=c; Storage.saveCoords(state.coords); }
      await new Promise(r=>setTimeout(r,1100));
    }
    for(const id of allIds){
      if(!state.coords[id]){
        const student = state.students.find(s=>s.id===id);
        if(student){
          const c = await Router.geocode(student.address);
          if(c){ state.coords[id]=c; Storage.saveCoords(state.coords); }
          await new Promise(r=>setTimeout(r,1100));
        }
      }
    }

    // Fetch HERE traffic matrices (peak + off-peak) if API key configured
    state.travelMatrixPeak = null;
    state.travelMatrixOffPeak = null;
    state.travelMatrix = null; // legacy fallback
    const hereKey = state.settings && state.settings.hereApiKey;
    if(hereKey){
      try{
        Toast.show('Λήψη χρόνων κίνησης (HERE)…');
        const allIds2 = ['home', ...state.students.map(s=>s.id)];
        const matCoords = allIds2.map(id=>state.coords[id]).filter(Boolean);
        const validIds = allIds2.filter(id=>state.coords[id]);
        // Peak: Mon-Fri 17:00 (heavy traffic)
        const depPeak = new Date(); depPeak.setHours(17,0,0,0);
        const matPeak = await Router.getHereMatrix(matCoords, hereKey, depPeak.toISOString());
        state.travelMatrixPeak = {durations: matPeak.durations, coordIds: validIds};
        // Off-peak: Saturday 11:00 (lighter traffic)
        const depOff = new Date(); depOff.setHours(11,0,0,0);
        // Move to next Saturday if needed
        const dow = depOff.getDay(); if(dow!==6) depOff.setDate(depOff.getDate()+(6-dow+7)%7||7);
        const matOff = await Router.getHereMatrix(matCoords, hereKey, depOff.toISOString());
        state.travelMatrixOffPeak = {durations: matOff.durations, coordIds: validIds};
        Toast.show('Χρόνοι κίνησης ενημερώθηκαν ✓ (peak + off-peak)');
      }catch(e){
        Toast.show('HERE API απέτυχε — χρήση εκτίμησης');
        console.warn('HERE matrix error:', e);
      }
    }

    // Build OSRM travel time matrix
    const matrixCoords = [state.coords['home'], ...allIds.map(id=>state.coords[id]).filter(Boolean)];
    const matrix = await Router.getMatrix(matrixCoords).catch(()=>null);
    let travelMinFn = null;
    if(matrix && matrix.durations){
      const idxMap = matrixCoords;
      const distKm=(a,b)=>{const dx=a.lon-b.lon,dy=a.lat-b.lat;return Math.sqrt(dx*dx+dy*dy)*111*1.4;};
      travelMinFn = (a,b) => {
        const ia = idxMap.findIndex(c=>c&&c.lat===a.lat&&c.lon===a.lon);
        const ib = idxMap.findIndex(c=>c&&c.lat===b.lat&&c.lon===b.lon);
        if(ia>=0&&ib>=0&&matrix.durations[ia]&&matrix.durations[ia][ib]!=null)
          return Math.max(1,Math.round(matrix.durations[ia][ib]/60));
        return Math.max(1,Math.round(distKm(a,b)/((state.settings&&state.settings.avgCitySpeedKmh)||25)*60));
      };
    }

    // Phase 2: geo-optimize (nearest-neighbor TSP, cross-day swaps, 3-way/4-way cycles)
    schedProgress(45,'Φάση 2 — Γεωγραφική βελτιστοποίηση','Ταξινόμηση κατά απόσταση…','🗺️');
    await new Promise(r=>setTimeout(r,30));
    Scheduler.geoOptimize(state.schedule, state.students, state.settings, state.coords, travelMinFn);
    // Phase 3: Simulated Annealing — 25s cross-day reassignment
    schedProgress(55,'Φάση 3 — Simulated Annealing','Ελαχιστοποίηση χιλιομέτρων (25s)…','🔥');
    await new Promise(r=>setTimeout(r,30));
    await Scheduler.saOptimize(state.schedule, state.students, state.settings, state.coords, travelMinFn, 25000);
    // Phase 4: repair pass — try to place students left out after SA freed up time
    schedProgress(88,'Φάση 4 — Τελική τοποθέτηση','Επανατοποθέτηση αδύνατων…','🔧');
    await new Promise(r=>setTimeout(r,30));
    Scheduler.saRepair(state.schedule, state.students, state.settings, state.schedulerResult);
    // Phase 5: LNS — destroy/repair to place remaining students (10s)
    schedProgress(95,'Φάση 5 — LNS','Επανατοποθέτηση με destroy-repair (10s)…','🔍');
    await new Promise(r=>setTimeout(r,30));
    Scheduler.lnsRepair(state.schedule, state.students, state.settings, 10000);
    // Verify constraints
    const issues=Scheduler.verifySchedule(state.schedule,state.students,state.settings);
    if(issues.length) console.warn('⚠ Schedule constraint issues:',issues);
    state.scheduleAttempts[0] = { ...state.schedulerResult, schedule: state.schedule };

    state.scheduleAttemptIdx = 0;
    const best = state.scheduleAttempts[0];
    state.schedule = best.schedule;
    state.schedulerResult = best;
    state.routeResults = {};
    Storage.saveSchedule(state.schedule);

    state.scheduleOptimized = true;
    state.scheduleKmAfter = this._estimateTotalKm(state.schedule);

    schedProgress(null,null,null,null);
    this.renderSchedule();
    if(btn){ btn.disabled=false; btn.innerHTML='Βελτιστοποίηση με χάρτη'; }
  },

  _estimateTotalKm(schedule){
    const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');
    let total = 0;
    for(const day of Object.keys(schedule)){
      const slots = schedule[day];
      if(!slots.length) continue;
      let prev = homeC;
      let prevSl = null;
      for(const sl of slots){
        const c = state.coords[sl.studentId] || Scheduler.coordsHash(sl.address);
        const sameLocation = prevSl && (prevSl.studentId === sl.studentId ||
          (prevSl.groupCode && prevSl.groupCode === sl.groupCode));
        if(!sameLocation) total += Router.estimateKm(prev, c);
        prev = c;
        prevSl = sl;
      }
      total += Router.estimateKm(prev, homeC);
    }
    return total;
  },

  async runAndNotify(){
    const btn = document.querySelector('.btn[onclick*="runAndNotify"]');
    if(btn){ btn.disabled=true; btn.style.opacity='0.6'; btn.innerHTML = btn.innerHTML.replace(/Ανανέωση|<svg[^>]*>.*?<\/svg>\s*/s,'') ; btn.textContent = 'Geocoding...'; }

    // Geocode any missing addresses before scheduling
    const toGeocode = [];
    if(!state.coords['home']){
      toGeocode.push({ id:'home', addr: state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα' });
    }
    for(const st of state.students){
      if(st.address && !state.coords[st.id]) toGeocode.push({ id:st.id, addr:st.address });
    }
    if(toGeocode.length > 0){
      const results = await Promise.allSettled(
        toGeocode.map(({ id, addr }) =>
          Router.geocode(addr).then(c => ({ id, c }))
        )
      );
      let updated = false;
      for(const res of results){
        if(res.status==='fulfilled' && res.value.c){
          state.coords[res.value.id] = res.value.c;
          updated = true;
        }
      }
      if(updated) Storage.saveCoords(state.coords);
    }

    if(btn){ btn.disabled=true; btn.style.opacity='0.6'; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Υπολογισμός...`; }
    schedProgress(5,'Φάση 1 — Τοποθέτηση μαθητών','Backtracking (20s)…','🧩');
    await new Promise(r=>setTimeout(r,40));

    // Fetch routing matrices BEFORE scheduling so travelEstMin() uses real road times
    state.travelMatrixPeak = null;
    state.travelMatrixOffPeak = null;
    state.travelMatrix = null;
    try{
      const hereKey = state.settings && state.settings.hereApiKey;
      const allStudentIds = state.students.map(s=>s.id);
      const allIds = ['home', ...allStudentIds];
      const matCoords = allIds.map(id=>state.coords[id]).filter(Boolean);
      const validIds = allIds.filter(id=>state.coords[id]);
      if(matCoords.length >= 2){
        if(hereKey){
          // Peak: weekdays 17:00
          const depPeak = new Date(); depPeak.setHours(17,0,0,0);
          const matPeak = await Router.getHereMatrix(matCoords, hereKey, depPeak.toISOString());
          state.travelMatrixPeak = {durations: matPeak.durations, coordIds: validIds};
          // Off-peak: Saturday 11:00
          const depOff = new Date(); depOff.setHours(11,0,0,0);
          const dow = depOff.getDay(); if(dow!==6) depOff.setDate(depOff.getDate()+(6-dow+7)%7||7);
          const matOff = await Router.getHereMatrix(matCoords, hereKey, depOff.toISOString());
          state.travelMatrixOffPeak = {durations: matOff.durations, coordIds: validIds};
        } else {
          const matrix = await Router.getMatrix(matCoords).catch(()=>null);
          if(matrix && matrix.durations){
            // No traffic data — use same matrix for both (OSRM is traffic-free)
            state.travelMatrixPeak = {durations: matrix.durations, coordIds: validIds};
            state.travelMatrixOffPeak = {durations: matrix.durations, coordIds: validIds};
          }
        }
      }
    }catch(e){ console.warn('Matrix pre-fetch failed, using straight-line estimates:', e); }

    // Phase 1: backtracking CSP
    schedProgress(15,'Φάση 1 — Τοποθέτηση','Backtracking CSP…','🧩');
    await new Promise(r=>setTimeout(r,40));
    let r;
    try{
      if(state.students.length===0){ schedProgress(null); return; }
      const result = Scheduler.scheduleAll(state.students, state.settings);
      result._attempts = 1;
      state.scheduleAttempts = [result];
      state.scheduleAttemptIdx = 0;
      state.scheduleOptimized = false;
      state.scheduleKmBefore = null;
      state.scheduleKmAfter = null;
      state.schedule = result.schedule;
      state.schedulerResult = result;
      state.routeResults = {};
      r = result;
    }catch(e){ console.error('Scheduler error',e); }

    // Phase 2: geo-optimize
    schedProgress(35,'Φάση 2 — Γεωγραφική βελτιστοποίηση','Ταξινόμηση κατά απόσταση…','🗺️');
    await new Promise(r=>setTimeout(r,40));
    try{ Scheduler.geoOptimize(state.schedule, state.students, state.settings, state.coords); }catch(e){}

    // Phase 3: Simulated Annealing
    schedProgress(55,'Φάση 3 — Simulated Annealing','Ελαχιστοποίηση χιλιομέτρων…','🔥');
    await new Promise(r=>setTimeout(r,40));
    try{
      const travelMinFn = null; // uses state.travelMatrixPeak via travelEstMin
      await Scheduler.saOptimize(state.schedule, state.students, state.settings, state.coords, travelMinFn, 25000);
    }catch(e){}

    // Phase 4: repair
    schedProgress(82,'Φάση 4 — Επανατοποθέτηση','Τοποθέτηση αδύνατων μαθητών…','🔧');
    await new Promise(r=>setTimeout(r,40));
    try{ Scheduler.saRepair(state.schedule, state.students, state.settings, state.schedulerResult); }catch(e){}

    // Phase 5: LNS
    schedProgress(92,'Φάση 5 — LNS','Destroy-repair (10s)…','🔍');
    await new Promise(r=>setTimeout(r,40));
    try{ Scheduler.lnsRepair(state.schedule, state.students, state.settings, 10000); }catch(e){}

    schedProgress(100,'Ολοκληρώθηκε','Αποθήκευση προγράμματος…','✅');
    await new Promise(r=>setTimeout(r,300));

    if(r){
      state.scheduleKmBefore = this._estimateTotalKm(state.schedule);
      state.scheduleAttempts[0] = { ...r, schedule: state.schedule };
      state.schedulerResult = state.scheduleAttempts[0];
      Storage.saveSchedule(state.schedule);
    }

    state._scheduleStale = false;
    schedProgress(null,null,null,null);
    if(btn){ btn.disabled=false; btn.style.opacity=''; btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Ανανέωση`; }
    // Always re-render regardless of scheduler outcome
    if(state.currentScreen==='schedule') this.renderSchedule();
    else if(state.currentScreen==='home') this.renderHome();
    // Always refresh home stats (even if not currently visible)
    if(state.currentScreen!=='home') this.renderHome();
    if(!r) return;
    const total = state.students.reduce((a,s)=>a+s.lessonsPerWeek,0);
    const placed = total - r.unplaced.reduce((a,u)=>a+(u.needed-u.placed),0);
    const att = r._attempts || 1;
    const attLabel = att > 1 ? ` (${att} δοκιμές)` : '';
    Toast.show(`Πρόγραμμα: ${placed}/${total} μαθήματα τοποθετήθηκαν${attLabel}`,'success');
  },

  // ---- HOME ----
  renderHome(){
    const s = document.getElementById('screen-home');
    const today = new Date();
    const todayNum = today.getDay()===0?7:today.getDay();
    const todaySlots = state.schedule[todayNum]||[];
    const totalLessons = state.students.reduce((a,s)=>a+s.lessonsPerWeek,0);

    // (state.schedulerResult is session-only, never persisted to localStorage)

        const ids = e.groupMemberIds || [e.studentId, e.pairedStudentId].filter(Boolean);
        ids.forEach(id=>{ placedByStudent[id] = (placedByStudent[id]||0) + 1; });
      } else {
        placedByStudent[e.studentId] = (placedByStudent[e.studentId]||0) + (e.mergedCount||1);
      }
    });
    const unplacedStudents = state.students.filter(s => (placedByStudent[s.id]||0) < s.lessonsPerWeek);

    const greeting = this.getGreeting();
    const name = state.settings.teacherName||'';
    const L = getLabels();

    s.innerHTML = `
      <div class="hero">
        <div class="hero-greeting">${greeting}</div>
        <div class="hero-title">${name?name+', ':''}<span class="accent">RoutePal</span>${name?'':' — Καλώς ήρθατε'}</div>
      </div>
      ${state._scheduleStale && state.students.length>0 ? `
        <div style="margin:0 16px 12px;background:rgba(217,119,6,.1);border:1.5px solid rgba(217,119,6,.35);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div style="flex:1">
            <div style="font-weight:700;font-size:13px;color:#d97706">Πρόγραμμα μη ενημερωμένο</div>
            <div style="font-size:12px;color:var(--text2)">Έχουν αλλάξει μαθητές — πατήστε Υπολογισμός</div>
          </div>
          <button onclick="App.runAndNotify()" style="padding:8px 14px;background:#d97706;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Υπολογισμός</button>
        </div>
      `:''}
      <div class="stats-grid">
        <div class="stat-card accent-green">
          <div class="stat-val">${todaySlots.length}<span> σήμερα</span></div>
          <div class="stat-label">${L.sessions} ${DAYS_FULL[todayNum]||''}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,todaySlots.length/5*100)}%"></div></div>
        </div>
        <div class="stat-card accent-blue">
          <div class="stat-val">${placedCount}<span>/${totalLessons}</span></div>
          <div class="stat-label">Εβδομάδα</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${totalLessons?placedCount/totalLessons*100:0}%;background:var(--blue)"></div></div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val">${state.students.length}</div>
          <div class="stat-label">${L.clients}</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${state.settings.travelMargin??3}<span>λ</span></div>
          <div class="stat-label">Margin ασφαλείας</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val">${(state.schedule ? Object.values(state.schedule).flat().reduce((a,s)=>a+s.duration,0)/60 : 0).toFixed(1)}<span>ω</span></div>
          <div class="stat-label">Ώρες/εβδ</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${state.scheduleKmAfter != null ? state.scheduleKmAfter.toFixed(1) : (state.scheduleKmBefore != null ? state.scheduleKmBefore.toFixed(1) : '—')}<span>km</span></div>
          <div class="stat-label">${state.scheduleKmAfter != null ? 'Km εβδ (βελτ.)' : 'Km εβδ (εκτίμ.)'}</div>
        </div>
      </div>
      ${allFit ? `
      <div style="margin:0 16px 12px;background:rgba(5,150,105,.08);border:1.5px solid rgba(5,150,105,.3);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>
        <div>
          <div style="font-weight:700;font-size:14px;color:#059669">Χώρεσαν όλοι οι μαθητές!</div>
          <div style="font-size:12px;color:var(--text2)">${placedCount}/${totalLessons} μαθήματα τοποθετήθηκαν</div>
        </div>
      </div>` : unplacedStudents.length>0 ? `
      <div class="warning-banner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span><b>${unplacedStudents.length} μαθητής/ές δεν χωράει πλήρως</b>: ${unplacedStudents.map(s=>esc(s.name)).join(', ')}. Δες Πρόγραμμα για λεπτομέρειες.</span>
      </div>`:''}
      <div class="section-title">Σήμερα · ${DAYS_FULL[todayNum]||'—'}</div>
      ${todaySlots.length===0?`
        <div style="padding:16px 16px 0">
          <div class="card-sm" style="text-align:center;color:var(--text2);font-size:14px;padding:20px">
            ${(state.settings.workDays||[]).includes(todayNum)?'Δεν υπάρχουν μαθήματα σήμερα':'Σήμερα δεν εργάζεστε'}
          </div>
        </div>`
      : todaySlots.map((slot,i)=>this.miniSlot(slot,i)).join('')}
      <div style="padding:16px 16px 0;display:flex;gap:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="App.nav('schedule')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Πρόγραμμα
        </button>
        <button class="btn btn-primary" style="flex:1" onclick="App.nav('route')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 6.9 8 11.7z"/></svg>
          Διαδρομή
        </button>
      </div>
    `;
  },

  miniSlot(slot, idx){
    const mergeTag = slot.merged ? `<span class="merge-badge">ΜΠΛΟΚ ${slot.mergedCount}×${slot.originalDuration}λ</span>` : '';
    return `
      <div class="slot-block ${COLORS[slot.color||0]}${slot.merged?' merged':''}${slot.isGroup?' group-slot':''}" style="margin-bottom:8px">
        <div class="slot-time">${slot.start} – ${slot.end}</div>
        <div class="slot-name">${slot.studentName} ${mergeTag}</div>
        <div class="slot-meta">
          <span class="chip chip-gray">${slot.subject}</span>
          <span class="chip chip-gray">${slot.duration}λ</span>
        </div>
      </div>`;
  },

  getGreeting(){
    const h = new Date().getHours();
    if(h<12) return 'Καλημέρα';
    if(h<17) return 'Καλό απόγευμα';
    return 'Καλησπέρα';
  },

  // ---- STUDENTS ----
  renderStudents(){
    const s = document.getElementById('screen-students');
    const students = state.students;
    const L = getLabels();
    s.innerHTML = `
      <div class="topbar">
        <div class="topbar-inner">
          <div>
            <div class="logo">Route<span>Pal</span></div>
            <div class="topbar-sub">${L.clients} · ${students.length} εγγεγραμμένοι</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${students.length>0?`<button class="btn btn-secondary" onclick="App.geocodeAllStudents()" id="btn-geocode-all" style="padding:8px 12px;font-size:12px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 6.9 8 11.7z"/></svg>
              Χάρτης
            </button>`:''}
            <button class="btn btn-primary" onclick="App.openStudentDrawer(null)" style="padding:8px 14px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Νέος
            </button>
          </div>
        </div>
      </div>
      ${students.length===0?`
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <h3>Δεν υπάρχουν ${L.clients.toLowerCase()}</h3>
          <p>Προσθέστε τον πρώτο σας ${L.client.toLowerCase()} για να ξεκινήσει η χρήση του RoutePal</p>
          <button class="btn btn-primary" onclick="App.openStudentDrawer(null)">Προσθήκη ${L.client}</button>
        </div>
      `:`
        ${Object.keys(state.coords).filter(k=>k!=='home').length>0?`
          <div style="margin:0 0 8px;background:var(--bg2);border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;cursor:pointer" onclick="App.toggleStudentsMap()">
              <span style="font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.05em">ΧΑΡΤΗΣ ΤΟΠΟΘΕΣΙΩΝ</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;color:var(--text3)">${Object.keys(state.coords).filter(k=>k!=='home').length} τοποθεσίες</span>
                <svg id="map-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);transition:transform .2s;transform:rotate(${state._mapExpanded?'180':'0'}deg)"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
            <div id="students-overview-map-wrap" style="overflow:hidden;transition:max-height .3s ease;max-height:${state._mapExpanded?'220px':'0px'}">
              <div id="students-overview-map" style="height:200px;margin:0 16px 12px;border-radius:10px;overflow:hidden;background:var(--bg3)"></div>
            </div>
          </div>
        `:''}
        ${students.map(st=>this.studentCard(st)).join('')}
      `}
    `;
    if(students.length>0 && state._mapExpanded) this.initStudentsMap();
  },

  toggleStudentsMap(){
    state._mapExpanded = !state._mapExpanded;
    const wrap = document.getElementById('students-overview-map-wrap');
    const chev = document.getElementById('map-chevron');
    if(wrap) wrap.style.maxHeight = state._mapExpanded ? '220px' : '0px';
    if(chev) chev.style.transform = state._mapExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
    if(state._mapExpanded) setTimeout(()=>this.initStudentsMap(), 50);
  },

  initStudentsMap(){
    const el = document.getElementById('students-overview-map');
    if(!el || typeof L === 'undefined') return;
    if(el._leaflet_id){ try{ el._leaflet_map && el._leaflet_map.remove(); }catch(e){} }
    const geocodedStudents = state.students.filter(s => state.coords[s.id]);
    if(geocodedStudents.length === 0){ el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px">Δεν υπάρχουν geocoded τοποθεσίες</div>'; return; }
    const homeC = state.coords['home'];
    const pts = geocodedStudents.map(s=>state.coords[s.id]);
    const allPts = homeC ? [homeC,...pts] : pts;
    const latlngs = allPts.map(c=>[c.lat,c.lon]);
    const map = L.map(el, {
      zoomControl:false, attributionControl:false,
      dragging:false, touchZoom:false, scrollWheelZoom:false,
      doubleClickZoom:false, boxZoom:false, keyboard:false
    }).setView(latlngs[0], 12);
    el._leaflet_map = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    if(homeC){
      L.marker([homeC.lat,homeC.lon],{icon:L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#7c3aed;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).bindTooltip('🏠 Σπίτι',{permanent:false}).addTo(map);
    }
    const avatarColors=['#059669','#7c3aed','#d97706','#db2777','#ca8a04','#0891b2','#16a34a','#9333ea','#c2410c','#0284c7'];
    geocodedStudents.forEach(s=>{
      const c=state.coords[s.id];
      const col=avatarColors[(s.color||0)%avatarColors.length];
      const initials=s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      L.marker([c.lat,c.lon],{icon:L.divIcon({className:'',html:`<div style="width:26px;height:26px;background:${col};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">${initials}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).bindTooltip(`${s.name}<br><span style='font-size:11px;color:#aaa'>${s.address}</span>`,{permanent:false}).addTo(map);
    });
    try{ map.fitBounds(L.latLngBounds(latlngs).pad(0.15)); }catch(e){}
  },

  studentCard(st){
    const avDays = Object.entries(st.availability||{})
      .filter(([,v])=>v.on)
      .map(([d,v])=>`${DAYS[d]} ${v.start}–${v.end}`)
      .join(', ');
    const placed = Scheduler.countPlaced(st.id, state.schedule);
    const avatarColors = ['#059669','#7c3aed','#d97706','#db2777','#ca8a04','#0891b2','#16a34a','#9333ea','#c2410c','#0284c7'];
    const bg = avatarColors[st.color||0];
    const initials = st.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `
      <div class="student-card" id="sc-${st.id}">
        <div class="student-header" onclick="App.toggleStudent('${st.id}')">
          <div class="student-avatar" style="background:${bg}20;color:${bg};border:1px solid ${bg}40">${initials}</div>
          <div class="student-info">
            <div class="student-name">${st.name}</div>
            <div class="student-sub">${st.subject} · ${st.lessonsPerWeek}x/εβδ · <span style="color:${placed>=st.lessonsPerWeek?'var(--green)':'var(--orange)'}">${placed}/${st.lessonsPerWeek} τοποθ.</span></div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron-${st.id}" style="flex-shrink:0;color:var(--text3);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="student-body" id="sb-${st.id}">
          <div class="student-detail-row"><span class="student-detail-label">Διεύθυνση</span><span style="font-size:12px;text-align:right;max-width:200px">${st.address}${state.coords[st.id]?` <span style="color:var(--green);font-size:10px" title="Geocoded ✓">📍</span>`:`<span style="color:var(--text3);font-size:10px" title="Δεν έχει geocodαριστεί"> ○</span>`}</span></div>
          <div class="student-detail-row"><span class="student-detail-label">Διάρκεια</span><span>${st.lessonDuration} λεπτά</span></div>
          <div class="student-detail-row"><span class="student-detail-label">Τύπος</span><span class="chip ${st.type==='group'?'chip-purple':'chip-blue'}">${st.type==='group'?'Ομάδα: '+st.group:'Ατομικό'}</span></div>
          ${st.pairedWith ? (()=>{
            const partner = state.students.find(s=>s.id===st.pairedWith);
            const linkedBack = partner && partner.pairedWith===st.id;
            return `<div class="student-detail-row"><span class="student-detail-label">Ζεύγος με</span><span class="chip ${linkedBack?'chip-purple':'chip-red'}">${partner?partner.name:'⚠ άγνωστος μαθητής'}${linkedBack?'':' ⚠ μη αμφίδρομο'}</span></div>`;
          })() : ''}
          <div class="student-detail-row"><span class="student-detail-label">Διαθεσιμότητα</span><span style="font-size:12px;text-align:right;max-width:200px;color:var(--text2)">${avDays||'—'}</span></div>
          ${st.notes?`<div class="student-detail-row"><span class="student-detail-label">Σημειώσεις</span><span style="font-size:12px;text-align:right;max-width:200px;color:var(--text2)">${st.notes}</span></div>`:''}
          <div class="student-actions">
            <button class="btn btn-secondary" style="flex:1" onclick="App.openStudentDrawer('${st.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Επεξεργασία
            </button>
            <button class="btn btn-danger" style="flex:1" onclick="App.deleteStudent('${st.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              Διαγραφή
            </button>
          </div>
        </div>
      </div>
    `;
  },

  toggleStudent(id){
    const body = document.getElementById('sb-'+id);
    const chevron = document.querySelector('.chevron-'+id);
    if(!body) return;
    const open = body.classList.toggle('open');
    if(chevron) chevron.style.transform = open?'rotate(180deg)':'';
  },

  openStudentDrawer(id){
    state.editingStudentId = id;
    const isNew = !id;
    const st = id ? state.students.find(s=>s.id===id) : null;
    const L = getLabels();
    document.getElementById('drawer-student-title').textContent = isNew?`Νέος ${L.client}`:`Επεξεργασία ${L.client}`;
    document.getElementById('drawer-student-body').innerHTML = this.buildStudentForm(st);
    this.initStudentFormEvents();
    document.getElementById('drawer-student-overlay').classList.add('open');
  },

  closeStudentDrawer(){
    document.getElementById('drawer-student-overlay').classList.remove('open');
    state.editingStudentId = null;
    const saveBtn = document.querySelector('#drawer-student .drawer-footer .btn-primary');
    if(saveBtn){ saveBtn.disabled=false; saveBtn.style.opacity=''; saveBtn.textContent='Αποθήκευση'; }
  },

  buildStudentForm(st){
    const L = getLabels();
    const days = [1,2,3,4,5,6];
    const avRows = days.map(d=>{
      const av = st?.availability?.[d];

          <div class="avail-day-header">
            <label class="toggle-switch" style="width:44px">
              <input type="checkbox" id="avday-${d}" ${on?'checked':''} onchange="App.toggleAvDay(${d})">
              <span class="toggle-slider"></span>
            </label>
            <span class="avail-day-name">${DAYS_FULL[d]}</span>
          </div>
          <div class="avail-time-row" id="avtime-${d}" style="display:${on?'flex':'none'}">
            <input type="time" id="avstart-${d}" value="${av?.start||'15:00'}">
            <span class="avail-sep">έως</span>
            <input type="time" id="avend-${d}" value="${av?.end||'21:30'}">
          </div>
        </div>`;

    return `
      <div class="form-group">
        <label>Ονοματεπώνυμο</label>

          oninput="App.onAddrInput(this.value)" onblur="setTimeout(()=>App.hideAddrSuggest(),200)">
        <div id="addr-suggest" style="display:none;position:absolute;left:0;right:0;top:100%;z-index:9999;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)"></div>
      </div>
      <div class="form-group">
        <label>${L.session}</label>
        <select id="st-subject">
          ${SUBJECTS.map(sub=>`<option value="${sub}" ${st?.subject===sub?'selected':''}>${sub}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">

  _addrTimer: null,
  _addrPendingCoord: null,

  onAddrInput(val, boxId='addr-suggest'){
    if(boxId==='addr-suggest') this._addrPendingCoord = null;
    else this._obCoord = null;
    clearTimeout(this._addrTimer);
    const box = document.getElementById(boxId);
    if(!box) return;
    if(val.length < 3){ box.style.display='none'; return; }
    box.style.display='block';
    box.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--text3)">Αναζήτηση…</div>';
    this._addrTimer = setTimeout(async ()=>{
      try{
        const q = encodeURIComponent(val + ', Ελλάδα');
        const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&countrycodes=gr&addressdetails=1${Router._viewboxParam()}`;
        const r = await fetch(url, {headers:{'Accept-Language':'el','User-Agent':'RoutePal/1.0'}});
        let results = await r.json();
        if((!results || results.length===0) && Router._viewboxParam()){
          const url2 = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&countrycodes=gr&addressdetails=1`;
          const r2 = await fetch(url2, {headers:{'Accept-Language':'el','User-Agent':'RoutePal/1.0'}});
          results = await r2.json();
        }
        const b = document.getElementById(boxId);
        if(!b) return;
        if(!results || results.length===0){
          b.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--text3)">Δεν βρέθηκαν αποτελέσματα</div>';
          return;
        }
        // Closest to home first — the right match is usually the nearby one, not
        // a same-named street in another city.
        const home = state.coords && state.coords['home'];
        if(home){
          results.forEach(res=>{
            const dx=parseFloat(res.lon)-home.lon, dy=parseFloat(res.lat)-home.lat;
            res._distKm = Math.sqrt(dx*dx+dy*dy)*111;
          });
          results.sort((a,b)=>a._distKm-b._distKm);
        }
        results = results.slice(0,5);
        b.innerHTML = results.map((res,i)=>{
          const name = res.display_name;
          const short = name.split(',').slice(0,3).join(',');
          const distTag = res._distKm!=null ? `<span style="color:var(--green);font-weight:600">${res._distKm<1?Math.round(res._distKm*1000)+'μ':res._distKm.toFixed(1)+'χλμ'}</span> · ` : '';
          return `<div class="addr-suggest-item" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);line-height:1.4"
            onmousedown="App.selectAddr(${JSON.stringify(name)},${res.lat},${res.lon},'${boxId}')"
            ontouchstart="App.selectAddr(${JSON.stringify(name)},${res.lat},${res.lon},'${boxId}')">
            <div style="font-weight:500;color:var(--text)">${short}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${distTag}${name}</div>
          </div>`;
        }).join('');
      }catch(e){
        const b = document.getElementById(boxId);
        if(b) b.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--red)">Σφάλμα αναζήτησης</div>';
      }
    }, 400);
  },

  selectAddr(name, lat, lon, boxId='addr-suggest'){
    const coord = {lat:parseFloat(lat), lon:parseFloat(lon)};
    const short = name.split(',').slice(0,3).join(',').trim();
    if(boxId==='ob-addr-suggest'){
      const inp = document.getElementById('ob-addr');
      if(inp) inp.value = short;
      this._obCoord = coord;
    } else {
      const inp = document.getElementById('st-addr');
      if(inp) inp.value = short;
      this._addrPendingCoord = coord;
    }
    const box = document.getElementById(boxId);
    if(box) box.style.display='none';
  },

  saveStudent(){
    const saveBtn = document.querySelector('#drawer-student .drawer-footer .btn-primary');
    const name = document.getElementById('st-name')?.value?.trim();
    const addr = document.getElementById('st-addr')?.value?.trim();
    if(!name){ Toast.show('Εισάγετε ονοματεπώνυμο','error'); return }
    if(!addr){ Toast.show('Εισάγετε διεύθυνση','error'); return }
    if(saveBtn){ saveBtn.disabled=true; saveBtn.style.opacity='0.6'; saveBtn.textContent='Αποθήκευση...'; }

    const availability = {};
    [1,2,3,4,5,6].forEach(d=>{
      const cb = document.getElementById('avday-'+d);
      if(cb?.checked){
        availability[d] = {
          on: true,
          start: document.getElementById('avstart-'+d)?.value||'15:00',
          end: document.getElementById('avend-'+d)?.value||'21:30'
        };
      }
    });

    if(Object.keys(availability).length===0){
      Toast.show('Επιλέξτε τουλάχιστον μία ημέρα','error'); return
    }

    const st = {
      id: state.editingStudentId||('s'+Date.now()),
      name,
      address: addr,
      subject: document.getElementById('st-subject')?.value||'Μαθηματικά',
      lessonDuration: Number(document.getElementById('st-dur')?.value)||60,
      lessonsPerWeek: Number(document.getElementById('st-freq')?.value)||2,
      hoursPerWeek: Number(document.getElementById('st-freq')?.value)||2,
      type: document.getElementById('st-type')?.value||'solo',
      group: document.getElementById('st-group')?.value?.trim()||'',
      pairedWith: document.getElementById('st-paired')?.value||null,
      notes: document.getElementById('st-notes')?.value?.trim()||'',
      forceMerge: document.getElementById('st-forcemerge')?.checked||false,
      maxMergeSessions: Number(document.getElementById('st-mergesize')?.value)||undefined,
      availability,
      color: state.editingStudentId
        ? (state.students.find(s=>s.id===state.editingStudentId)?.color||0)
        : (state.students.length % 10)
    };

    const L2 = getLabels();
    if(state.editingStudentId){
      const idx = state.students.findIndex(s=>s.id===state.editingStudentId);
      if(idx>=0) state.students[idx]=st;
      Toast.show(`Ο ${L2.client.toLowerCase()} ενημερώθηκε`,'success');
    } else {
      state.students.push(st);
      Toast.show(`Ο ${L2.client.toLowerCase()} προστέθηκε`,'success');
    }
    // Bidirectional pairedWith: set partner's pairedWith = this student's id, clear old partner
    const oldSt = state.editingStudentId ? state.students.find(s=>s.id===state.editingStudentId) : null;
    const oldPaired = oldSt?.pairedWith;
    if(oldPaired && oldPaired !== st.pairedWith){
      const oldPartner = state.students.find(s=>s.id===oldPaired);
      if(oldPartner && oldPartner.pairedWith===st.id) oldPartner.pairedWith = null;
    }
    if(st.pairedWith){
      const partner = state.students.find(s=>s.id===st.pairedWith);
      if(partner) partner.pairedWith = st.id;
    }

    // Clear old coords for this student (address may have changed)
    delete state.coords[st.id];
    state.travelMatrix = null;
    state.travelMatrixPeak = null;
    state.travelMatrixOffPeak = null;
    // Use coord already resolved by autocomplete selection, or re-geocode
    const pendingCoord = this._addrPendingCoord;
    this._addrPendingCoord = null;
    Storage.saveStudents(state.students);
    Storage.saveCoords(state.coords);
    // Save coord immediately if available from autocomplete, else geocode in background
    if(pendingCoord){
      state.coords[st.id] = pendingCoord;
      Storage.saveCoords(state.coords);
      if(state.currentScreen==='route') this.renderRoute();
      else if(state.currentScreen==='students' && state._mapExpanded) this.initStudentsMap();
    } else if(addr) {
      Router.geocode(addr).then(c=>{
        if(c){
          state.coords[st.id]=c; Storage.saveCoords(state.coords);
          // Address changed after the map was already drawn — refresh it so the pin isn't stale
          if(state.currentScreen==='route') this.renderRoute();
          else if(state.currentScreen==='students' && state._mapExpanded) this.initStudentsMap();
        }
      }).catch(()=>{});
    }
    // Mark schedule as stale — don't auto-recalculate
    state._scheduleStale = true;
    this.closeStudentDrawer();
    this.renderStudents();
    this.renderHome();
  },

    const btn = document.getElementById('btn-geocode-all');
    if(btn){ btn.disabled=true; btn.textContent='…'; }
    const toGeocode = state.students.filter(s=>!state.coords[s.id]);

      if(c){ state.coords['home']=c; Storage.saveCoords(state.coords); }

      await new Promise(r=>setTimeout(r,1100));
    }
    Toast.show(`Τοποθεσίες: ${Object.keys(state.coords).filter(k=>k!=='home').length}/${state.students.length} geocoded`,'ok');
    this.renderStudents();
  },

  // Rebuild the unplaced-students diagnostic list from current state
  // (used when schedulerResult was lost, e.g. after a page reload)
  computeUnplacedLive(){
    const placedByStudent = {};
    Object.values(state.schedule).flat().forEach(e=>{
      if(e.isGroup){
        const ids = e.groupMemberIds || [e.studentId, e.pairedStudentId].filter(Boolean);
        ids.forEach(id=>{ placedByStudent[id] = (placedByStudent[id]||0) + 1; });
      } else {
        placedByStudent[e.studentId] = (placedByStudent[e.studentId]||0) + (e.mergedCount||1);
      }
    });
    const unplaced = [];
    for(const st of state.students){
      const cnt = placedByStudent[st.id]||0;
      if(cnt < st.lessonsPerWeek){
        const u = { student: st, placed: cnt, needed: st.lessonsPerWeek,
          reason: Scheduler.diagnoseUnplaced(st, state.schedule, state.settings) };
        Scheduler.computeSuggestion(u, state.schedule, state.settings);
        unplaced.push(u);
      }
    }
    return unplaced;
  },

  switchDay(d){
    state.scheduleDay = d;
    document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.day-tab').forEach(t=>{
      if(t.textContent.trim().startsWith(DAYS[d])) t.classList.add('active');
    });
    this.renderDaySlots();

  renderDaySlots(){
    const container = document.getElementById('day-slots');
    if(!container) return;
    const rawSlots = [...(state.schedule[state.scheduleDay]||[])].sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
    if(rawSlots.length===0){
      container.innerHTML = `<div style="padding:16px"><div class="card-sm" style="text-align:center;color:var(--text2);font-size:14px;padding:20px">Δεν υπάρχουν μαθήματα αυτή την ημέρα</div></div>`;
      return;
    }
    // Merge consecutive same-student slots into one display block
    const slots = [];
    for(let i=0;i<rawSlots.length;i++){
      const s = rawSlots[i];
      const prev = slots.length>0 ? slots[slots.length-1] : null;
      const prevRaw = rawSlots[i-1];
      if(prev && prevRaw && s.studentId===prevRaw.studentId && Scheduler.toMin(s.start)<=Scheduler.toMin(prevRaw.end)+1){
        // Extend the last display block
        prev._end = s.end;
        prev._totalDur = (prev._totalDur||prev.duration) + s.duration;
        prev._blockCount = (prev._blockCount||1) + 1;
      } else {
        slots.push({...s, _end: s.end, _totalDur: s.duration, _blockCount: 1});
      }
    }
    let html = '';
    for(let i=0;i<slots.length;i++){
      const slot = slots[i];
      const isMultiBlock = slot._blockCount > 1;
      const displayEnd = slot._end;
      const mergeTag = slot.merged ? `<span class="merge-badge" style="margin-left:6px">ΜΠΛΟΚ ${slot.mergedCount}×${slot.originalDuration}λ</span>`
        : isMultiBlock ? `<span class="merge-badge" style="margin-left:6px">${slot._blockCount}×${slot.duration}λ</span>` : '';
      html += `
        <div class="slot-block ${COLORS[slot.color||0]}${(slot.merged||isMultiBlock)?' merged':''}${slot.isGroup?' group-slot':''}"
             draggable="true" data-slot-idx="${i}" data-slot-day="${state.scheduleDay}"
             ondragstart="App._onSlotDragStart(event,${state.scheduleDay},${i})"
             ondragover="event.preventDefault()" ondrop="App._onSlotDrop(event,${state.scheduleDay},${i})">
          <div class="slot-time">${slot.start} – ${displayEnd}</div>
          <div class="slot-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${slot.studentName}${mergeTag}${slot.isGroup?'<span style="font-size:10px;background:rgba(139,92,246,.2);color:#a78bfa;padding:1px 6px;border-radius:10px;margin-left:4px">ομάδα</span>':''}</div>
          <div class="slot-meta">
            <span class="chip chip-gray">${slot.subject}</span>
            <span class="chip chip-gray">${slot._totalDur}λ</span>
            <span class="chip chip-gray" style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis">${slot.address}</span>
          </div>
        </div>`;
      if(i<slots.length-1){
        const sameLocation = slot.studentId===slots[i+1].studentId ||
          (slot.groupCode && slot.groupCode===slots[i+1].groupCode);
        if(sameLocation){
          html += `<div class="slot-gap" style="color:var(--text-muted,#888)">📍 ίδια τοποθεσία</div>`;
        } else {
          // Show the travel time actually implied by the gap between these two lessons
          // (end of this one to start of the next), not a separately re-estimated number —
          // otherwise the displayed minutes don't add up to the times shown above.
          const margin = state.settings.travelMargin ?? 3;
          const gapMin = Scheduler.toMin(slots[i+1].start) - Scheduler.toMin(slot._end||slot.end);
          const driveMin = Math.max(0, gapMin - margin);
          html += `<div class="slot-gap">🚗 ~${driveMin}λ μετακίνηση${margin?` + ${margin}λ ασφαλείας`:''}</div>`;
        }
      }
    }
    container.innerHTML = html;
  },

  _onSlotDragStart(e, day, idx){
    const slots = [...(state.schedule[day]||[])].sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
    _drag = {day, idx, slot: slots[idx]};
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  },

  _onSlotDrop(e, targetDay, targetIdx){
    e.preventDefault();
    document.querySelectorAll('.slot-block.dragging').forEach(el=>el.classList.remove('dragging'));
    if(!_drag) return;
    const {day: srcDay, idx: srcIdx} = _drag;
    _drag = null;
    const srcSlots = [...(state.schedule[srcDay]||[])].sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
    const tgtSlots = [...(state.schedule[targetDay]||[])].sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
    if(srcDay===targetDay && srcIdx===targetIdx) return;
    // Swap times between the two slots
    const srcSlot = srcSlots[srcIdx];
    const tgtSlot = tgtSlots[targetIdx];
    if(!srcSlot || !tgtSlot) return;
    // Find actual indices in state.schedule arrays
    const srcArrIdx = state.schedule[srcDay].findIndex(s=>s.studentId===srcSlot.studentId && s.start===srcSlot.start);
    const tgtArrIdx = state.schedule[targetDay].findIndex(s=>s.studentId===tgtSlot.studentId && s.start===tgtSlot.start);
    if(srcArrIdx<0 || tgtArrIdx<0) return;
    const {start: sS, end: sE} = state.schedule[srcDay][srcArrIdx];
    const {start: tS, end: tE} = state.schedule[targetDay][tgtArrIdx];
    state.schedule[srcDay][srcArrIdx].start = tS;
    state.schedule[srcDay][srcArrIdx].end = tE;
    state.schedule[targetDay][tgtArrIdx].start = sS;
    state.schedule[targetDay][tgtArrIdx].end = sE;
    Storage.saveSchedule(state.schedule);
    App.renderSchedule();
    App.renderHome();
  },

  _onDayTabDrop(e, targetDay){
    e.preventDefault();
    document.querySelectorAll('.slot-block.dragging').forEach(el=>el.classList.remove('dragging'));
    if(!_drag) return;
    const {day: srcDay, slot: srcSlot} = _drag;
    _drag = null;
    if(srcDay===targetDay) return;
    const existing = state.schedule[targetDay]||[];
    const student = state.students.find(s=>s.id===srcSlot.studentId);
    if(!student) return;
    const newTime = Scheduler.findSlotFixed(student, targetDay, existing, state.settings, srcSlot.duration);
    if(!newTime){ Toast.show('Δεν υπάρχει ελεύθερη ώρα','error'); return; }
    // Remove from source day
    const srcArrIdx = state.schedule[srcDay].findIndex(s=>s.studentId===srcSlot.studentId && s.start===srcSlot.start);
    if(srcArrIdx>=0) state.schedule[srcDay].splice(srcArrIdx,1);
    // Add to target day with new time
    if(!state.schedule[targetDay]) state.schedule[targetDay]=[];
    state.schedule[targetDay].push({...srcSlot, start: newTime.start, end: newTime.end});
    Storage.saveSchedule(state.schedule);
    App.renderSchedule();
    App.renderHome();
  },

  applyWindowExtension(studentId, day, extMin){
    const student = state.students.find(s=>s.id===studentId);

    const av = student.availability[day];
    const newEnd = Scheduler.toTime(Scheduler.toMin(av.end)+extMin);
    student.availability[day] = {...av, end: newEnd};
    Storage.saveStudents(state.students);
    this.runAndNotify();
    Toast.show(`Παράθυρο ${DAYS_FULL[day]} διευρύνθηκε +${extMin}λ`,'success');

  applyTeacherExtension(day, extMin){
    const dayH = state.settings.dayHours[day];
    if(!dayH) return;
    state.settings.dayHours[day] = {...dayH, end: Scheduler.toTime(Scheduler.toMin(dayH.end)+extMin)};
    Storage.saveSettings(state.settings);
    this.runAndNotify();
    Toast.show(`Ωράριο ${DAYS_FULL[day]} παρατάθηκε +${extMin}λ`,'success');
  },

  forceMergeAndReschedule(studentId){
    const student = state.students.find(s=>s.id===studentId);
    if(!student) return;
    const blockMin = student.lessonsPerWeek * student.lessonDuration;
    if(blockMin > 120){
      const blockH = blockMin >= 60 ? `${Math.floor(blockMin/60)}ω${blockMin%60?(' '+blockMin%60+'λ'):''}` : `${blockMin}λ`;

    student.forceMerge = true;
    Storage.saveStudents(state.students);
    this.runAndNotify();

  initRouteMap(slots){
    const el = document.getElementById('route-map');
    if(!el) return;
    if(typeof L === 'undefined'){
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px">Χάρτης μη διαθέσιμος</div>';
      return;
    }
    // Destroy previous instance
    if(el._leaflet_id) { try{ el._leaflet_map && el._leaflet_map.remove(); }catch(e){} }
    const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');
    const stopCoords = slots.map(s => state.coords[s.studentId] || Scheduler.coordsHash(s.address));
    const allPts = [homeC, ...stopCoords];
    const latlngs = allPts.map(c => [c.lat, c.lon]);
    const center = latlngs.reduce((a,p) => [a[0]+p[0]/latlngs.length, a[1]+p[1]/latlngs.length], [0,0]);
    const map = L.map(el, {zoomControl:false, attributionControl:false}).setView(center, 13);
    el._leaflet_map = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
    // Home marker
    L.marker(latlngs[0], {icon:L.divIcon({className:'',html:'<div style="width:16px;height:16px;background:#7c3aed;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.4)"></div>',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(map);
    // Stop markers
    slots.forEach((slot,i) => {
      const pt = latlngs[i+1];
      const color = slot.color != null ? ['#6366f1','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777'][slot.color%7] : '#6366f1';
      L.marker(pt, {icon:L.divIcon({className:'',html:`<div style="width:22px;height:22px;background:${color};border:3px solid #fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">${i+1}</div>`,iconSize:[22,22],iconAnchor:[11,11]})}).bindTooltip(slot.studentName, {permanent:false}).addTo(map);
    });
    // Straight-line placeholder — replaced by real road geometry below if OSRM responds
    let straightLine = null;
    if(latlngs.length > 1) straightLine = L.polyline(latlngs, {color:'#7c3aed',weight:3,opacity:0.7,dashArray:'6,4'}).addTo(map);
    // Fit bounds
    try{ map.fitBounds(L.latLngBounds(latlngs).pad(0.15)); }catch(e){}

    // Fetch real road-following route from OSRM and swap in once ready
    if(allPts.length > 1){
      Router.getRouteGeometry(allPts).then(roadCoords=>{
        if(!roadCoords || !el._leaflet_map) return; // map was destroyed/replaced meanwhile
        if(straightLine) map.removeLayer(straightLine);
        L.polyline(roadCoords, {color:'#7c3aed',weight:4,opacity:0.85}).addTo(map);
      });
    }
  },

  switchRouteDay(d){
    state.routeDay = d;

  buildRouteContent(slots, rr){
    if(slots.length===0){
      return `<div class="empty-state" style="padding:32px 24px">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 6.9 8 11.7z"/></svg>
        <h3>Καμία διαδρομή</h3>
        <p>Δεν υπάρχουν μαθήματα αυτή την ημέρα.</p>
      </div>`;
    }

    const hasReal = rr && rr.stops;
    // Estimate using pseudo-coords for all stops
    const buf = state.settings.travelMargin??3;
    const fuel = state.settings.fuelConsumption||7;

    // Compute estimate from pseudo-coords even without API key
    const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');
    let estKm = 0;
    let prev = homeC;
    const pseudoOrder = [...slots];
    // NN order using available coords or pseudo
    const pts = [homeC, ...slots.map(s=>state.coords[s.studentId]||Scheduler.coordsHash(s.address))];
    const nnOrder = Router.nnRoute(pts.slice(1));
    const orderedEst = nnOrder.map(i=>slots[i]).filter(Boolean);
    prev = homeC;
    for(const sl of orderedEst){
      const c = state.coords[sl.studentId]||Scheduler.coordsHash(sl.address);
      estKm += Router.estimateKm(prev,c);
      prev = c;
    }
    estKm += Router.estimateKm(prev, homeC);
    const estMin = Math.round(estKm/30*60);
    const estFuel = (estKm/100*fuel*1.8).toFixed(2);

    const totalKm = hasReal ? rr.totalKm.toFixed(1) : estKm.toFixed(1);
    const totalMin = hasReal ? rr.totalMinutes : estMin;
    const totalFuel = hasReal ? rr.fuelCost : estFuel;
    const stopsToShow = hasReal ? rr.stops : orderedEst;

    return `
      <div class="route-stats-row">
        <div class="route-stat">
          <div class="route-stat-val" style="color:var(--green)">${totalKm}<span style="font-size:14px;color:var(--text2)">km</span></div>
          <div class="route-stat-label">${hasReal?'Πραγματική':'Εκτιμώμενη'} απόσταση</div>
        </div>
        <div class="route-stat">
          <div class="route-stat-val" style="color:var(--blue)">${totalMin}<span style="font-size:14px;color:var(--text2)">λ</span></div>
          <div class="route-stat-label">Ταξίδι${hasReal?'':' (εκτ.)'}</div>
        </div>
        <div class="route-stat">
          <div class="route-stat-val" style="color:var(--orange)">€${totalFuel}</div>
          <div class="route-stat-label">Καύσιμα${hasReal?'':' (εκτ.)'}</div>
        </div>
      </div>
      <div class="section-title">Σειρά στάσεων · ${DAYS_FULL[state.routeDay]||'—'}</div>
      <div style="padding:0 0 8px">
        ${this.buildStopList(stopsToShow, hasReal)}
      </div>
    `;
  },

  buildStopList(stops, hasReal){
    let html = `
      <div class="stop-item">
        <div class="stop-num home">🏠</div>
        <div class="stop-info">
          <div class="stop-name">Αφετηρία</div>
          <div class="stop-addr">${state.settings.homeAddress||'Σπίτι'}</div>
        </div>
      </div>
      <div class="stop-connector" style="margin-left:29px"></div>
    `;
    stops.forEach((stop, i) => {
      const travelRow = hasReal && stop.travelMin
        ? `<span class="stop-travel-row" style="color:var(--blue)">${stop.travelMin}λ οδήγηση · ${Number(stop.travelKm||0).toFixed(1)}km</span>` : '';
      html += `
        <div class="stop-item">
          <div class="stop-num">${i+1}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.studentName||'—'}</div>
            <div class="stop-addr">${stop.address||'—'}</div>
            <div class="stop-travel"><span class="stop-travel-row">🕐 Άφιξη ${stop._start||stop.start} – ${stop._end||stop.end} · ${stop.subject||''}</span>${travelRow}</div>
          </div>
        </div>
        ${i<stops.length-1?'<div class="stop-connector" style="margin-left:29px"></div>':''}
      `;
    });
    html += `
      <div class="stop-connector" style="margin-left:29px"></div>
      <div class="stop-item">
        <div class="stop-num home">🏠</div>
        <div class="stop-info">
          <div class="stop-name">Επιστροφή</div>
          <div class="stop-addr">${state.settings.homeAddress||'Σπίτι'}</div>
        </div>
      </div>
    `;
    return html;
  },

  async calcRoute(){
    const btn = document.getElementById('calc-route-btn');
    const day = state.routeDay;
    const slots = (state.schedule[day]||[]).sort((a,b)=>Scheduler.toMin(a.start)-Scheduler.toMin(b.start));
    if(btn){ btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true }

    try{
      // Geocode home (Nominatim, 1 req/s limit)
      if(!state.coords['home']){
        const c = await Router.geocode(state.settings.homeAddress);
        if(c){ state.coords['home']=c; Storage.saveCoords(state.coords) }
        await new Promise(r=>setTimeout(r,1100));
      }
      // Geocode all students for this day
      for(const slot of slots){
        if(!state.coords[slot.studentId]){
          const c = await Router.geocode(slot.address);
          if(c){ state.coords[slot.studentId]=c; Storage.saveCoords(state.coords) }
          await new Promise(r=>setTimeout(r,1100));
        }
      }

      const homeC = state.coords['home'] || Scheduler.coordsHash(state.settings.homeAddress||'Πλατεία Γεωργίου 1, Πάτρα');

      // OSRM Matrix for real driving times
      const allCoords = [homeC, ...slots.map(s=>state.coords[s.studentId]||Scheduler.coordsHash(s.address))];
      const matrix = await Router.getMatrix(allCoords);

      let orderedSlots, totalKm=0, totalMin=0;
      if(matrix && matrix.durations){
        // NN on real matrix (index 0 = home)
        const n=allCoords.length, visited=new Array(n).fill(false), order=[0];
        visited[0]=true;
        for(let i=1;i<n;i++){
          const last=order[order.length-1];
          let best=-1,bestD=Infinity;
          for(let j=1;j<n;j++){
            if(visited[j]) continue;
            const d=matrix.durations[last][j];
            if(d<bestD){bestD=d;best=j}
          }
          if(best>=0){order.push(best);visited[best]=true}
        }
        orderedSlots = order.slice(1).map(i=>slots[i-1]).filter(Boolean);
        // Calc per-stop travel (each leg's destination is orderedSlots[i] — every stop appears exactly once)
        const processedStops=[];
        for(let i=0;i<order.length-1;i++){
          const from=order[i], to=order[i+1];
          const tMin = Math.round((matrix.durations[from][to]||0)/60);
          const tKm  = ((matrix.distances?.[from]?.[to]||0)/1000);
          totalMin += tMin; totalKm += tKm;
          processedStops.push({...orderedSlots[i], travelMin:tMin, travelKm:tKm.toFixed(1)});
        }
        // Arrival time = previous stop's departure + real travel time + 2 min buffer
        // (first stop keeps its originally scheduled start as the anchor)
        for(let i=0;i<processedStops.length;i++){
          if(i===0){
            processedStops[i]._start = processedStops[i].start;
            processedStops[i]._end = processedStops[i].end;
          } else {
            const prevEndMin = Scheduler.toMin(processedStops[i-1]._end);
            const arrivalMin = prevEndMin + (processedStops[i].travelMin||0) + 2;
            processedStops[i]._start = Scheduler.toTime(arrivalMin);
            processedStops[i]._end = Scheduler.toTime(arrivalMin + processedStops[i].duration);
          }
        }
        // Return home
        const lastIdx=order[order.length-1];
        totalKm += (matrix.distances?.[lastIdx]?.[0]||0)/1000;
        totalMin += Math.round((matrix.durations[lastIdx][0]||0)/60);

        const fuel=state.settings.fuelConsumption||7;
        state.routeResults[day] = {
          stops: processedStops, totalKm, totalMinutes: totalMin,
          fuelCost: (totalKm/100*fuel*1.8).toFixed(2)
        };
      } else {
        // Fallback: NN with estimate
        const pts=[homeC,...slots.map(s=>state.coords[s.studentId]||Scheduler.coordsHash(s.address))];
        const nnOrder=Router.nnRoute(pts.slice(1));
        orderedSlots=nnOrder.map(i=>slots[i]).filter(Boolean);
        let prev=homeC;
        const ps=[];
        for(const sl of orderedSlots){
          const c=state.coords[sl.studentId]||Scheduler.coordsHash(sl.address);
          const km=Router.estimateKm(prev,c);
          totalKm+=km; totalMin+=Math.round(km/30*60);
          ps.push({...sl,travelMin:Math.round(km/30*60),travelKm:km.toFixed(1)});
          prev=c;
        }
        // Arrival time = previous stop's departure + estimated travel + 2 min buffer
        for(let i=0;i<ps.length;i++){
          if(i===0){
            ps[i]._start = ps[i].start;
            ps[i]._end = ps[i].end;
          } else {
            const prevEndMin = Scheduler.toMin(ps[i-1]._end);
            const arrivalMin = prevEndMin + (ps[i].travelMin||0) + 2;
            ps[i]._start = Scheduler.toTime(arrivalMin);
            ps[i]._end = Scheduler.toTime(arrivalMin + ps[i].duration);
          }
        }
        totalKm+=Router.estimateKm(prev,homeC);
        const fuel=state.settings.fuelConsumption||7;
        state.routeResults[day]={stops:ps,totalKm,totalMinutes:totalMin,fuelCost:(totalKm/100*fuel*1.8).toFixed(2)};
      }
    }catch(e){
      Toast.show('Σφάλμα κατά τον υπολογισμό','error');
    }

    if(btn){ btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 6.9 8 11.7z"/></svg> Υπολογισμός'; btn.disabled=false }
    this.renderRoute();
  },

  openInSafari(){
    const url = location.href;
    // x-safari-https:// / x-safari-http:// opens URL directly in Safari on iOS
    const safariUrl = url.replace(/^(https?):\/\//, (_, p) => `x-safari-${p}://`);
    window.location.href = safariUrl;
    // Fallback after 800ms: copy link to clipboard
    setTimeout(()=>{
      if(navigator.clipboard){ navigator.clipboard.writeText(url).catch(()=>{}) }
      Toast.show('Αντιγράφηκε ο σύνδεσμος — άνοιξέ τον στο Safari','info');
    }, 800);
  },

  toggleWorkDay(d){
    const el = document.getElementById('wday-'+d);
    const idx = state.settings.workDays.indexOf(d);
    if(idx>=0){
      if(state.settings.workDays.length<=1){ Toast.show('Χρειάζεστε τουλάχιστον μία εργάσιμη ημέρα','error'); return }
      state.settings.workDays.splice(idx,1);
      el.classList.remove('on');
    } else {
      state.settings.workDays.push(d);
      state.settings.workDays.sort();
      el.classList.add('on');
    }
    // Re-render the hours section
    this.renderSettings();
  },

  saveSettings(){
    const s = state.settings;
    const prevHome = s.homeAddress;
    s.teacherName = document.getElementById('set-name')?.value?.trim()||'';
    s.homeAddress = document.getElementById('set-home')?.value?.trim()||'';
    s.travelMode  = document.getElementById('set-mode')?.value||'car';
    s.fuelConsumption = Number(document.getElementById('set-fuel')?.value)||7;
    s.travelMargin = Number(document.getElementById('set-margin')?.value)??3;
    s.avgCitySpeedKmh = Number(document.getElementById('set-speed')?.value)||25;
    s.hereApiKey = document.getElementById('set-here-key')?.value?.trim()||'';
    s.lunchBreak = Number(document.getElementById('set-lunch')?.value)||0;

    // If home address changed, force re-geocode
    if(s.homeAddress !== prevHome){
      delete state.coords['home'];
      state.travelMatrix = null;
      state.travelMatrixPeak = null;
      state.travelMatrixOffPeak = null;
      Storage.saveCoords(state.coords);
    }

    // Day hours
    s.workDays.forEach(d=>{
      const st2 = document.getElementById('dh-start-'+d)?.value;
      const en  = document.getElementById('dh-end-'+d)?.value;
      if(st2 && en) s.dayHours[d] = {start:st2,end:en};
    });

    Storage.saveSettings(s);
    this.runAndNotify();
    Toast.show('Ρυθμίσεις αποθηκεύτηκαν','success');
  },

  // Seed N realistic test students with real Patras street names, for load-testing
  // the scheduler end-to-end (real Nominatim geocoding + OSRM routing, run in-browser).
  seedTestStudents(n=40){
    this.confirm(
      `Δοκιμαστικοί μαθητές (${n})`,
      `Θα αντικατασταθούν όλοι οι τρέχοντες μαθητές με ${n} τυχαίους δοκιμαστικούς μαθητές στην Πάτρα, και θα τρέξει αυτόματα ο προγραμματισμός με πραγματικό geocoding. Συνέχεια;`,
      ()=>{
        const FIRST=['Γιώργος','Μαρία','Νίκος','Ελένη','Κώστας','Σοφία','Δημήτρης','Άννα','Παναγιώτης','Χριστίνα','Αλέξανδρος','Κατερίνα','Θανάσης','Ιωάννα','Σταύρος','Δέσποινα','Βασίλης','Αγγελική','Μιχάλης','Ευαγγελία'];
        const LAST=['Παπαδόπουλος','Κωνσταντίνου','Αθανασίου','Δημητρίου','Οικονόμου','Γεωργίου','Λάμπρου','Μαντζώρου','Σπηλιόπουλος','Καραγιάννης','Αλεξόπουλος','Παπανικολάου','Καλογερόπουλος','Θεοδωρίδου','Κυριακόπουλος','Σταμάτης','Μπέης','Παπαχρήστου','Νικολάου','Βλάχος'];
        const STREETS=['Κορίνθου','Γούναρη','Αγίου Ανδρέου','Μαιζώνος','Ρήγα Φεραίου','Κανακάρη','Αμαλίας','Αράτου','Παντανάσσης','Ελ. Βενιζέλου','Αθηνών','Ζαΐμη','Κολοκοτρώνη','Σαχτούρη','Ναυαρίνου','Καρόλου','Μιαούλη','28ης Οκτωβρίου','Τριών Ναυάρχων','Βότση','Αγίου Νικολάου'];
        const SUBJ=['Μαθηματικά','Φυσική','Χημεία','Βιολογία','Αγγλικά','Ιστορία','Γεωγραφία','Λογοτεχνία','Πληροφορική','Άλγεβρα'];
        const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
        const seeded=[];
        for(let i=0;i<n;i++){
          const addr=`${pick(STREETS)} ${1+Math.floor(Math.random()*140)}, Πάτρα`;
          const lessonDuration=pick([60,60,60,90]);

          const days=[1,2,3,4,5,6].sort(()=>Math.random()-0.5).slice(0,numDays);
